function onPlantTap() {
  const p = getPlantState();
  const daysSince = getDaysSinceLastEntry();
  let msg = '';
  if (p.stage === 0) msg = "I'm waiting to be planted. Log your first entry to begin.";
  else if (p.health < 0.7 && daysSince >= 2) msg = `Thirsty. ${daysSince} days since you logged. A small entry brings me back.`;
  else if (p.stage === 7) msg = `Thriving. ${p.totalEntries} entries logged, ${p.urgesBeaten} urges beaten. We grew this together.`;
  else if (p.stage >= 6) msg = `In full bloom. Each flower is an urge you beat (${p.urgesBeaten}). Each fruit, days at goal (${p.daysAtGoal}).`;
  else if (p.stage >= 4) msg = `Growing well. ${p.streak}-day streak. Keep going — bloom is around the corner.`;
  else if (p.stage >= 2) msg = `Roots forming. Day ${p.days}. The habit is locking in.`;
  else msg = `Just sprouted. Every entry makes me a little taller.`;
  state.plantTapMessage = msg;
  render();
  setTimeout(() => { if (state.plantTapMessage === msg) { state.plantTapMessage = null; render(); } }, 3500);
}

function getPlantStageLabel(stage, health) {
  if (stage === 0) return { label: 'waiting to be planted', sub: 'Log your first entry to begin' };
  if (stage === 1) return { label: 'a tiny seed', sub: 'You\'ve started. That\'s the hardest part.' };
  if (stage === 2) return { label: 'sprouting', sub: 'Three days in. The habit is forming.' };
  if (stage === 3) return { label: 'a seedling', sub: 'A week of showing up. This is becoming routine.' };
  if (stage === 4) return { label: 'a young plant', sub: 'Two weeks. You\'ve outlasted most people.' };
  if (stage === 5) return { label: 'about to bloom', sub: 'Something is forming. Keep at it.' };
  if (stage === 6) return { label: 'in full bloom', sub: 'A month of consistency. That\'s identity, not effort.' };
  if (stage === 7) return { label: 'thriving', sub: 'Mature, fruiting, alive. You did this.' };
  return { label: '', sub: '' };
}

function checkPlateauWarning() {
  // Fire if user has 21-42 days of data and weight has plateaued
  const days = getDaysSinceStart();
  if (days < 21 || days > 42) return false;
  if (state.measurements.length < 2) return false;
  const weightEntries = state.measurements.filter(m => m.weight).sort((a, b) => a.timestamp - b.timestamp);
  if (weightEntries.length < 3) return false;
  const recent = weightEntries.slice(-3);
  const range = Math.max(...recent.map(m => m.weight)) - Math.min(...recent.map(m => m.weight));
  return range < 0.5; // less than 0.5kg variation over recent measurements
}

// ============================================================
// WHY INTELLIGENCE — why-am-I-eating patterns
// ============================================================
function getWhyPatterns() {
  // Identify overeating by reason. Look only at the EXCESS calories on over-goal days,
  // attributed proportionally by the reasons of entries above the goal threshold.
  const entries = state.entries.filter(e => e.type !== 'activity' && e.eatingReason);
  if (entries.length < 10) return null;
  const byDay = {};
  for (const e of entries) {
    const k = entryDate(e.timestamp);
    if (!byDay[k]) byDay[k] = [];
    byDay[k].push(e);
  }
  const reasonOvereating = {};
  const reasonCount = {};
  let totalOvereatDays = 0;
  let totalEveningExcessByReason = {};
  let totalExcessByReason = {};
  for (const k of Object.keys(byDay)) {
    const dayEntries = byDay[k].sort((a, b) => a.timestamp - b.timestamp);
    const total = dayEntries.reduce((a, e) => a + (e.calories || 0), 0);
    if (total <= state.dailyGoal) continue;
    totalOvereatDays++;
    // Find which entries make up the EXCESS — walk backwards from the latest until we cover the excess
    const excess = total - state.dailyGoal;
    const sortedByTime = [...dayEntries].sort((a, b) => b.timestamp - a.timestamp); // latest first
    let remaining = excess;
    for (const e of sortedByTime) {
      if (remaining <= 0) break;
      const attribute = Math.min(remaining, e.calories || 0);
      if (e.eatingReason) {
        totalExcessByReason[e.eatingReason] = (totalExcessByReason[e.eatingReason] || 0) + attribute;
        const isEvening = new Date(e.timestamp).getHours() >= 17;
        if (isEvening) totalEveningExcessByReason[e.eatingReason] = (totalEveningExcessByReason[e.eatingReason] || 0) + attribute;
      }
      remaining -= attribute;
    }
  }
  if (totalOvereatDays < 3) return null;
  const totalExcess = Object.values(totalExcessByReason).reduce((a, b) => a + b, 0);
  if (totalExcess === 0) return null;
  const dominant = Object.keys(totalExcessByReason).sort((a, b) => totalExcessByReason[b] - totalExcessByReason[a])[0];
  if (!dominant) return null;
  // Exclude 'hungry' as the headline since that's not actionable. If hunger is top, use next non-hunger.
  let headline = dominant;
  if (dominant === 'hungry') {
    const nonHunger = Object.keys(totalExcessByReason).filter(k => k !== 'hungry').sort((a, b) => totalExcessByReason[b] - totalExcessByReason[a]);
    if (nonHunger.length === 0 || totalExcessByReason[nonHunger[0]] < totalExcess * 0.2) {
      // Hungry dominates and there's no meaningful non-hunger pattern — return a positive
      return null;
    }
    headline = nonHunger[0];
  }
  const pct = Math.round((totalExcessByReason[headline] / totalExcess) * 100);
  const eveningExcess = totalEveningExcessByReason[headline] || 0;
  const eveningPct = totalExcessByReason[headline] > 0 ? Math.round((eveningExcess / totalExcessByReason[headline]) * 100) : 0;
  return {
    dominant: headline,
    pct,
    overeatDays: totalOvereatDays,
    eveningSkewed: eveningPct >= 60,
    eveningPct,
  };
}

// ============================================================
// SATISFACTION PER CALORIE
// ============================================================
function getSatisfactionPerCalorie() {
  // For each food with 2+ actualSatisfaction ratings, compute satisfaction/100kcal
  const entries = state.entries.filter(e => e.type !== 'activity' && e.actualSatisfaction && e.calories > 0);
  if (entries.length < 5) return null;
  const groups = {};
  for (const e of entries) {
    if (!groups[e.name]) groups[e.name] = { sat: 0, cal: 0, count: 0 };
    groups[e.name].sat += e.actualSatisfaction;
    groups[e.name].cal += e.calories;
    groups[e.name].count++;
  }
  const result = [];
  for (const k of Object.keys(groups)) {
    const g = groups[k];
    if (g.count < 2) continue;
    const avgSat = g.sat / g.count;
    const avgCal = g.cal / g.count;
    const satPerCal = (avgSat / avgCal) * 100; // satisfaction per 100 kcal
    result.push({
      name: k,
      count: g.count,
      avgSat: avgSat.toFixed(1),
      avgCal: Math.round(avgCal),
      satPerCal: satPerCal.toFixed(2),
      rawScore: satPerCal,
    });
  }
  if (result.length < 3) return null;
  result.sort((a, b) => b.rawScore - a.rawScore);
  return result;
}

// ============================================================
// FUTURE YOU SIMULATOR
// ============================================================
function getFutureYou(weeksAhead) {
  weeksAhead = weeksAhead || 12;
  const profile = loadProfile();
  if (!profile) return null;
  const tdee = calculateTDEE(profile.weight, profile.height, profile.age, profile.sex, profile.activityLevel);
  // Compute average daily kcal over last 14 days
  const cutoff = Date.now() - 14 * 86400000;
  const recent = state.entries.filter(e => e.type !== 'activity' && e.timestamp > cutoff);
  if (recent.length < 7) return null;
  const byDay = {};
  for (const e of recent) {
    const k = entryDate(e.timestamp);
    byDay[k] = (byDay[k] || 0) + (e.calories || 0);
  }
  const dayCount = Object.keys(byDay).length;
  if (dayCount < 3) return null;
  const avgDaily = Object.values(byDay).reduce((a,b) => a+b, 0) / dayCount;
  // Account for logged exercise
  const exerciseDaily = state.entries
    .filter(e => e.type === 'activity' && e.timestamp > cutoff)
    .reduce((a,e) => a + (e.calories || 0), 0) / dayCount;
  const netDaily = avgDaily - exerciseDaily;
  const dailyBalance = netDaily - tdee; // positive = surplus, negative = deficit
  // 7700 kcal ≈ 1kg body fat
  const weeklyChange = (dailyBalance * 7) / 7700;
  const totalChange = weeklyChange * weeksAhead;
  // Project waist too if we have data
  const waistTrend = getMeasurementTrend('waist');
  const waistChange = waistTrend ? waistTrend.perWeek * weeksAhead : null;
  // Target date
  const targetDate = new Date(Date.now() + weeksAhead * 7 * 86400000);
  const dateStr = targetDate.toLocaleDateString([], { month: 'long', day: 'numeric' });
  return {
    weeksAhead,
    avgDaily: Math.round(avgDaily),
    netDaily: Math.round(netDaily),
    tdee,
    dailyBalance: Math.round(dailyBalance),
    weeklyChange,
    totalChange,
    targetDate: dateStr,
    waistChange,
    dayCount,
  };
}

// ============================================================
// RECOVERY SCORE — how fast do you bounce back from slips?
// ============================================================
function getRecoveryScore() {
  const goal = state.dailyGoal;
  const byDay = {};
  for (const e of state.entries.filter(x => x.type !== 'activity')) {
    const k = entryDate(e.timestamp);
    byDay[k] = (byDay[k] || 0) + (e.calories || 0);
  }
  const sortedDays = Object.keys(byDay).sort();
  if (sortedDays.length < 7) return null;
  // Find slip days (over goal by 15%+) and measure time-to-recovery
  const slipDays = [];
  for (let i = 0; i < sortedDays.length; i++) {
    const d = sortedDays[i];
    if (byDay[d] > goal * 1.15) {
      // Find next at-or-under-goal day
      let recoveryDay = -1;
      for (let j = i + 1; j < sortedDays.length; j++) {
        if (byDay[sortedDays[j]] <= goal) { recoveryDay = j; break; }
      }
      const next = recoveryDay > 0 ? recoveryDay - i : null;
      slipDays.push({ day: d, calories: byDay[d], recoveryDays: next });
    }
  }
  if (slipDays.length === 0) {
    // No slips means perfect record — but score should reflect that
    return { score: 100, slips: 0, totalSlips: 0, avgRecoveryDays: 0, fastestRecovery: 0, message: 'No major overshoot days in your history. Steady.' };
  }
  const recoveredSlips = slipDays.filter(s => s.recoveryDays != null);
  if (recoveredSlips.length === 0) {
    // Slipped but never recovered (most recent could be current)
    return { score: 50, slips: slipDays.length, totalSlips: slipDays.length, avgRecoveryDays: null, fastestRecovery: null, message: 'Some slip days without recovery yet. The next clean day resets this.' };
  }
  const avgRec = recoveredSlips.reduce((a, s) => a + s.recoveryDays, 0) / recoveredSlips.length;
  const fastest = Math.min(...recoveredSlips.map(s => s.recoveryDays));
  // Score: 1-day recovery = 100, 2-day = 85, 3-day = 70, 4-day = 50, 5+ = 30
  let score;
  if (avgRec <= 1.2) score = 100;
  else if (avgRec <= 2) score = 90;
  else if (avgRec <= 3) score = 75;
  else if (avgRec <= 4) score = 60;
  else if (avgRec <= 5) score = 45;
  else score = 30;
  let message;
  if (score >= 90) message = `You bounce back fast — usually within 1 day of a slip. That's resilience, not luck.`;
  else if (score >= 70) message = `Solid bounce-back. Average ${avgRec.toFixed(1)} days to get back to goal after a slip.`;
  else if (score >= 50) message = `Slips tend to last ${avgRec.toFixed(1)} days. The work isn't avoiding slips — it's making the recovery faster.`;
  else message = `Slips compound into longer rough patches. The goal isn't perfect — it's faster recovery. Tomorrow is a clean page.`;
  return { score, slips: slipDays.length, totalSlips: slipDays.length, recoveredSlips: recoveredSlips.length, avgRecoveryDays: avgRec.toFixed(1), fastestRecovery: fastest, message };
}

// ============================================================
// HEALTHSPAN SCORE — composite, not weight
// ============================================================
function getHealthspanScore() {
  const components = [];
  // Waist-to-height ratio (lower better, <0.5 ideal)
  const profile = loadProfile();
  const latestWaist = state.measurements.find(m => m.waist)?.waist;
  if (latestWaist && profile?.height) {
    const ratio = latestWaist / profile.height;
    let s;
    if (ratio < 0.45) s = 95;
    else if (ratio < 0.5) s = 85;
    else if (ratio < 0.55) s = 65;
    else if (ratio < 0.6) s = 45;
    else s = 25;
    components.push({ name: 'Waist ratio', score: s, weight: 0.3 });
  }
  // Resting pulse — lower better (50-70 is healthy)
  const baseline = getPulseBaseline();
  if (baseline) {
    let s;
    if (baseline < 60) s = 95;
    else if (baseline < 70) s = 85;
    else if (baseline < 80) s = 65;
    else if (baseline < 90) s = 45;
    else s = 25;
    components.push({ name: 'Resting pulse', score: s, weight: 0.2 });
  }
  // Activity — minutes/week
  const cutoff = Date.now() - 14 * 86400000;
  const recentActMin = state.entries
    .filter(e => e.type === 'activity' && e.timestamp > cutoff)
    .reduce((a, e) => a + (e.duration || 0), 0);
  const weeklyMin = recentActMin / 2;
  let actScore;
  if (weeklyMin >= 150) actScore = 95;
  else if (weeklyMin >= 90) actScore = 80;
  else if (weeklyMin >= 60) actScore = 65;
  else if (weeklyMin >= 30) actScore = 50;
  else actScore = 30;
  components.push({ name: 'Activity', score: actScore, weight: 0.25 });
  // Recovery (resilience)
  const rec = getRecoveryScore();
  if (rec) {
    components.push({ name: 'Recovery', score: rec.score, weight: 0.15 });
  }
  // Consistency — how often you log (last 14 days)
  const recent = state.entries.filter(e => e.timestamp > cutoff);
  const distinctDays = new Set(recent.map(e => entryDate(e.timestamp))).size;
  const consistency = Math.round((distinctDays / 14) * 100);
  components.push({ name: 'Consistency', score: Math.min(100, consistency), weight: 0.1 });
  if (components.length < 2) return null;
  const totalWeight = components.reduce((a, c) => a + c.weight, 0);
  const weighted = components.reduce((a, c) => a + c.score * c.weight, 0);
  const composite = Math.round(weighted / totalWeight);
  return { composite, components };
}

// ============================================================
// COMBINED INTELLIGENCE ENGINE
// Mines all collected data: entries, urges, measurements, mood, reasons,
// satisfaction, pulse, day/hour, sleep/energy/focus from wellbeing.
// Returns null where insufficient data — never bogus output.
// ============================================================

// --- Helper: at-risk-day extraction (uses entries + reason, not just urges) ---
function getOverEatingEvents() {
  const goal = state.dailyGoal;
  const events = [];
  // Group entries by day
  const byDay = {};
  for (const e of state.entries.filter(x => x.type !== 'activity')) {
    const k = entryDate(e.timestamp);
    if (!byDay[k]) byDay[k] = [];
    byDay[k].push(e);
  }
  for (const k of Object.keys(byDay)) {
    const day = byDay[k].sort((a, b) => a.timestamp - b.timestamp);
    const total = day.reduce((a, e) => a + (e.calories || 0), 0);
    if (total <= goal) continue;
    // The "trigger" event(s) are entries that pushed us over the goal — last few entries that day
    const excess = total - goal;
    const sorted = [...day].sort((a, b) => b.timestamp - a.timestamp);
    let cumulative = 0;
    const triggerEntries = [];
    for (const e of sorted) {
      if (cumulative >= excess) break;
      cumulative += e.calories || 0;
      triggerEntries.push(e);
    }
    events.push({
      date: k,
      dayOfWeek: new Date(day[0].timestamp).getDay(),
      total,
      excess,
      triggerEntries,
    });
  }
  return events;
}

// --- 1. Trigger fingerprint (your personal high-risk profile) ---
function getTriggerFingerprint() {
  const events = getOverEatingEvents();
  if (events.length < 4) return null; // need at least 4 overshoot days to mine

  // Time-of-day distribution of trigger entries
  const hourCounts = new Array(24).fill(0);
  const dayCounts = new Array(7).fill(0);
  const reasonCounts = {};
  let triggerEntryTotal = 0;
  for (const evt of events) {
    dayCounts[evt.dayOfWeek] += 1;
    for (const te of evt.triggerEntries) {
      const h = new Date(te.timestamp).getHours();
      hourCounts[h] += 1;
      triggerEntryTotal++;
      if (te.eatingReason) reasonCounts[te.eatingReason] = (reasonCounts[te.eatingReason] || 0) + 1;
      if (te.mood) reasonCounts['__mood_' + te.mood] = (reasonCounts['__mood_' + te.mood] || 0) + 1;
    }
  }

  // Find dominant hour window — top 3 hours, contiguous if possible
  const indexedHours = hourCounts.map((c, i) => ({ h: i, c })).sort((a, b) => b.c - a.c);
  const top3Hours = indexedHours.slice(0, 3).filter(x => x.c > 0);
  let timeWindow = null;
  if (top3Hours.length >= 2 && top3Hours[0].c >= 2) {
    const sortedHrs = top3Hours.map(x => x.h).sort((a, b) => a - b);
    timeWindow = { start: sortedHrs[0], end: sortedHrs[sortedHrs.length - 1] + 1, count: top3Hours.reduce((a, x) => a + x.c, 0) };
  } else if (top3Hours.length >= 1 && top3Hours[0].c >= 2) {
    timeWindow = { start: top3Hours[0].h, end: top3Hours[0].h + 1, count: top3Hours[0].c };
  }

  // Find dominant day(s)
  const topDays = dayCounts.map((c, i) => ({ d: i, c })).sort((a, b) => b.c - a.c).filter(x => x.c >= 2).slice(0, 2);
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  // Dominant non-hunger reason
  const nonHungerReasons = Object.keys(reasonCounts)
    .filter(k => !k.startsWith('__') && k !== 'hungry')
    .sort((a, b) => reasonCounts[b] - reasonCounts[a]);
  const topReason = nonHungerReasons[0];
  const topReasonPct = topReason ? Math.round((reasonCounts[topReason] / triggerEntryTotal) * 100) : 0;

  // Dominant mood
  const moodKeys = Object.keys(reasonCounts).filter(k => k.startsWith('__mood_'));
  const topMoodKey = moodKeys.sort((a, b) => reasonCounts[b] - reasonCounts[a])[0];
  const topMood = topMoodKey ? topMoodKey.replace('__mood_', '') : null;

  return {
    eventCount: events.length,
    timeWindow,
    topDays: topDays.map(t => dayNames[t.d]),
    topReason,
    topReasonPct,
    topMood,
    confidence: events.length >= 8 ? 'high' : events.length >= 5 ? 'medium' : 'low',
  };
}

// --- 2. Interrupt effectiveness model (which interrupt works for YOU) ---
function getInterruptEffectiveness() {
  const urges = (state.urges || []).filter(u => u.interruptType && u.ateAnyway != null);
  if (urges.length < 5) return null;
  const types = ['wave', 'cold', 'breathe', 'move', 'water'];
  const stats = {};
  for (const type of types) {
    const list = urges.filter(u => u.interruptType === type);
    if (list.length === 0) continue;
    const beaten = list.filter(u => u.ateAnyway === false).length;
    const avgDrop = list.reduce((a, u) => a + ((u.initialIntensity || 0) - (u.finalIntensity || 0)), 0) / list.length;
    stats[type] = {
      attempts: list.length,
      beaten,
      successRate: Math.round((beaten / list.length) * 100),
      avgIntensityDrop: avgDrop.toFixed(1),
    };
  }
  // Find best — minimum 3 attempts for valid ranking
  const ranked = Object.keys(stats)
    .filter(t => stats[t].attempts >= 3)
    .sort((a, b) => stats[b].successRate - stats[a].successRate);
  if (ranked.length === 0) return { stats, best: null, ranked: [], reliable: false };
  return { stats, best: ranked[0], ranked, reliable: true, totalUrges: urges.length };
}

// --- 3. Danger score (risk estimate at a specific time — default: now) ---
function getDangerScoreAt(targetTime) {
  const fp = getTriggerFingerprint();
  // Need a fingerprint to give a meaningful score
  if (!fp) return null;
  let score = 0;
  const factors = [];
  const t = targetTime ? new Date(targetTime) : new Date();
  const targetHour = t.getHours();
  const targetDay = t.getDay();
  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  // 1. Time-of-day match (up to 40 points)
  if (fp.timeWindow && targetHour >= fp.timeWindow.start && targetHour < fp.timeWindow.end) {
    const points = fp.confidence === 'high' ? 40 : fp.confidence === 'medium' ? 30 : 20;
    score += points;
    factors.push({ name: `Risk hour (${fp.timeWindow.start}-${fp.timeWindow.end})`, points });
  }

  // 2. Day-of-week match (up to 25 points)
  if (fp.topDays.includes(dayNames[targetDay])) {
    const points = fp.confidence === 'high' ? 25 : 18;
    score += points;
    factors.push({ name: `Risk day (${dayNames[targetDay]})`, points });
  }

  // 3. Time since last meal (up to 15 points) — only meaningful for "now"
  // For future hours, we estimate based on typical meal spacing.
  const isNow = !targetTime || Math.abs(t.getTime() - Date.now()) < 60000;
  if (isNow) {
    const lastEntryTs = state.entries.filter(e => e.type !== 'activity').sort((a, b) => b.timestamp - a.timestamp)[0]?.timestamp;
    if (lastEntryTs) {
      const hoursSince = (Date.now() - lastEntryTs) / 3600000;
      if (hoursSince >= 5 && hoursSince <= 10) {
        const points = 15;
        score += points;
        factors.push({ name: `${Math.round(hoursSince)}h since last meal`, points });
      } else if (hoursSince > 10) {
        const points = 10;
        score += points;
        factors.push({ name: `${Math.round(hoursSince)}h since last meal — likely hungry`, points });
      }
    }
  }

  // 4. Recent wellbeing signal (up to 20 points)
  const lastCheckin = (state.wellbeingHistory || []).sort((a, b) => b.timestamp - a.timestamp)[0];
  if (lastCheckin && (Date.now() - lastCheckin.timestamp) < 7 * 86400000) {
    if (lastCheckin.sleep != null && lastCheckin.sleep <= 2) {
      const points = 12;
      score += points;
      factors.push({ name: `Low sleep this week`, points });
    }
    if (lastCheckin.energy != null && lastCheckin.energy <= 2) {
      const points = 8;
      score += points;
      factors.push({ name: `Low energy this week`, points });
    }
  }

  // 5. Recent mood from entries (only for "now") — last 24h
  if (isNow) {
    const recentEntries = state.entries.filter(e => e.type !== 'activity' && e.timestamp > Date.now() - 86400000);
    const stressedRecent = recentEntries.filter(e => e.mood === 'stressed' || e.mood === 'down').length;
    if (stressedRecent >= 2) {
      const points = 15;
      score += points;
      factors.push({ name: `Stressed mood today`, points });
    }
  }

  // Cap at 100
  score = Math.min(100, score);

  let level;
  if (score >= 60) level = 'high';
  else if (score >= 35) level = 'medium';
  else if (score >= 15) level = 'low';
  else level = 'none';

  return { score, level, factors, hasFingerprint: true, targetHour, targetDay };
}

// Backwards-compatible alias: getCurrentDangerScore = getDangerScoreAt(now)
function getCurrentDangerScore() {
  return getDangerScoreAt(null);
}

// --- 3b. 24-hour forecast: find the highest-risk window ahead ---
function get24HourForecast() {
  const fp = getTriggerFingerprint();
  if (!fp) return null;
  const now = new Date();
  // Sample every hour for the next 24 hours
  const hourly = [];
  for (let h = 1; h <= 24; h++) {
    const target = new Date(now.getTime() + h * 3600000);
    const s = getDangerScoreAt(target.getTime());
    hourly.push({
      hourOffset: h,
      time: target,
      hour: target.getHours(),
      day: target.getDay(),
      score: s ? s.score : 0,
      level: s ? s.level : 'none',
    });
  }
  // Find the contiguous high-risk window (score >= 35)
  let bestWindow = null;
  let currentWindow = null;
  for (const slot of hourly) {
    if (slot.score >= 35) {
      if (!currentWindow) currentWindow = { start: slot, end: slot, peak: slot, avgScore: slot.score, slots: [slot] };
      else {
        currentWindow.end = slot;
        currentWindow.slots.push(slot);
        if (slot.score > currentWindow.peak.score) currentWindow.peak = slot;
        currentWindow.avgScore = currentWindow.slots.reduce((a, s) => a + s.score, 0) / currentWindow.slots.length;
      }
    } else {
      if (currentWindow && (!bestWindow || currentWindow.peak.score > bestWindow.peak.score)) {
        bestWindow = currentWindow;
      }
      currentWindow = null;
    }
  }
  if (currentWindow && (!bestWindow || currentWindow.peak.score > bestWindow.peak.score)) {
    bestWindow = currentWindow;
  }
  if (!bestWindow) return { hourly, window: null, anyRisk: false };
  // Format the window
  const fmt = h => `${h % 12 || 12}${h < 12 ? 'am' : 'pm'}`;
  const startHour = bestWindow.start.hour;
  const endHour = (bestWindow.end.hour + 1) % 24;
  const dayLabel = (() => {
    const today = now.getDate();
    if (bestWindow.start.time.getDate() === today) return 'today';
    const tomorrow = new Date(now.getTime() + 86400000).getDate();
    if (bestWindow.start.time.getDate() === tomorrow) return 'tomorrow';
    return bestWindow.start.time.toLocaleDateString([], { weekday: 'long' });
  })();
  return {
    hourly,
    window: {
      label: `${fmt(startHour)}–${fmt(endHour)} ${dayLabel}`,
      peakHour: bestWindow.peak.hour,
      peakScore: bestWindow.peak.score,
      avgScore: Math.round(bestWindow.avgScore),
      durationHours: bestWindow.slots.length,
    },
    anyRisk: true,
  };
}

// --- 4. Satisfaction signature: foods that consistently disappoint or deliver ---
function getSatisfactionSignature() {
  const data = getSatisfactionPerCalorie();
  if (!data || data.length < 3) return null;
  const disappointing = data.filter(r => r.rawScore < 0.5 && r.count >= 2);
  const reliable = data.filter(r => r.rawScore >= 1.0 && r.count >= 2);
  // For each disappointing food, also compare anticipated vs actual
  const entries = state.entries.filter(e => e.actualSatisfaction != null && e.anticipatedSatisfaction != null);
  const overhypedByFood = {};
  for (const e of entries) {
    if (!overhypedByFood[e.name]) overhypedByFood[e.name] = { gap: 0, count: 0 };
    overhypedByFood[e.name].gap += e.anticipatedSatisfaction - e.actualSatisfaction;
    overhypedByFood[e.name].count++;
  }
  const overhyped = Object.keys(overhypedByFood)
    .filter(k => overhypedByFood[k].count >= 2)
    .map(k => ({ name: k, avgGap: overhypedByFood[k].gap / overhypedByFood[k].count, count: overhypedByFood[k].count }))
    .filter(r => r.avgGap >= 1) // anticipated at least 1 star higher than actual
    .sort((a, b) => b.avgGap - a.avgGap);
  return { disappointing, reliable, overhyped };
}

// --- 5. Identity breakdown: what kind of eater are you? ---
function getEatingIdentity() {
  const entries = state.entries.filter(e => e.type !== 'activity' && e.eatingReason);
  if (entries.length < 15) return null;
  const byReason = {};
  let total = 0;
  for (const e of entries) {
    byReason[e.eatingReason] = (byReason[e.eatingReason] || 0) + 1;
    total++;
  }
  // Group into 3 buckets: structured / emotional / social
  const structured = (byReason.hungry || 0) + (byReason.habit || 0);
  const emotional = (byReason.stressed || 0) + (byReason.bored || 0) + (byReason.craving || 0) + (byReason.tired || 0);
  const social = (byReason.social || 0) + (byReason.celebrating || 0);
  return {
    structuredPct: Math.round((structured / total) * 100),
    emotionalPct: Math.round((emotional / total) * 100),
    socialPct: Math.round((social / total) * 100),
    totalEntries: total,
    breakdown: byReason,
  };
}

// --- 6. THE MASTER FUNCTION — your full signature ---
// --- 7. PLATE SCORE — single composite metric the user can improve ---
// Weighted combination of behavioural skills (not weight).
//   25% Hunger awareness (% of eating that's "hungry" not emotional)
//   20% Meal satisfaction (avg actualSatisfaction rating)
//   20% Recovery ability (bounceback from slips)
//   15% Activity (weekly minutes)
//   10% Sleep (recent wellbeing)
//   10% Craving control (% urges beaten)
function getPlateScore() {
  const components = [];
  let totalWeight = 0;
  let weightedSum = 0;
  // Track gaps for transparency (components we skipped due to insufficient data)
  const missing = [];

  // 1. Hunger-driven eating — % of meals tagged as "hungry" reason (vs emotional)
  // RENAMED from "Hunger awareness" to avoid confusion with new hunger intensity (1-5 scale)
  const reasonedEntries = state.entries.filter(e => e.type !== 'activity' && e.eatingReason);
  if (reasonedEntries.length >= 7) {
    const hungry = reasonedEntries.filter(e => e.eatingReason === 'hungry').length;
    const pct = (hungry / reasonedEntries.length) * 100;
    let score;
    if (pct >= 70) score = 95;
    else if (pct >= 55) score = 80;
    else if (pct >= 40) score = 65;
    else if (pct >= 25) score = 45;
    else score = 25;
    components.push({
      name: 'Hunger-driven eating',
      score, weight: 0.28,
      raw: `${Math.round(pct)}% hungry-driven`,
      source: `from ${reasonedEntries.length} meals with reason tagged`,
    });
    totalWeight += 0.28;
    weightedSum += score * 0.28;
  } else {
    missing.push({ name: 'Hunger-driven eating', need: `7+ meals with reason tagged (have ${reasonedEntries.length})` });
  }

  // 2. Meal Satisfaction — avg actualSatisfaction
  const rated = state.entries.filter(e => e.actualSatisfaction != null);
  if (rated.length >= 5) {
    const avg = rated.reduce((a, e) => a + e.actualSatisfaction, 0) / rated.length;
    const score = Math.round((avg / 5) * 100);
    components.push({
      name: 'Meal satisfaction',
      score, weight: 0.22,
      raw: `${avg.toFixed(1)}/5 avg`,
      source: `from ${rated.length} rated meals`,
    });
    totalWeight += 0.22;
    weightedSum += score * 0.22;
  } else {
    missing.push({ name: 'Meal satisfaction', need: `5+ rated meals (have ${rated.length})` });
  }

  // 3. Recovery — needs slips/overshoots to compute
  const rec = getRecoveryScore();
  if (rec) {
    components.push({
      name: 'Recovery',
      score: rec.score, weight: 0.22,
      raw: rec.avgRecoveryDays != null ? `${rec.avgRecoveryDays} day avg` : 'no slips yet',
      source: rec.totalSlips != null ? `from ${rec.totalSlips} over-goal days` : 'baseline (no slips)',
    });
    totalWeight += 0.22;
    weightedSum += rec.score * 0.22;
  } else {
    missing.push({ name: 'Recovery', need: 'logging history needed to measure recovery' });
  }

  // 4. Activity — weekly minutes from last 14 days, only if any activity has been logged
  const cutoff = Date.now() - 14 * 86400000;
  const activityEntries = state.entries.filter(e => e.type === 'activity' && e.timestamp > cutoff);
  if (activityEntries.length >= 1) {
    const recentActMin = activityEntries.reduce((a, e) => a + (e.duration || 0), 0);
    const weeklyMin = recentActMin / 2;
    let actScore;
    if (weeklyMin >= 150) actScore = 95;
    else if (weeklyMin >= 90) actScore = 80;
    else if (weeklyMin >= 60) actScore = 65;
    else if (weeklyMin >= 30) actScore = 50;
    else actScore = 35;
    components.push({
      name: 'Activity',
      score: actScore, weight: 0.17,
      raw: `${Math.round(weeklyMin)} min/wk`,
      source: `from ${activityEntries.length} activit${activityEntries.length === 1 ? 'y' : 'ies'} in last 14 days`,
    });
    totalWeight += 0.17;
    weightedSum += actScore * 0.17;
  } else {
    missing.push({ name: 'Activity', need: 'no activities logged in last 14 days' });
  }

  // 5. Sleep — from DAILY check-ins (the new source) not the old weekly wellbeing
  const recentCheckins = (state.dailyCheckins || []).filter(c => c.timestamp > cutoff && c.sleepQuality != null);
  if (recentCheckins.length >= 3) {
    const avgQ = recentCheckins.reduce((a, c) => a + c.sleepQuality, 0) / recentCheckins.length;
    const sleepScore = Math.round((avgQ / 4) * 100); // sleepQuality is 1-4
    components.push({
      name: 'Sleep',
      score: sleepScore, weight: 0.11,
      raw: `${avgQ.toFixed(1)}/4 avg`,
      source: `from ${recentCheckins.length} daily check-ins`,
    });
    totalWeight += 0.11;
    weightedSum += sleepScore * 0.11;
  } else {
    missing.push({ name: 'Sleep', need: `3+ daily check-ins with sleep quality (have ${recentCheckins.length})` });
  }

  // 6. Craving Control — % of urges beaten
  const urges = state.urges || [];
  if (urges.length >= 3) {
    const beaten = urges.filter(u => u.ateAnyway === false).length;
    const pct = (beaten / urges.length) * 100;
    components.push({
      name: 'Craving control',
      score: Math.round(pct), weight: 0.11,
      raw: `${beaten}/${urges.length} beaten`,
      source: `from ${urges.length} logged urges`,
    });
    totalWeight += 0.11;
    weightedSum += pct * 0.11;
  } else {
    missing.push({ name: 'Craving control', need: `3+ urges logged (have ${urges.length})` });
  }

  // Refuse to compute a confident score with too-thin data
  // Need at least 3 components covering ≥50% of weight to make a meaningful composite
  if (components.length < 3 || totalWeight < 0.5) {
    return {
      ready: false,
      collecting: true,
      message: 'Collecting baseline data — your Plate Score will appear once you have at least 3 dimensions of data (typically 7-10 days of consistent use).',
      components,
      missing,
      gotWeight: totalWeight,
    };
  }

  const composite = Math.round(weightedSum / totalWeight);
  let band;
  if (composite >= 80) band = 'thriving';
  else if (composite >= 65) band = 'strong';
  else if (composite >= 50) band = 'building';
  else if (composite >= 35) band = 'developing';
  else band = 'starting';

  return { ready: true, composite, band, components, missing, totalWeight };
}

// --- Historical Plate Score (for trend) ---
// Stored daily snapshot in localStorage so we can show "67 → 74" trend
const STORAGE_PLATE_SCORE_HISTORY = 'plate-score-history';
function loadPlateScoreHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_PLATE_SCORE_HISTORY) || '[]'); } catch { return []; }
}
function savePlateScoreSnapshot() {
  const current = getPlateScore();
  if (!current.ready) return;
  const today = entryDate(Date.now());
  const history = loadPlateScoreHistory();
  // One snapshot per day
  const todayIdx = history.findIndex(h => h.date === today);
  const snapshot = { date: today, score: current.composite, timestamp: Date.now() };
  if (todayIdx >= 0) history[todayIdx] = snapshot;
  else history.push(snapshot);
  // Keep last 90 days
  const cutoff = Date.now() - 90 * 86400000;
  const trimmed = history.filter(h => h.timestamp > cutoff);
  try { localStorage.setItem(STORAGE_PLATE_SCORE_HISTORY, JSON.stringify(trimmed)); } catch {}
}
function getPlateScoreTrend() {
  const history = loadPlateScoreHistory();
  if (history.length < 2) return null;
  const sorted = [...history].sort((a, b) => a.timestamp - b.timestamp);
  const current = sorted[sorted.length - 1].score;
  // Find a snapshot ~30 days ago
  const targetTime = Date.now() - 30 * 86400000;
  const past = sorted.find(h => h.timestamp >= targetTime) || sorted[0];
  const change = current - past.score;
  return { current, past: past.score, change, days: Math.round((sorted[sorted.length-1].timestamp - past.timestamp) / 86400000) };
}

// --- 7b. Satisfaction Efficiency Index (single number, last 30 days) ---
// Only meals rated 3+ stars count — otherwise low-quality low-cal food games the metric.
// ============================================================
// BEHAVIOURAL ENTROPY (EXPERIMENTAL)
// Shannon entropy applied to behavioural dimensions:
//   - Meal timing (hour-of-day distribution)
//   - Caloric distribution (daily total variance)
//   - Eating reason distribution
//   - Mood distribution
// Hypothesis: rising entropy precedes loss-of-control eating events.
// Status: experimental — to be validated against actual outcomes.
// ============================================================
function shannonEntropy(counts) {
  const total = counts.reduce((a, b) => a + b, 0);
  if (total === 0) return 0;
  let H = 0;
  for (const c of counts) {
    if (c === 0) continue;
    const p = c / total;
    H -= p * Math.log2(p);
  }
  return H;
}

function normalizedEntropy(counts) {
  // Normalize to 0-1 by dividing by max possible entropy (log2(n_bins))
  const n = counts.length;
  if (n <= 1) return 0;
  const H = shannonEntropy(counts);
  return H / Math.log2(n);
}

function getBehaviouralEntropy(windowDays) {
  windowDays = windowDays || 14;
  const cutoff = Date.now() - windowDays * 86400000;
  const entries = state.entries.filter(e => e.type !== 'activity' && e.timestamp > cutoff);
  if (entries.length < 7) return null; // need at least a week of food data

  // 1. Temporal entropy — bin meal times into 4-hour windows (6 bins)
  const timeBins = new Array(6).fill(0);
  for (const e of entries) {
    const h = new Date(e.timestamp).getHours();
    timeBins[Math.floor(h / 4)]++;
  }
  const temporalEntropy = normalizedEntropy(timeBins);

  // 2. Caloric entropy — daily totals binned into ranges
  const byDay = {};
  for (const e of entries) {
    const d = entryDate(e.timestamp);
    byDay[d] = (byDay[d] || 0) + (e.calories || 0);
  }
  const dailyTotals = Object.values(byDay);
  if (dailyTotals.length < 5) return null;
  // Coefficient of variation as a simpler measure (std/mean), normalized
  const mean = dailyTotals.reduce((a, b) => a + b, 0) / dailyTotals.length;
  const variance = dailyTotals.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / dailyTotals.length;
  const std = Math.sqrt(variance);
  const cv = mean > 0 ? std / mean : 0;
  // Normalize: CV of 0 = perfectly regular (entropy=0); CV of 0.4+ = high variability
  const caloricEntropy = Math.min(1, cv / 0.4);

  // 3. Eating reason entropy
  const reasoned = entries.filter(e => e.eatingReason);
  let reasonEntropy = null;
  if (reasoned.length >= 8) {
    const reasonCounts = {};
    for (const e of reasoned) reasonCounts[e.eatingReason] = (reasonCounts[e.eatingReason] || 0) + 1;
    reasonEntropy = normalizedEntropy(Object.values(reasonCounts));
  }

  // 4. Mood entropy
  const mooded = entries.filter(e => e.mood);
  let moodEntropy = null;
  if (mooded.length >= 8) {
    const moodCounts = {};
    for (const e of mooded) moodCounts[e.mood] = (moodCounts[e.mood] || 0) + 1;
    moodEntropy = normalizedEntropy(Object.values(moodCounts));
  }

  // Composite (average of available)
  const components = [temporalEntropy, caloricEntropy];
  if (reasonEntropy != null) components.push(reasonEntropy);
  if (moodEntropy != null) components.push(moodEntropy);
  const composite = components.reduce((a, b) => a + b, 0) / components.length;

  // Trend: compare last 7 days to previous 7 days
  let trend = null;
  if (windowDays === 14 && entries.length >= 14) {
    const recent = state.entries.filter(e => e.type !== 'activity' && e.timestamp > Date.now() - 7 * 86400000);
    const older = state.entries.filter(e => e.type !== 'activity' && e.timestamp > Date.now() - 14 * 86400000 && e.timestamp <= Date.now() - 7 * 86400000);
    if (recent.length >= 5 && older.length >= 5) {
      // Compute composite for each half
      const halfComputation = (sample) => {
        const tb = new Array(6).fill(0);
        for (const e of sample) tb[Math.floor(new Date(e.timestamp).getHours() / 4)]++;
        const td = normalizedEntropy(tb);
        const dt = {};
        for (const e of sample) dt[entryDate(e.timestamp)] = (dt[entryDate(e.timestamp)] || 0) + (e.calories || 0);
        const vals = Object.values(dt);
        const m = vals.reduce((a, b) => a + b, 0) / vals.length;
        const v = vals.reduce((a, b) => a + (b - m) ** 2, 0) / vals.length;
        const cvLocal = m > 0 ? Math.sqrt(v) / m : 0;
        const cd = Math.min(1, cvLocal / 0.4);
        return (td + cd) / 2;
      };
      const recentH = halfComputation(recent);
      const olderH = halfComputation(older);
      trend = {
        delta: recentH - olderH,
        direction: recentH > olderH + 0.05 ? 'rising' : recentH < olderH - 0.05 ? 'falling' : 'stable',
      };
    }
  }

  return {
    composite: parseFloat(composite.toFixed(3)),
    temporal: parseFloat(temporalEntropy.toFixed(3)),
    caloric: parseFloat(caloricEntropy.toFixed(3)),
    reason: reasonEntropy != null ? parseFloat(reasonEntropy.toFixed(3)) : null,
    mood: moodEntropy != null ? parseFloat(moodEntropy.toFixed(3)) : null,
    trend,
    windowDays,
    sampleSize: entries.length,
  };
}

// ============================================================
// SUSTAINABILITY & REBOUND RISK
// ============================================================
// The core thesis: most diets fail because hunger becomes unsustainable
// after 2-4 weeks, not because of insufficient calorie counting. GLP-1 drugs
// (Mounjaro etc.) succeed by suppressing hunger biologically — Plate's
// behavioural equivalent is detecting unsustainability BEFORE the rebound.
//
// Rebound Risk formula (simple, testable, refineable):
//   risk = (avgHunger + avgCraving) / (avgSatisfaction + 1)
// Higher = more likely to rebound. Lower = sustainable.
// Plus trend detection: rising hunger over 2 weeks vs prior 2 weeks.
// ============================================================

function getHungerStats(windowDays) {
  windowDays = windowDays || 14;
  const cutoff = Date.now() - windowDays * 86400000;
  // 1) hungerAtMeal from food entries (richer signal — sampled at every meal)
  const mealHungers = state.entries
    .filter(e => e.type !== 'activity' && e.hungerAtMeal != null && e.timestamp > cutoff)
    .map(e => ({ value: e.hungerAtMeal, timestamp: e.timestamp, hour: new Date(e.timestamp).getHours() }));
  // 2) daily check-in hunger (one per day, baseline reading)
  const checkinHungers = (state.dailyCheckins || [])
    .filter(c => c.hunger != null && c.timestamp > cutoff)
    .map(c => ({ value: c.hunger, timestamp: c.timestamp, hour: 12 })); // anchor at noon
  const all = [...mealHungers, ...checkinHungers];
  if (all.length < 3) return null;
  const avg = all.reduce((a, x) => a + x.value, 0) / all.length;
  const peak = Math.max(...all.map(x => x.value));
  // Evening hunger (after 5pm) — separated because that's the rebound danger zone
  const evening = all.filter(x => x.hour >= 17);
  const eveningAvg = evening.length > 0 ? evening.reduce((a, x) => a + x.value, 0) / evening.length : null;
  return {
    avg: parseFloat(avg.toFixed(2)),
    peak,
    eveningAvg: eveningAvg != null ? parseFloat(eveningAvg.toFixed(2)) : null,
    sample: all.length,
    mealSample: mealHungers.length,
    checkinSample: checkinHungers.length,
  };
}

function getCravingStats(windowDays) {
  windowDays = windowDays || 14;
  const cutoff = Date.now() - windowDays * 86400000;
  // From daily check-ins (most reliable craving data)
  const checkinCravings = (state.dailyCheckins || [])
    .filter(c => c.craving != null && c.timestamp > cutoff)
    .map(c => c.craving);
  if (checkinCravings.length < 3) return null;
  const avg = checkinCravings.reduce((a, b) => a + b, 0) / checkinCravings.length;
  return {
    avg: parseFloat(avg.toFixed(2)),
    sample: checkinCravings.length,
  };
}

function getSatisfactionStats(windowDays) {
  windowDays = windowDays || 14;
  const cutoff = Date.now() - windowDays * 86400000;
  const rated = state.entries.filter(e => e.type !== 'activity' && e.actualSatisfaction != null && e.timestamp > cutoff);
  if (rated.length < 3) return null;
  const avg = rated.reduce((a, e) => a + e.actualSatisfaction, 0) / rated.length;
  return {
    avg: parseFloat(avg.toFixed(2)),
    sample: rated.length,
  };
}

// Trend: compare 7 days ending now vs 7 days before that
// We shift the timestamps of the "older" window forward by 7 days so the
// getter (which always filters relative to now) sees them inside its window.
function getMetricTrend(getter) {
  const sevenDays = 7 * 86400000;
  const fourteenDays = 14 * 86400000;
  const savedEntries = state.entries;
  const savedCheckins = state.dailyCheckins;
  const cutoffNow = Date.now();

  // Recent window: entries within last 7 days, as-is
  const recentEntries = savedEntries.filter(e => e.timestamp > cutoffNow - sevenDays);
  const recentCheckins = (savedCheckins || []).filter(c => c.timestamp > cutoffNow - sevenDays);
  state.entries = recentEntries;
  state.dailyCheckins = recentCheckins;
  const recent = getter(7);

  // Older window: entries from 7-14 days ago, time-shifted forward by 7 days
  // so the getter (which filters with cutoff = Date.now() - windowDays*day) sees them
  const olderEntries = savedEntries
    .filter(e => e.timestamp > cutoffNow - fourteenDays && e.timestamp <= cutoffNow - sevenDays)
    .map(e => ({ ...e, timestamp: e.timestamp + sevenDays }));
  const olderCheckins = (savedCheckins || [])
    .filter(c => c.timestamp > cutoffNow - fourteenDays && c.timestamp <= cutoffNow - sevenDays)
    .map(c => ({ ...c, timestamp: c.timestamp + sevenDays }));
  state.entries = olderEntries;
  state.dailyCheckins = olderCheckins;
  const older = getter(7);

  // Restore
  state.entries = savedEntries;
  state.dailyCheckins = savedCheckins;

  if (!recent || !older) return null;
  const delta = recent.avg - older.avg;
  const pctChange = older.avg > 0 ? Math.round((delta / older.avg) * 100) : 0;
  return { recent: recent.avg, older: older.avg, delta, pctChange };
}

// ============================================================
// SUSTAINABILITY SCORE (0-100, higher = more sustainable)
// REBOUND RISK (0-100, higher = more likely to rebound)
// ============================================================
function getSustainabilityScore() {
  const hunger = getHungerStats(14);
  const craving = getCravingStats(14);
  const sat = getSatisfactionStats(14);

  // Need at least hunger and one other dimension
  if (!hunger) return { ready: false, reason: 'need_hunger', message: 'Log hunger at meals (or in daily check-in) for 7+ days to compute sustainability.' };

  // Compute rebound index: (hunger + craving) / (satisfaction + 1)
  // Use defaults if missing: cravings default to 2 (mild), satisfaction defaults to 3 (neutral)
  const h = hunger.avg;
  const c = craving ? craving.avg : 2;
  const s = sat ? sat.avg : 3;
  const reboundIndex = (h + c) / (s + 1); // typically ranges 0.2 to 5
  // Convert to 0-100 risk: rebound > 3 maps to high risk
  // Calibration: index 1 = 25 risk, 2 = 50 risk, 3 = 75 risk, 4+ = 90+ risk
  let reboundRisk = Math.min(100, Math.round(reboundIndex * 25));

  // Trend signals
  const hungerTrend = getMetricTrend(getHungerStats);
  const satTrend = getMetricTrend(getSatisfactionStats);
  const cravingTrend = getMetricTrend(getCravingStats);

  // Warning conditions — and trend penalties on the score
  const warnings = [];
  let trendPenalty = 0;
  if (hungerTrend && hungerTrend.pctChange >= 25) {
    warnings.push({
      severity: 'high',
      text: `Hunger has risen ${hungerTrend.pctChange}% over the last 7 days compared to the week before.`,
    });
    trendPenalty += 15;
  } else if (hungerTrend && hungerTrend.pctChange >= 15) {
    warnings.push({
      severity: 'medium',
      text: `Hunger has risen ${hungerTrend.pctChange}% recently — early warning sign.`,
    });
    trendPenalty += 8;
  }
  if (satTrend && satTrend.pctChange <= -25) {
    warnings.push({
      severity: 'high',
      text: `Meal satisfaction has fallen ${Math.abs(satTrend.pctChange)}% recently. Food is paying you back less.`,
    });
    trendPenalty += 12;
  } else if (satTrend && satTrend.pctChange <= -15) {
    warnings.push({
      severity: 'medium',
      text: `Satisfaction is drifting down (${satTrend.pctChange}%).`,
    });
    trendPenalty += 6;
  }
  if (cravingTrend && cravingTrend.pctChange >= 25) {
    warnings.push({
      severity: 'high',
      text: `Cravings have risen ${cravingTrend.pctChange}% recently.`,
    });
    trendPenalty += 10;
  }
  if (hunger.eveningAvg != null && hunger.eveningAvg >= 4) {
    warnings.push({
      severity: 'medium',
      text: `Evening hunger averaging ${hunger.eveningAvg}/5 — high-risk window for late-night eating.`,
    });
    trendPenalty += 5;
  }

  reboundRisk = Math.min(100, reboundRisk + trendPenalty);
  const sustainabilityScore = 100 - reboundRisk;

  // Band
  let band, color, message;
  if (sustainabilityScore >= 75) {
    band = 'highly sustainable';
    color = 'green';
    message = `Hunger is manageable. Satisfaction is solid. This is the kind of pattern that lasts.`;
  } else if (sustainabilityScore >= 55) {
    band = 'sustainable';
    color = 'green';
    message = `Doable for now. Watch for rising hunger or falling satisfaction over the next 2 weeks.`;
  } else if (sustainabilityScore >= 35) {
    band = 'strained';
    color = 'amber';
    message = `Tension is building. Hunger or cravings are climbing relative to satisfaction. The rebound risk is real.`;
  } else if (sustainabilityScore >= 20) {
    band = 'high rebound risk';
    color = 'red';
    message = `This pattern often precedes a rebound. Hunger is winning. Consider easing the deficit — sustainability > speed.`;
  } else {
    band = 'unsustainable';
    color = 'red';
    message = `Hunger and cravings are dominating. A rebound is likely within days unless something changes. Slower loss now beats restart later.`;
  }

  return {
    ready: true,
    sustainabilityScore,
    reboundRisk,
    reboundIndex: parseFloat(reboundIndex.toFixed(2)),
    band,
    color,
    message,
    hunger,
    craving,
    sat,
    hungerTrend,
    satTrend,
    cravingTrend,
    warnings,
  };
}

function getSEI() {
  const cutoff = Date.now() - 30 * 86400000;
  const rated = state.entries.filter(e => e.type !== 'activity' && e.actualSatisfaction != null && e.actualSatisfaction >= 3 && e.calories > 0 && e.timestamp > cutoff);
  if (rated.length < 5) return null;
  // SEI = satisfaction per 100 kcal, averaged across qualifying meals
  let totalSat = 0;
  let totalCal = 0;
  for (const e of rated) {
    totalSat += e.actualSatisfaction;
    totalCal += e.calories;
  }
  const sei = (totalSat / (totalCal / 100));
  // Top/bottom foods by SEI — for the "bottom" we INCLUDE low-satisfaction foods
  const allRated = state.entries.filter(e => e.type !== 'activity' && e.actualSatisfaction != null && e.calories > 0 && e.timestamp > cutoff);
  const byFood = {};
  for (const e of allRated) {
    if (!byFood[e.name]) byFood[e.name] = { sat: 0, cal: 0, count: 0 };
    byFood[e.name].sat += e.actualSatisfaction;
    byFood[e.name].cal += e.calories;
    byFood[e.name].count++;
  }
  // For top: only count foods that hit 3+ avg satisfaction
  const ranked = Object.keys(byFood)
    .filter(n => byFood[n].count >= 2)
    .map(n => ({
      name: n,
      sei: byFood[n].sat / (byFood[n].cal / 100),
      count: byFood[n].count,
      avgCal: Math.round(byFood[n].cal / byFood[n].count),
      avgSat: byFood[n].sat / byFood[n].count,
    }));
  const top = ranked.filter(r => r.avgSat >= 3).sort((a, b) => b.sei - a.sei).slice(0, 3);
  // Bottom: foods with low SEI AND low satisfaction (the "disappointing" ones)
  const disappointing = ranked.filter(r => r.avgSat < 3).sort((a, b) => a.avgSat - b.avgSat).slice(0, 3);

  return {
    overall: parseFloat(sei.toFixed(2)),
    ratedMeals: rated.length,
    top,
    bottom: disappointing,
  };
}

function getYourSignature() {
  const totalEntries = state.entries.length;
  if (totalEntries < 5) {
    return {
      ready: false,
      stage: 'getting_started',
      message: `Your personalized profile sharpens at 14 entries. You have ${totalEntries}.`,
      progress: Math.round((totalEntries / 14) * 100),
    };
  }
  const fingerprint = getTriggerFingerprint();
  const interrupts = getInterruptEffectiveness();
  const satSig = getSatisfactionSignature();
  const identity = getEatingIdentity();
  const danger = getCurrentDangerScore();
  const future = getFutureYou(12);
  const recovery = getRecoveryScore();
  const dataPoints = {
    entries: state.entries.length,
    urges: (state.urges || []).length,
    measurements: (state.measurements || []).length,
    daysTracked: getDaysSinceStart(),
  };
  return {
    ready: true,
    fingerprint,
    interrupts,
    satSig,
    identity,
    danger,
    future,
    recovery,
    dataPoints,
  };
}

function getEmotionalEatingMap() {
  const entries = state.entries.filter(e => e.type !== 'activity' && e.eatingReason);
  if (entries.length < 10) return null;
  // Group reasons into categories
  const categories = {
    hungry: { label: 'Hunger', emoji: '🍽', kcal: 0, count: 0 },
    stressed: { label: 'Stress', emoji: '😩', kcal: 0, count: 0 },
    bored: { label: 'Boredom', emoji: '😐', kcal: 0, count: 0 },
    celebrating: { label: 'Celebration', emoji: '🎉', kcal: 0, count: 0 },
    social: { label: 'Social', emoji: '👥', kcal: 0, count: 0 },
    habit: { label: 'Habit', emoji: '⏰', kcal: 0, count: 0 },
    craving: { label: 'Craving', emoji: '🌪', kcal: 0, count: 0 },
    tired: { label: 'Tiredness', emoji: '😴', kcal: 0, count: 0 },
  };
  let totalKcal = 0;
  for (const e of entries) {
    const cat = categories[e.eatingReason];
    if (!cat) continue;
    cat.kcal += e.calories || 0;
    cat.count++;
    totalKcal += e.calories || 0;
  }
  if (totalKcal === 0) return null;
  const breakdown = Object.keys(categories)
    .filter(k => categories[k].count > 0)
    .map(k => ({
      key: k,
      ...categories[k],
      pct: Math.round((categories[k].kcal / totalKcal) * 100),
    }))
    .sort((a, b) => b.pct - a.pct);
  // Identify dominant non-hunger
  const nonHunger = breakdown.filter(b => b.key !== 'hungry');
  const dominantNonHunger = nonHunger[0];
  let insight = null;
  if (dominantNonHunger && dominantNonHunger.pct >= 25) {
    insight = `Most of your non-hunger eating is driven by <strong>${dominantNonHunger.label.toLowerCase()}</strong>. That's the lever — not "more willpower".`;
  } else {
    const hungerCat = breakdown.find(b => b.key === 'hungry');
    if (hungerCat && hungerCat.pct >= 60) {
      insight = `<strong>${hungerCat.pct}% of your eating is actual hunger.</strong> Your relationship with food is healthier than you think.`;
    }
  }
  return { breakdown, insight, totalKcal: Math.round(totalKcal) };
}

// ============================================================
// INSIGHTS — observed patterns from logged behavior
// ============================================================
function getInsights() {
  const out = [];
  const entries = state.entries.filter(e => e.type !== 'activity');
  if (entries.length < 14) {
    out.push({
      type: 'meta',
      icon: '⏳',
      title: 'Patterns emerge over time',
      body: `${entries.length}/14 entries until insights unlock. Keep logging — the more you log, the more this app understands you.`,
    });
    return out;
  }

  // 1. Average daily intake
  const byDay = {};
  for (const e of entries) {
    const k = entryDate(e.timestamp);
    if (!byDay[k]) byDay[k] = 0;
    byDay[k] += e.calories || 0;
  }
  const dayKeys = Object.keys(byDay);
  const avg = Math.round(dayKeys.reduce((a, k) => a + byDay[k], 0) / dayKeys.length);
  const diff = avg - state.dailyGoal;
  if (Math.abs(diff) > 150) {
    out.push({
      type: 'target',
      icon: '🎯',
      title: diff > 0 ? `You're averaging ${avg} kcal/day — ${diff} above goal` : `You're averaging ${avg} kcal/day — ${-diff} below goal`,
      body: `Over ${dayKeys.length} days. Want to adjust your daily target to match what's realistic for you?`,
      actionLabel: 'Adjust goal to ' + avg,
      actionType: 'set_goal',
      actionValue: avg,
    });
  }

  // 2. Mood eating pattern
  const moodGroups = {};
  for (const e of entries) {
    if (!e.mood) continue;
    if (!moodGroups[e.mood]) moodGroups[e.mood] = { total: 0, count: 0 };
    moodGroups[e.mood].total += e.calories || 0;
    moodGroups[e.mood].count++;
  }
  const moodAvgs = {};
  for (const m of Object.keys(moodGroups)) {
    if (moodGroups[m].count >= 3) moodAvgs[m] = moodGroups[m].total / moodGroups[m].count;
  }
  if (moodAvgs.stressed && moodAvgs.ok) {
    const pct = Math.round(((moodAvgs.stressed - moodAvgs.ok) / moodAvgs.ok) * 100);
    if (pct > 15) {
      out.push({
        type: 'mood',
        icon: '😩',
        title: `You eat ${pct}% more on stressed days`,
        body: `Avg ${Math.round(moodAvgs.stressed)} kcal/entry when stressed vs ${Math.round(moodAvgs.ok)} when OK. Worth noticing what triggers the stress eating.`,
      });
    }
  }
  if (moodAvgs.down && moodAvgs.great) {
    const pct = Math.round(((moodAvgs.down - moodAvgs.great) / moodAvgs.great) * 100);
    if (pct > 15) {
      out.push({
        type: 'mood',
        icon: '😞',
        title: `Low mood = ${pct}% more food`,
        body: `Your low-mood entries average more calories than your good-mood ones. Food often gets used to manage mood. Naming it helps.`,
      });
    }
  }

  // 3. Time-of-day pattern
  const hourBuckets = { morning: 0, lunch: 0, afternoon: 0, evening: 0, night: 0 };
  for (const e of entries) {
    const h = new Date(e.timestamp).getHours();
    let bucket;
    if (h >= 5 && h < 11) bucket = 'morning';
    else if (h >= 11 && h < 14) bucket = 'lunch';
    else if (h >= 14 && h < 17) bucket = 'afternoon';
    else if (h >= 17 && h < 22) bucket = 'evening';
    else bucket = 'night';
    hourBuckets[bucket] += e.calories || 0;
  }
  const total = Object.values(hourBuckets).reduce((a,b)=>a+b, 0);
  if (total > 0) {
    const eveningPct = Math.round((hourBuckets.evening + hourBuckets.night) / total * 100);
    if (eveningPct >= 55) {
      out.push({
        type: 'timing',
        icon: '🌙',
        title: `${eveningPct}% of your calories are after 5pm`,
        body: 'Heavy evening eating is one of the strongest predictors of weight gain at the same calorie total. Earlier shifts often help.',
      });
    }
    const nightPct = Math.round(hourBuckets.night / total * 100);
    if (nightPct >= 15) {
      out.push({
        type: 'timing',
        icon: '🌃',
        title: `${nightPct}% of your eating happens late night`,
        body: 'Late night eating after 10pm. Often boredom or screen-related rather than hunger.',
      });
    }
  }

  // 4. Day of week
  const dowBuckets = [0,0,0,0,0,0,0];
  const dowCount = [0,0,0,0,0,0,0];
  for (const k of dayKeys) {
    const d = new Date(k + 'T12:00:00');
    dowBuckets[d.getDay()] += byDay[k];
    dowCount[d.getDay()]++;
  }
  const dowAvg = dowBuckets.map((t, i) => dowCount[i] > 0 ? t / dowCount[i] : 0);
  const weekdayAvg = (dowAvg[1] + dowAvg[2] + dowAvg[3] + dowAvg[4] + dowAvg[5]) / 5;
  const weekendAvg = (dowAvg[0] + dowAvg[6]) / 2;
  if (weekdayAvg > 0 && weekendAvg > 0) {
    const pct = Math.round((weekendAvg - weekdayAvg) / weekdayAvg * 100);
    if (Math.abs(pct) > 12) {
      out.push({
        type: 'dow',
        icon: pct > 0 ? '🎉' : '📅',
        title: pct > 0 ? `Weekends are ${pct}% higher` : `Weekdays are ${-pct}% higher`,
        body: pct > 0 ? `Weekend avg ${Math.round(weekendAvg)} vs weekday ${Math.round(weekdayAvg)} kcal. Plan for it instead of pretending it won't happen.` : `Working days are heavier. Often workplace snacking or stress eating.`,
      });
    }
  }

  // 5. Satisfaction gap
  const satGaps = getSatisfactionGapByCategory();
  const bigGaps = satGaps.filter(s => parseFloat(s.gap) >= 1.5);
  if (bigGaps.length > 0) {
    const top = bigGaps[0];
    out.push({
      type: 'satisfaction',
      icon: '🪞',
      title: `${top.name} disappoints you`,
      body: `You expected ${top.anticipated}/5 but actually rated it ${top.actual}/5 across ${top.count} times. The anticipation isn't matching reality. Worth knowing before the next craving hits.`,
    });
  }

  // 6. Exercise pattern
  const acts = state.entries.filter(e => e.type === 'activity');
  const recentActs = acts.filter(e => e.timestamp > Date.now() - 14 * 86400000);
  if (acts.length >= 5) {
    const perWeek = (recentActs.length / 2).toFixed(1);
    out.push({
      type: 'exercise',
      icon: '🏃',
      title: `${perWeek} workouts per week`,
      body: `Over the last 2 weeks. Consistency matters more than intensity at this stage.`,
    });
  }

  return out;
}

// CUSTOM FOODS (user-added branded items)
// ============================================================
function rebuildKeysIndex() {
  ALL_KEYS.length = 0;
  for (const food of FOODS) {
    for (const key of food.keys) {
      const norm = normalize(key);
      ALL_KEYS.push({ food, key: norm, keyWords: norm.split(' ') });
    }
  }
  for (const food of (state.customFoods || [])) {
    const allKeys = [food.display, ...(food.aliases || [])];
    for (const key of allKeys) {
      if (!key) continue;
      const norm = normalize(key);
      if (!norm) continue;
      ALL_KEYS.push({ food, key: norm, keyWords: norm.split(' '), isCustom: true });
    }
  }
  ALL_KEYS.sort((a, b) => b.keyWords.length - a.keyWords.length || b.key.length - a.key.length);
}

function addCustomFood(draft) {
  const cal = parseFloat(draft.cal) || 0;
  if (!draft.display || cal <= 0) return false;
  const newFood = {
    id: 'cf_' + Date.now(),
    display: draft.display.trim(),
    aliases: (draft.aliases || '').split(',').map(s => s.trim()).filter(Boolean),
    unit: draft.unit?.trim() || 'serving',
    cal: cal,
    c: parseFloat(draft.c) || 0,
    p: parseFloat(draft.p) || 0,
    f: parseFloat(draft.f) || 0,
    scalable: true,
    isCustom: true,
    source: 'custom',
    addedAt: Date.now(),
  };
  const updated = [...state.customFoods, newFood];
  saveCustomFoods(updated);
  state.customFoods = updated;
  rebuildKeysIndex();
  return true;
}

function deleteCustomFood(id) {
  if (!confirm('Delete this custom food?')) return;
  const updated = state.customFoods.filter(f => f.id !== id);
  saveCustomFoods(updated);
  state.customFoods = updated;
  rebuildKeysIndex();
  render();
}

function startCustomFoodAdd() {
  set({ showCustomFoods: true, customFoodDraft: { display: '', aliases: '', unit: 'serving', cal: 200, c: 25, p: 5, f: 5 } });

function startAddCustomFoodFromUnmatched(name) {

  const display = name.replace(/\b\w/g, c => c.toUpperCase()).trim();

}

async function urgeBeginPulseBefore() {
  // Mark we are capturing
  set({ urgeDraft: { ...state.urgeDraft, step: 'pulse-before-capturing' } });
  // Wait for video element to render before capturing
  await new Promise(r => setTimeout(r, 50));
  const bpm = await captureUrgePulse(15, 'urge-pulse-video-before');
  if (state.urgeDraft) { // user may have cancelled
    if (bpm) savePulseReading(bpm, 'urge');
    set({ urgeDraft: { ...state.urgeDraft, pulseBefore: bpm, step: 'doing', interruptStartedAt: Date.now() } });
    if (state.urgeDraft.interruptType === 'move') {
      startMotionDetection();
    }
  }
}

function urgeSkipPulseBefore() {
  set({ urgeDraft: { ...state.urgeDraft, pulseSkipped: true, step: 'doing', interruptStartedAt: Date.now() } });
  if (state.urgeDraft.interruptType === 'move') {
    startMotionDetection();
  }
}

function urgeTapBreath() {
  if (!state.urgeDraft) return;
  set({ urgeDraft: { ...state.urgeDraft, breathingFollowed: (state.urgeDraft.breathingFollowed || 0) + 1 } });
}

async function urgeFinishInterrupt() {
  stopMotionDetection();
  // If pulse was taken before, take it after too
  if (state.urgeDraft.pulseBefore != null) {
    set({ urgeDraft: { ...state.urgeDraft, step: 'pulse-after-capturing', interruptEndedAt: Date.now() } });
    await new Promise(r => setTimeout(r, 50));
    const bpm = await captureUrgePulse(15, 'urge-pulse-video-after');
    if (state.urgeDraft) {
      if (bpm) savePulseReading(bpm, 'urge');
      set({ urgeDraft: { ...state.urgeDraft, pulseAfter: bpm, step: 'rate-final' } });
    }
  } else {
    set({ urgeDraft: { ...state.urgeDraft, step: 'rate-final', interruptEndedAt: Date.now() } });
  }
}

  } else {
    set({ urgeDraft: null, showUrge: false });

function getUrgeStats() {
  const u = state.urges;
  if (u.length === 0) return null;
  const beaten = u.filter(x => x.ateAnyway === false).length;
  const total = u.filter(x => x.ateAnyway != null).length;
  const successRate = total > 0 ? Math.round((beaten / total) * 100) : 0;
  const intensitySamples = u.filter(x => x.initialIntensity && x.finalIntensity);
  const avgDrop = intensitySamples.length > 0
    ? intensitySamples.reduce((a, x) => a + (x.initialIntensity - x.finalIntensity), 0) / intensitySamples.length
    : 0;
  const byInterrupt = {};
  for (const x of u) {
    if (!x.interruptType || x.initialIntensity == null || x.finalIntensity == null) continue;
    if (!byInterrupt[x.interruptType]) byInterrupt[x.interruptType] = { total: 0, count: 0 };
    byInterrupt[x.interruptType].total += (x.initialIntensity - x.finalIntensity);
    byInterrupt[x.interruptType].count++;
  }
  let bestInterrupt = null, bestDrop = 0;
  for (const k of Object.keys(byInterrupt)) {
    const avg = byInterrupt[k].total / byInterrupt[k].count;
    if (avg > bestDrop) { bestDrop = avg; bestInterrupt = k; }
  }
  return { total: u.length, beaten, successRate, avgDrop: avgDrop.toFixed(1), bestInterrupt, bestDrop: bestDrop.toFixed(1) };
}

// ============================================================
// CASCADE DETECTION — find your personal urge patterns
// ============================================================
function getCascadePatterns() {
  const u = state.urges;
  if (u.length < 5) return null;

  const result = { totalUrges: u.length };

  // 1. Time-of-day pattern
  const hourBuckets = { morning: 0, midday: 0, afternoon: 0, evening: 0, night: 0 };
  for (const x of u) {
    const h = x.hour;
    if (h >= 6 && h < 11) hourBuckets.morning++;
    else if (h >= 11 && h < 14) hourBuckets.midday++;
    else if (h >= 14 && h < 17) hourBuckets.afternoon++;
    else if (h >= 17 && h < 22) hourBuckets.evening++;
    else hourBuckets.night++;
  }
  const topHour = Object.keys(hourBuckets).sort((a, b) => hourBuckets[b] - hourBuckets[a])[0];
  if (hourBuckets[topHour] >= Math.max(3, u.length * 0.4)) {
    result.topTime = { period: topHour, count: hourBuckets[topHour] };
  }

  // 2. Day-of-week pattern
  const dowBuckets = [0,0,0,0,0,0,0];
  for (const x of u) dowBuckets[x.dayOfWeek]++;
  const topDow = dowBuckets.indexOf(Math.max(...dowBuckets));
  if (dowBuckets[topDow] >= Math.max(3, u.length * 0.3)) {
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    result.topDay = { day: days[topDow], count: dowBuckets[topDow] };
  }

  // 3. Trigger pattern
  const triggerCounts = {};
  for (const x of u) {
    if (!x.trigger) continue;
    triggerCounts[x.trigger] = (triggerCounts[x.trigger] || 0) + 1;
  }
  const topTrigger = Object.keys(triggerCounts).sort((a, b) => triggerCounts[b] - triggerCounts[a])[0];
  if (topTrigger && triggerCounts[topTrigger] >= 3) {
    result.topTrigger = { trigger: topTrigger, count: triggerCounts[topTrigger] };
  }

  // 4. Best interrupt
  const interruptResults = {};
  for (const x of u) {
    if (!x.interruptType || x.initialIntensity == null || x.finalIntensity == null) continue;
    if (!interruptResults[x.interruptType]) interruptResults[x.interruptType] = { drops: [], beaten: 0, attempts: 0 };
    interruptResults[x.interruptType].drops.push(x.initialIntensity - x.finalIntensity);
    if (x.ateAnyway === false) interruptResults[x.interruptType].beaten++;
    if (x.ateAnyway != null) interruptResults[x.interruptType].attempts++;
  }
  let bestInt = null, bestRate = 0;
  for (const k of Object.keys(interruptResults)) {
    const ir = interruptResults[k];
    if (ir.attempts < 2) continue;
    const rate = ir.beaten / ir.attempts;
    if (rate > bestRate) { bestRate = rate; bestInt = k; }
  }
  if (bestInt) {
    const ir = interruptResults[bestInt];
    result.bestInterrupt = {
      type: bestInt,
      successRate: Math.round((ir.beaten / ir.attempts) * 100),
      attempts: ir.attempts,
      avgDrop: (ir.drops.reduce((a, b) => a + b, 0) / ir.drops.length).toFixed(1),
    };
  }

  // 5. Pulse pattern — average HR drop
  const pulseSamples = u.filter(x => x.pulseBefore && x.pulseAfter);
  if (pulseSamples.length >= 3) {
    const avgDrop = pulseSamples.reduce((a, x) => a + (x.pulseBefore - x.pulseAfter), 0) / pulseSamples.length;
    result.pulsePattern = {
      samples: pulseSamples.length,
      avgDrop: avgDrop.toFixed(1),
      avgBefore: Math.round(pulseSamples.reduce((a, x) => a + x.pulseBefore, 0) / pulseSamples.length),
      avgAfter: Math.round(pulseSamples.reduce((a, x) => a + x.pulseAfter, 0) / pulseSamples.length),
    };
  }

  return result;
}

// ============================================================
// CASCADE DETECTION — is right now a risk moment?
// ============================================================
function isCurrentlyRiskWindow() {
  const cascade = getCascadePatterns();
  if (!cascade) return false;
  const now = new Date();
  const hour = now.getHours();
  const dow = now.getDay();
  const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  let matches = 0;
  if (cascade.topTime) {
    let inWindow = false;
    if (cascade.topTime.period === 'morning' && hour >= 6 && hour < 11) inWindow = true;
    else if (cascade.topTime.period === 'midday' && hour >= 11 && hour < 14) inWindow = true;
    else if (cascade.topTime.period === 'afternoon' && hour >= 14 && hour < 17) inWindow = true;
    else if (cascade.topTime.period === 'evening' && hour >= 17 && hour < 22) inWindow = true;
    else if (cascade.topTime.period === 'night' && (hour >= 22 || hour < 6)) inWindow = true;
    if (inWindow) matches++;
  }
  if (cascade.topDay && cascade.topDay.day === days[dow]) matches++;
  return matches >= 2; // need both time and day match
}

function addMeasurement(draft) {
  const m = {
    id: 'm_' + Date.now(),
    timestamp: Date.now(),
    waist: parseFloat(draft.waist) || null,
    hips: parseFloat(draft.hips) || null,
    chest: parseFloat(draft.chest) || null,
    weight: parseFloat(draft.weight) || null,
    note: draft.note?.trim() || '',
  };
  if (!m.waist && !m.hips && !m.chest && !m.weight) return false;
  const updated = [m, ...state.measurements];
  saveMeasurements(updated);
  state.measurements = updated;
  // Also update userWeight if present
  if (m.weight) { saveWeight(m.weight); state.userWeight = m.weight; }
  return true;
}

function deleteMeasurement(id) {
  if (!confirm('Delete this measurement?')) return;
  const updated = state.measurements.filter(m => m.id !== id);
  saveMeasurements(updated);
  set({ measurements: updated });
}

function getMeasurementTrend(metric) {
  const ms = state.measurements
    .filter(m => m[metric] != null)
    .sort((a, b) => a.timestamp - b.timestamp);
  if (ms.length < 2) return null;
  const first = ms[0];
  const last = ms[ms.length - 1];
  const days = Math.max(1, (last.timestamp - first.timestamp) / 86400000);
  const change = last[metric] - first[metric];
  const perWeek = (change / days) * 7;
  return { current: last[metric], first: first[metric], change, perWeek, days: Math.round(days), count: ms.length };
}

function projectMeasurement(metric, weeksAhead, scenario) {
  // scenario: 'current' = use observed trend, 'ideal' = goal-based, 'realistic' = ideal but with slip days
  const trend = getMeasurementTrend(metric);
  if (!trend) return null;
  const { current, perWeek } = trend;
  if (scenario === 'current') return Math.max(0, current + perWeek * weeksAhead);
  if (scenario === 'ideal') {
    // Assume 0.4kg/week loss → ~0.5cm/week waist for losing weight goal
    const idealRate = state.userGoal === 'lose' ? -0.5 : state.userGoal === 'gain' ? 0.3 : 0;
    return Math.max(0, current + idealRate * weeksAhead);
  }
  if (scenario === 'realistic') {
    // Ideal but with 2 slip days/week reducing effect by ~30%
    const idealRate = state.userGoal === 'lose' ? -0.5 : state.userGoal === 'gain' ? 0.3 : 0;
    return Math.max(0, current + idealRate * 0.7 * weeksAhead);
  }
  return current;
}

function getSlipImpact(extraCalories) {
  // 7700 kcal = ~1kg body fat. Days added = extra / daily_deficit
  const profile = loadProfile();
  if (!profile) return null;
  const tdee = calculateTDEE(profile.weight, profile.height, profile.age, profile.sex, profile.activityLevel);
  const dailyDeficit = Math.max(100, tdee - state.dailyGoal);
  const daysAdded = extraCalories / dailyDeficit;
  return { daysAdded: daysAdded.toFixed(1), dailyDeficit };
}

function rateActualSatisfaction(entryId, score) {

    e.id === entryId ? { ...e, actualSatisfaction: score, satisfactionRatedAt: Date.now() } : e
  );
  saveEntries(newEntries);
  set({ entries: newEntries, showSatisfactionFollowup: null });
}

function getPendingSatisfactionRatings() {
  // Entries from 25-180 mins ago with anticipated rating but no actual yet
  const now = Date.now();
  return state.entries.filter(e =>
    e.type !== 'activity' &&
    e.anticipatedSatisfaction &&
    !e.actualSatisfaction &&
    (now - e.timestamp) > 25 * 60000 &&
    (now - e.timestamp) < 180 * 60000
  );
}

function getSatisfactionGapByCategory() {
  // Returns { foodName: { count, anticipated, actual, gap } }
  const groups = {};
  for (const e of state.entries) {
    if (e.type === 'activity') continue;
    if (!e.anticipatedSatisfaction || !e.actualSatisfaction) continue;
    const key = e.name;
    if (!groups[key]) groups[key] = { count: 0, ant: 0, act: 0 };
    groups[key].count++;
    groups[key].ant += e.anticipatedSatisfaction;
    groups[key].act += e.actualSatisfaction;
  }
  const result = [];
  for (const k of Object.keys(groups)) {
    const g = groups[k];
    if (g.count < 2) continue;
    const ant = g.ant / g.count;
    const act = g.act / g.count;
    result.push({ name: k, count: g.count, anticipated: ant.toFixed(1), actual: act.toFixed(1), gap: (ant - act).toFixed(1) });
  }
  return result.sort((a, b) => parseFloat(b.gap) - parseFloat(a.gap));
}

  const jan1 = new Date(d.getFullYear(), 0, 1);
  const days = Math.floor((d - jan1) / 86400000);
  const week = Math.ceil((days + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
}

function getCurrentWeekWellbeing() {
  const wk = getCurrentWeekKey();

function getDaysSinceLastEntry() {
  if (state.entries.length === 0) return null;
  const latest = Math.max(...state.entries.filter(e => e.type !== 'activity').map(e => e.timestamp));
  if (!isFinite(latest)) return null;
  return Math.floor((Date.now() - latest) / 86400000);
}

function shouldShowSlipRecovery() {
  if (isPaused()) return false;
  if (state.entries.length === 0) return false;
  const dismissedKey = 'plate-slip-dismissed';
  const lastDismissed = parseInt(localStorage.getItem(dismissedKey) || '0');
  if (Date.now() - lastDismissed < 6 * 3600000) return false; // don't re-prompt for 6h
  const days = getDaysSinceLastEntry();
  return days >= 2 && days <= 14;
}

function dismissSlipRecovery() {
  try { localStorage.setItem('plate-slip-dismissed', String(Date.now())); } catch {}
  render();
}

function checkMilestones() {
  const shown = loadCelebrations();
  for (const m of MILESTONES) {
    if (shown.includes(m.id)) continue;
    if (m.check(state)) {
      // Queue this celebration
      const updated = [...shown, m.id];
      saveCelebrations(updated);
      state.activeCelebration = m;
      render();
      break; // Show one at a time
    }
  }
}

function dismissCelebration() {
  state.activeCelebration = null;
  // Check if there are more queued (we only mark one per cycle, so re-check)
  setTimeout(() => { checkMilestones(); }, 200);
  render();
}
