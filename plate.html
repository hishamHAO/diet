          <button class="secondary-btn" onclick="set({showMeasurements:false, measurementDraft:null, error:''})">Close</button>
        </div>
      </div>
    </div>
  `;
}

function renderPulseModal() {
  if (!state.showPulse) return '';
  const s = state.pulseSession || {};
  const baseline = getPulseBaseline();
  let content = '';

  if (s.step === 'intro') {
    content = `
      <div class="modal-title">Pulse reading</div>
      <div class="modal-desc">Cover the camera lens with your fingertip and stay still. Use a bright environment or turn the flash on. Reading takes about 30 seconds.</div>
      <div class="pulse-camera-area">
        <div class="placeholder">Tap start to begin<br>finger over rear camera</div>
      </div>
      <div style="font-size:11px; color:#a0a08e; text-align:center; margin-bottom:14px; line-height:1.5">
        First time? Try in good light. Press finger firmly. Some phones don't allow camera in browser — Safari iOS works best.
      </div>
      <div class="modal-actions">
        <button class="secondary-btn" onclick="set({showPulse:false, pulseSession:null})">Cancel</button>
        <button class="primary-btn" style="margin-top:0" onclick="startPulseCapture()">Start reading</button>
      </div>
    `;
  } else if (s.step === 'measuring') {
    const elapsed = s.startedAt ? Math.floor((Date.now() - s.startedAt) / 1000) : 0;
    const remaining = Math.max(0, s.durationSec - elapsed);
    const progress = (elapsed / s.durationSec) * 100;
    content = `
      <div class="modal-title">Reading...</div>
      <div class="modal-desc">Keep your finger steady on the lens. Breathe normally.</div>
      <div class="pulse-camera-area">
        <video id="pulse-video" autoplay playsinline muted></video>
      </div>
      <div class="pulse-progress"><div class="pulse-progress-fill" style="width:${progress}%"></div></div>
      <div style="text-align:center; font-family:'Fraunces',serif; font-size:32px; font-weight:500">${remaining}<span style="font-size:14px; color:#8a8975; margin-left:6px">sec</span></div>
      ${s.bpm ? `<div style="text-align:center; font-size:13px; color:#6b6a5c; margin-top:8px">current: ${s.bpm} bpm</div>` : ''}
      <div class="modal-actions">
        <button class="secondary-btn" onclick="stopPulseCapture(true)">Cancel</button>
      </div>
    `;
  } else if (s.step === 'result') {
    const bpm = s.bpm;
    const baselineDiff = baseline && bpm ? bpm - baseline : null;
    content = `
      <div class="modal-title">Pulse reading done</div>
      <div class="pulse-reading-display">
        <div class="bpm">${bpm || '—'}</div>
        <div class="lbl">beats per minute</div>
        ${baseline ? `<div class="ctx">your baseline is ~${baseline} bpm${baselineDiff != null ? (baselineDiff > 5 ? `<br><span style="color:#c4683a">+${baselineDiff} above baseline</span>` : baselineDiff < -5 ? `<br><span style="color:#5a7a3a">${baselineDiff} below baseline</span>` : `<br>about normal for you`) : ''}</div>` : `<div class="ctx">we'll show how this compares once we have more readings</div>`}
      </div>
      ${s.failed ? `<div style="font-size:12px; color:#c4683a; text-align:center; margin-bottom:14px">Signal was noisy. Try again with better lighting or firmer finger placement.</div>` : ''}
      <div class="modal-actions">
        <button class="secondary-btn" onclick="set({showPulse:false, pulseSession:null})">Done</button>
        <button class="primary-btn" style="margin-top:0" onclick="startPulseCapture()">Retake</button>
      </div>
    `;
  }

  return `
    <div class="modal-overlay" onclick="if(event.target===this) { stopPulseCapture(true); }">
      <div class="modal">${content}</div>
    </div>
  `;
}

// Pulse capture using camera PPG
let pulseStream = null;
let pulseInterval = null;
let pulseSamples = [];
let pulseStartTime = 0;

async function startPulseCapture() {
  pulseSamples = [];
  pulseStartTime = Date.now();
  set({ pulseSession: { ...state.pulseSession, step: 'measuring', startedAt: pulseStartTime, durationSec: 30, samples: [], bpm: null } });

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: 640, height: 480 }
    });
    pulseStream = stream;
    // Try to turn flash on (best effort, supported on some Androids)
    try {
      const track = stream.getVideoTracks()[0];
      if (track.getCapabilities && track.getCapabilities().torch) {
        await track.applyConstraints({ advanced: [{ torch: true }] });
      }
    } catch {}

    setTimeout(() => {
      const video = document.getElementById('pulse-video');
      if (video) {
        video.srcObject = stream;
        startPulseSampling();
      }
    }, 100);
  } catch (err) {
    set({ pulseSession: { ...state.pulseSession, step: 'result', failed: true, bpm: null } });
  }
}

function startPulseSampling() {
  const canvas = document.createElement('canvas');
  canvas.width = 80; canvas.height = 80;
  const ctx = canvas.getContext('2d');
  const video = document.getElementById('pulse-video');
  if (!video) return;

  pulseInterval = setInterval(() => {
    if (!video.videoWidth) return;
    const elapsed = (Date.now() - pulseStartTime) / 1000;
    if (elapsed >= 30) {
      finishPulseCapture();
      return;
    }
    ctx.drawImage(video, 0, 0, 80, 80);
    const data = ctx.getImageData(0, 0, 80, 80).data;
    let r = 0, count = 0;
    for (let i = 0; i < data.length; i += 4) {
      r += data[i];
      count++;
    }
    const avgR = r / count;
    pulseSamples.push({ t: Date.now(), v: avgR });

    // Live update display every 5 seconds
    if (pulseSamples.length > 100 && pulseSamples.length % 30 === 0) {
      const bpm = estimateBPM(pulseSamples);
      if (bpm) {
        state.pulseSession.bpm = bpm;
        render();
      }
    }
  }, 33); // ~30 fps
}

function estimateBPM(samples) {
  if (samples.length < 60) return null;
  // Detrend by subtracting moving average
  const window = 10;
  const detrended = [];
  for (let i = window; i < samples.length - window; i++) {
    let sum = 0;
    for (let j = -window; j <= window; j++) sum += samples[i+j].v;
    const avg = sum / (2*window + 1);
    detrended.push({ t: samples[i].t, v: samples[i].v - avg });
  }
  if (detrended.length < 30) return null;
  // Find peaks
  const peaks = [];
  for (let i = 2; i < detrended.length - 2; i++) {
    if (detrended[i].v > detrended[i-1].v && detrended[i].v > detrended[i-2].v &&
        detrended[i].v > detrended[i+1].v && detrended[i].v > detrended[i+2].v &&
        detrended[i].v > 0.5) {
      peaks.push(detrended[i].t);
    }
  }
  if (peaks.length < 3) return null;
  // Filter peaks too close together (< 300ms = > 200 bpm impossible)
  const cleaned = [peaks[0]];
  for (let i = 1; i < peaks.length; i++) {
    if (peaks[i] - cleaned[cleaned.length - 1] >= 300) cleaned.push(peaks[i]);
  }
  if (cleaned.length < 3) return null;
  // Average inter-peak interval
  const intervals = [];
  for (let i = 1; i < cleaned.length; i++) intervals.push(cleaned[i] - cleaned[i-1]);
  // Use median for robustness
  intervals.sort((a, b) => a - b);
  const median = intervals[Math.floor(intervals.length / 2)];
  const bpm = Math.round(60000 / median);
  if (bpm < 40 || bpm > 200) return null;
  return bpm;
}

function finishPulseCapture() {
  if (pulseInterval) { clearInterval(pulseInterval); pulseInterval = null; }
  const bpm = estimateBPM(pulseSamples);
  if (pulseStream) {
    pulseStream.getTracks().forEach(t => t.stop());
    pulseStream = null;
  }
  if (bpm) {
    savePulseReading(bpm, 'general');
    set({ pulseSession: { ...state.pulseSession, step: 'result', bpm, failed: false } });
  } else {
    set({ pulseSession: { ...state.pulseSession, step: 'result', bpm: null, failed: true } });
  }
}

function stopPulseCapture(cancel) {
  if (pulseInterval) { clearInterval(pulseInterval); pulseInterval = null; }
  if (pulseStream) {
    pulseStream.getTracks().forEach(t => t.stop());
    pulseStream = null;
  }
  if (cancel) {
    set({ showPulse: false, pulseSession: null });
  }
}

// ============================================================
// REUSABLE PULSE CAPTURE — for urge integration
// Returns a promise that resolves with bpm (or null on failure)
// ============================================================
let urgePulseStream = null;
let urgePulseInterval = null;

async function captureUrgePulse(durationSec, videoElementId) {
  return new Promise(async (resolve) => {
    const samples = [];
    let stream = null;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: 640, height: 480 }
      });
      urgePulseStream = stream;
      try {
        const track = stream.getVideoTracks()[0];
        if (track.getCapabilities && track.getCapabilities().torch) {
          await track.applyConstraints({ advanced: [{ torch: true }] });
        }
      } catch {}
    } catch (err) {
      resolve(null);
      return;
    }

    // Wait a moment for video element
    setTimeout(() => {
      const video = document.getElementById(videoElementId);
      if (!video) { resolve(null); return; }
      video.srcObject = stream;
      const canvas = document.createElement('canvas');
      canvas.width = 80; canvas.height = 80;
      const ctx = canvas.getContext('2d');
      const startTime = Date.now();

      urgePulseInterval = setInterval(() => {
        if (!video.videoWidth) return;
        const elapsed = (Date.now() - startTime) / 1000;
        if (elapsed >= durationSec) {
          clearInterval(urgePulseInterval); urgePulseInterval = null;
          if (urgePulseStream) {
            urgePulseStream.getTracks().forEach(t => t.stop());
            urgePulseStream = null;
          }
          const bpm = estimateBPM(samples);
          resolve(bpm);
          return;
        }
        ctx.drawImage(video, 0, 0, 80, 80);
        const data = ctx.getImageData(0, 0, 80, 80).data;
        let r = 0, count = 0;
        for (let i = 0; i < data.length; i += 4) { r += data[i]; count++; }
        samples.push({ t: Date.now(), v: r / count });
      }, 33);
    }, 200);
  });
}

function stopUrgePulse() {
  if (urgePulseInterval) { clearInterval(urgePulseInterval); urgePulseInterval = null; }
  if (urgePulseStream) {
    urgePulseStream.getTracks().forEach(t => t.stop());
    urgePulseStream = null;
  }
}

// ============================================================
// ACCELEROMETER — detect actual movement during 'move' interrupt
// ============================================================
let motionListener = null;
let motionMagnitudes = [];

async function startMotionDetection() {
  motionMagnitudes = [];
  // iOS 13+ requires explicit permission
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceMotionEvent.requestPermission();
      if (perm !== 'granted') return false;
    } catch {
      return false;
    }
  }
  motionListener = (event) => {
    const a = event.accelerationIncludingGravity || event.acceleration;
    if (!a) return;
    const mag = Math.sqrt((a.x || 0) ** 2 + (a.y || 0) ** 2 + (a.z || 0) ** 2);
    motionMagnitudes.push({ t: Date.now(), m: mag });
    // Keep last 60 seconds only
    const cutoff = Date.now() - 60000;
    while (motionMagnitudes.length > 0 && motionMagnitudes[0].t < cutoff) motionMagnitudes.shift();
  };
  window.addEventListener('devicemotion', motionListener);
  return true;
}

function stopMotionDetection() {
  if (motionListener) {
    window.removeEventListener('devicemotion', motionListener);
    motionListener = null;
  }
}

function getMotionScore() {
  // Variance of magnitude over recent window. Walking ~9.8 (gravity) ± big swings. Still ~9.8 ± tiny.
  if (motionMagnitudes.length < 10) return 0;
  const mags = motionMagnitudes.map(x => x.m);
  const mean = mags.reduce((a, b) => a + b, 0) / mags.length;
  const variance = mags.reduce((a, b) => a + (b - mean) ** 2, 0) / mags.length;
  return Math.sqrt(variance);
}

function isUserMoving() {
  // Standard deviation > 1.5 m/s² = clear movement
  return getMotionScore() > 1.5;
}

          <div style="font-family:'Fraunces',serif; font-size:36px; margin:14px 0">${remaining}<span style="font-size:13px; color:#8a8975; margin-left:6px">sec</span></div>
          <div style="font-size:11px; color:#a0a08e; max-width:280px; margin:0 auto; line-height:1.5">Cold via the mouth activates the same vagal response as cold on the face.</div>
        </div>
        <div class="urge-action-row">
          <button class="ghost" onclick="urgeCancel()">Cancel</button>
          ${remaining <= 0 ? `<button class="filled" onclick="urgeFinishInterrupt()">Done →</button>` : ''}
        </div>
      `;
    }
  } else if (d.step === 'pulse-after-capturing') {
    content = `
      <div class="urge-step-title" style="text-align:center; font-size:20px">Reading pulse again...</div>
      <div class="urge-pulse-area">
        <video id="urge-pulse-video-after" autoplay playsinline muted></video>
        <div class="overlay">finger on lens<br>15 seconds</div>
      </div>
      <div style="text-align:center; font-size:12px; color:#8a8975; margin-bottom:14px">Measuring how the interrupt affected your physiology.</div>
      <div class="urge-action-row">
        <button class="ghost" onclick="stopUrgePulse(); urgeNextStep('rate-final')">Skip</button>
      </div>
    `;
  } else if (d.step === 'rate-final') {
    const pulseDrop = d.pulseBefore && d.pulseAfter ? d.pulseBefore - d.pulseAfter : null;
    content = `
      <div class="urge-step-title">How strong is the urge now?</div>
      <div class="urge-step-sub">Same scale. Honest.</div>
      <div class="urge-intensity-row">
        ${[1,2,3,4,5].map(n => `<button class="urge-intensity ${d.finalIntensity === n ? 'active' : ''}" onclick="urgeSetField('finalIntensity', ${n})">${n}</button>`).join('')}
      </div>
      <div class="urge-intensity-scale"><span>gone</span><span>still intense</span></div>

      ${d.pulseBefore || d.pulseAfter ? `
        <div style="display:flex; gap:10px; margin:14px 0">
          ${d.pulseBefore ? `<div style="flex:1; background:#f6f1e7; border-radius:14px; padding:12px 10px; text-align:center"><div style="font-size:10px; color:#8a8975; text-transform:uppercase; letter-spacing:0.12em">before</div><div style="font-family:'Fraunces',serif; font-size:24px; font-weight:500; line-height:1; margin-top:4px">${d.pulseBefore}</div><div style="font-size:10px; color:#a0a08e">bpm</div></div>` : ''}
          ${d.pulseAfter ? `<div style="flex:1; background:#f6f1e7; border-radius:14px; padding:12px 10px; text-align:center"><div style="font-size:10px; color:#8a8975; text-transform:uppercase; letter-spacing:0.12em">after</div><div style="font-family:'Fraunces',serif; font-size:24px; font-weight:500; line-height:1; margin-top:4px; color:${pulseDrop > 3 ? '#5a7a3a' : pulseDrop < -3 ? '#c4683a' : '#2d3a2e'}">${d.pulseAfter}</div><div style="font-size:10px; color:#a0a08e">bpm</div></div>` : ''}
          ${pulseDrop != null ? `<div style="flex:1; background:${pulseDrop > 3 ? '#e8f0d8' : pulseDrop < -3 ? '#fff8ec' : '#f6f1e7'}; border-radius:14px; padding:12px 10px; text-align:center"><div style="font-size:10px; color:#8a8975; text-transform:uppercase; letter-spacing:0.12em">change</div><div style="font-family:'Fraunces',serif; font-size:24px; font-weight:500; line-height:1; margin-top:4px; color:${pulseDrop > 0 ? '#5a7a3a' : pulseDrop < 0 ? '#c4683a' : '#2d3a2e'}">${pulseDrop > 0 ? '−' : pulseDrop < 0 ? '+' : ''}${Math.abs(pulseDrop)}</div><div style="font-size:10px; color:#a0a08e">bpm</div></div>` : ''}
        </div>
      ` : ''}

      ${d.finalIntensity != null && d.initialIntensity != null ? `
        <div class="urge-final-result">
          ${d.initialIntensity > d.finalIntensity ? `
            <div class="drop-num">−${d.initialIntensity - d.finalIntensity}</div>
            <div class="drop-lbl">drop in urge intensity</div>
            <div class="change">From ${d.initialIntensity}/5 to ${d.finalIntensity}/5${pulseDrop > 0 ? `, heart rate also dropped ${pulseDrop} bpm. The interrupt physically worked.` : '. The interrupt worked.'}</div>
          ` : d.initialIntensity === d.finalIntensity ? `
            <div class="drop-num" style="color:#c4a06a">=</div>
            <div class="drop-lbl">no intensity change</div>
            <div class="change">Still ${d.finalIntensity}/5${pulseDrop > 0 ? `, though your pulse did drop ${pulseDrop} bpm — your body relaxed even if the urge didn't.` : '. Try a different interrupt next time, or maybe you are actually hungry.'}</div>
          ` : `
            <div class="drop-num" style="color:#c4683a">+${d.finalIntensity - d.initialIntensity}</div>
            <div class="drop-lbl">stronger</div>
            <div class="change">Sometimes urges grow before they pass. Could be real hunger — listen to your body.</div>
          `}
        </div>
      ` : ''}
      ${d.finalIntensity != null ? `
        <div class="urge-step-title" style="font-size:18px; margin-top:20px">Did you end up eating?</div>
        <div class="urge-step-sub">No judgment. Just data — both answers are valid.</div>
        <div class="urge-action-row">
          <button class="ghost" style="flex:1" onclick="urgeSaveResult(true)">Yes, I ate</button>
          <button class="filled" style="flex:1" onclick="urgeSaveResult(false)">No, urge passed</button>
        </div>
      ` : ''}
    `;
  } else if (d.step === 'reward') {
    // Future-self projection + reward counters
    const beatenCount = state.urges.filter(u => u.ateAnyway === false).length;
    const totalCount = state.urges.length;
    // What this saved
    const estimatedCals = d.initialIntensity >= 4 ? 600 : d.initialIntensity >= 3 ? 400 : 250;
    // Future-self projection — small abstract silhouette
    const profile = loadProfile();
    const currentWaist = (state.measurements.find(m => m.waist) || {}).waist || 92;
    const monthlyUrges = state.urges.filter(u => u.timestamp > Date.now() - 30 * 86400000).length || 1;
    // If you keep beating at this rate (say 4 per week × 4 weeks = ~16/month, avg 400 kcal saved each):
    const projectedMonthlyCalSaved = beatenCount > 0
      ? Math.round((beatenCount / Math.max(1, Math.ceil((Date.now() - state.urges[state.urges.length-1].timestamp) / 86400000))) * 30 * 400)
      : 12000;
    const projectedKgSaved = (projectedMonthlyCalSaved * 3 / 7700).toFixed(1); // 3 months
    // Silhouette: current vs projected
    const startScale = 1.0;
    const futureScale = Math.max(0.82, 1.0 - parseFloat(projectedKgSaved) * 0.015);
    content = `
      <div class="reward-screen">
        <div class="reward-celebration">
          <div class="icon">🎯</div>
          <div class="title">You beat it.</div>
          <div style="font-size:13px; color:#6b6a5c; line-height:1.5;">The urge came, peaked, and passed — without you acting on it. That's the entire game.</div>
        </div>

        <div class="reward-counters">
          <div class="reward-counter">
            <div class="num">${beatenCount}</div>
            <div class="lbl">urges beaten</div>
            <div class="change">+1</div>
          </div>
          <div class="reward-counter">
            <div class="num">~${estimatedCals}</div>
            <div class="lbl">kcal not eaten</div>
            <div class="change">just now</div>
          </div>
        </div>

        <div class="reward-future-self">
          <div class="label">your future self</div>
          <div class="silhouette-flex">
            <div class="silhouette-col">
              <div class="lbl-top">today</div>
              ${renderSilhouette(startScale)}
              <div class="val-bot">${beatenCount === 1 ? 'first win' : beatenCount + ' wins'}</div>
            </div>
            <div class="arrow">→</div>
            <div class="silhouette-col">
              <div class="lbl-top">in 3 months</div>
              ${renderSilhouette(futureScale, true)}
              <div class="val-bot">if you keep this up</div>
            </div>
          </div>
          <div class="projection-text">
            At your current rate of beating urges, that's <strong>~${projectedKgSaved} kg</strong> not gained over 3 months. The wave passed. The body didn't get the food. The future self is real.
          </div>
        </div>

        <button class="celebrate-action" style="margin: 0 auto; display: block;" onclick="urgeFinalDismiss()">I'm done — back to today</button>
      </div>
    `;
  }

  return `
    <div class="urge-overlay" onclick="if(event.target===this) urgeCancel()">
      <div class="urge-modal">
        ${content}
      </div>
    </div>
  `;
}

function renderWeekly() {
  if (!state.showWeekly) return '';
  const days = getLast7Days();
  const goal = state.dailyGoal;
  const maxVal = Math.max(goal, ...days.map(d => d.food));
  const W = 320, H = 160, padTop = 10, padBot = 30;
  const chartH = H - padTop - padBot;
  const barW = 28, gap = (W - 7 * barW) / 8;
  const daysWithData = days.filter(d => d.hasData);
  const avgFood = daysWithData.length > 0 ? Math.round(daysWithData.reduce((a, d) => a + d.food, 0) / daysWithData.length) : 0;
  const avgNet = daysWithData.length > 0 ? Math.round(daysWithData.reduce((a, d) => a + d.net, 0) / daysWithData.length) : 0;
  const daysAtGoal = days.filter(d => d.hasData && d.net <= goal && d.net > 0).length;
  const goalY = padTop + chartH - (goal / maxVal) * chartH;

  return `
    <div class="modal-overlay" onclick="if(event.target===this) set({showWeekly:false})">
      <div class="weekly-modal">
        <div class="week-header">
          <div class="modal-title" style="margin:0">Last 7 days</div>
          <button class="icon-btn" onclick="set({showWeekly:false})" aria-label="Close">${icons.x}</button>
        </div>
        <svg class="week-chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="${goalY}" x2="${W}" y2="${goalY}" stroke="#c4683a" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
          <text x="${W - 4}" y="${goalY - 4}" text-anchor="end" font-size="9" fill="#c4683a" font-family="Instrument Sans, sans-serif">goal</text>
          ${days.map((d, i) => {
            const x = gap + i * (barW + gap);
            const h = d.food > 0 ? (d.food / maxVal) * chartH : 0;
            const y = padTop + chartH - h;
            const over = d.net > goal;
            return `
              <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="4" fill="${over ? '#c4683a' : '#2d3a2e'}" opacity="${d.hasData ? 1 : 0.15}"/>
              <text x="${x + barW/2}" y="${padTop + chartH + 14}" text-anchor="middle" font-size="10" fill="#6b6a5c" font-family="Instrument Sans, sans-serif">${d.dayShort}</text>
              ${d.hasData ? `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="9" fill="#6b6a5c" font-family="Instrument Sans, sans-serif">${d.net}</text>` : ''}
            `;
          }).join('')}
        </svg>
        <div class="week-stats">
          <div class="week-stat">
            <div class="lbl">avg net</div>
            <div class="val">${avgNet}<span style="font-size:11px; color:#8a8975; margin-left:4px">kcal</span></div>
            <div class="sub">${daysWithData.length}/7 days logged</div>
          </div>
          <div class="week-stat">
            <div class="lbl">at goal</div>
            <div class="val">${daysAtGoal}<span style="font-size:11px; color:#8a8975; margin-left:4px">days</span></div>
            <div class="sub">goal: ${goal} kcal</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function openDailyCheckin() {
  const today = getTodayCheckin();
  set({
    showDailyCheckin: true,
    dailyCheckinDraft: today ? { ...today } : {
      sleepHours: 7,
      sleepQuality: null,
      stress: null,
      hunger: null,
      craving: null,
      weight: null,
    },
  });
}

function updateCheckinDraft(field, value) {
  state.dailyCheckinDraft = { ...state.dailyCheckinDraft, [field]: value };
  render();
}

function submitDailyCheckin() {
  const d = state.dailyCheckinDraft;
  if (!d) return;
  saveDailyCheckin(d);
  set({ showDailyCheckin: false, dailyCheckinDraft: null });
  checkAndAwardBadges();
}

function dismissDailyCheckinToday() {
  try { localStorage.setItem(STORAGE_CHECKIN_DISMISSED, entryDate(Date.now())); } catch {}
  set({ showDailyCheckin: false, dailyCheckinDraft: null });
}

function shouldPromptDailyCheckin() {
  if (getTodayCheckin()) return false; // already done
  try {
    const dismissed = localStorage.getItem(STORAGE_CHECKIN_DISMISSED);
    if (dismissed === entryDate(Date.now())) return false;
  } catch {}
  return true;
}

          </div>

          <!-- Sleep quality -->
          <div class="checkin-field">
            <div class="checkin-label">Sleep quality</div>
            <div class="checkin-scale">
              ${['Poor','Fair','Good','Great'].map((label, i) => `
                <button class="checkin-chip ${d.sleepQuality === i+1 ? 'active' : ''}" onclick="updateCheckinDraft('sleepQuality', ${i+1})">${label}</button>
              `).join('')}
            </div>
          </div>

          <!-- Stress -->
          <div class="checkin-field">
            <div class="checkin-label">Stress today <span class="checkin-hint">1 = calm, 5 = high</span></div>
            <div class="checkin-scale numbered">
              ${[1,2,3,4,5].map(n => `
                <button class="checkin-num ${d.stress === n ? 'active' : ''}" onclick="updateCheckinDraft('stress', ${n})">${n}</button>
              `).join('')}
            </div>
          </div>

          <!-- Hunger -->
          <div class="checkin-field">
            <div class="checkin-label">Hunger right now <span class="checkin-hint">1 = full, 5 = ravenous</span></div>
            <div class="checkin-scale numbered">
              ${[1,2,3,4,5].map(n => `
                <button class="checkin-num ${d.hunger === n ? 'active' : ''}" onclick="updateCheckinDraft('hunger', ${n})">${n}</button>
              `).join('')}
            </div>
          </div>

          <!-- Craving -->
          <div class="checkin-field">
            <div class="checkin-label">Cravings today <span class="checkin-hint">1 = none, 5 = strong</span></div>
            <div class="checkin-scale numbered">
              ${[1,2,3,4,5].map(n => `
                <button class="checkin-num ${d.craving === n ? 'active' : ''}" onclick="updateCheckinDraft('craving', ${n})">${n}</button>
              `).join('')}
            </div>
          </div>

          <!-- Weight (optional) -->
          <div class="checkin-field">
            <div class="checkin-label">Weight <span class="checkin-hint">optional · kg</span></div>
            <div class="checkin-weight-row">
              <input type="number" step="0.1" min="20" max="300" placeholder="—" value="${d.weight ?? ''}" onchange="updateCheckinDraft('weight', this.value ? parseFloat(this.value) : null)" inputmode="decimal">
              <span class="checkin-val">kg</span>
            </div>
          </div>
        </div>

        <div class="modal-actions" style="margin-top:14px">
          <button class="secondary-btn" onclick="set({showDailyCheckin:false, dailyCheckinDraft:null})">Cancel</button>
          <button class="primary-btn" style="margin-top:0" ${!hasAny ? 'disabled' : ''} onclick="submitDailyCheckin()">Save check-in</button>
        </div>

        <div class="checkin-note">
          Days with full data are most useful for spotting patterns. Skip any field you don't want to answer.
        </div>
      </div>
    </div>
  `;
}

function renderWellbeingModal() {
  if (!state.showWellbeing) return '';
  const current = getCurrentWeekWellbeing();
  const draft = state.wellbeingDraft || current || { energy: null, sleep: null };
  state.wellbeingDraft = draft;
  const metrics = [
    { key: 'sleep', label: 'sleep this week', sub: '1 = poor · 5 = excellent' },
    { key: 'energy', label: 'energy this week', sub: '1 = exhausted · 5 = great' },
  ];
  const complete = metrics.every(m => draft[m.key] != null);
  return `
    <div class="modal-overlay" onclick="if(event.target===this) set({showWellbeing:false})">
      <div class="modal">
        <div class="modal-title">Weekly check-in</div>
        <div class="modal-desc">Two quick numbers. The app uses these to flag risky days — poor sleep and low energy are real overeating triggers.</div>
        <div class="wb-form">
          ${metrics.map(m => `
            <div class="wb-metric">
              <div class="lbl">${m.label}</div>
              <div class="wb-scale">
                ${[1,2,3,4,5].map(n => `<button class="wb-num ${draft[m.key] === n ? 'active' : ''}" onclick="state.wellbeingDraft = {...state.wellbeingDraft, ${m.key}:${n}}; render()">${n}</button>`).join('')}
              </div>
              <div style="font-size:10px; color:#a0a08e; margin-top:4px">${m.sub}</div>
            </div>
          `).join('')}
        </div>
        <div class="wb-note">Used in your danger score — the app raises a flag on days when low sleep/energy match your historical risk pattern.</div>
        <div class="modal-actions">
          <button class="secondary-btn" onclick="state.wellbeingDraft = null; set({showWellbeing:false})">Cancel</button>
          <button class="primary-btn" style="margin-top:0" ${!complete ? 'disabled' : ''} onclick="saveWellbeingEntry(state.wellbeingDraft); state.wellbeingDraft = null; checkAndAwardBadges()">Save check-in</button>
        </div>
      </div>
    </div>
  `;
}

function renderBadgesModal() {
  if (!state.showBadges) return '';
  const earned = new Set(state.earnedBadges);
  const earnedCount = BADGE_DEFINITIONS.filter(b => earned.has(b.id)).length;
  return `
    <div class="modal-overlay" onclick="if(event.target===this) set({showBadges:false})">
      <div class="modal">
        <div class="modal-title">Milestones</div>
        <div class="modal-desc">${earnedCount} of ${BADGE_DEFINITIONS.length} earned. These are about effort and consistency — not perfect numbers.</div>
        <div class="badge-grid">
          ${BADGE_DEFINITIONS.map(b => `
            <div class="badge-card ${earned.has(b.id) ? '' : 'locked'}">
              <div class="icon">${b.icon}</div>
              <div class="name">${escapeHtml(b.name)}</div>
              <div class="desc">${escapeHtml(b.desc)}</div>
            </div>
          `).join('')}
        </div>
        <div class="modal-actions">
          <button class="secondary-btn" onclick="set({showBadges:false})">Close</button>
        </div>
      </div>
    </div>
  `;
}

function renderBadgeToast() {
  if (!state.newBadgeToast) return '';
  const b = state.newBadgeToast;
  return `<div class="badge-toast">${b.icon} <span>${escapeHtml(b.name)} unlocked</span></div>`;
}

function renderChatModal() {
  if (!state.showChat) return '';
  const quickReplies = [
    'How am I doing?',
    'Motivate me',
    "I'm struggling",
    'I slipped today',
    "I want to give up",
    "I'm tired",
  ];
  const streak = calculateStreak(state.entries);
  return `
    <div class="chat-overlay" onclick="if(event.target===this) closeChat()">
      <div class="chat-modal">
        <div class="chat-header">
          <div>
            <div class="chat-title">Coach</div>
            <div class="chat-subtitle">${streak > 0 ? streak + '-day streak · here when you need it' : 'here when you need it'}</div>
          </div>
          <div style="display:flex; gap:4px">
            <button class="icon-btn" onclick="clearChat()" aria-label="Clear chat" title="Clear chat">${icons.trash}</button>
            <button class="icon-btn" onclick="closeChat()" aria-label="Close">${icons.x}</button>
          </div>
        </div>
        <div class="chat-messages">
          ${state.chatMessages.map(m => `<div class="msg ${m.role}">${escapeHtml(m.text)}</div>`).join('')}
        </div>
        <div class="chat-chips">
          ${quickReplies.map(q => `<button class="chat-chip" onclick="quickReply(${JSON.stringify(q).replace(/"/g,'&quot;')})">${escapeHtml(q)}</button>`).join('')}
        </div>
        <div class="chat-input-row">
          <button class="chat-mic-btn ${state.chatListening ? 'listening' : ''}" onclick="toggleChatVoice()" aria-label="Voice">${icons.micSm}</button>
          <input id="chat-input" class="chat-input" type="text" placeholder="${state.chatListening ? 'Listening…' : 'Say something...'}" value="${escapeHtml(state.chatInputValue)}" oninput="state.chatInputValue = this.value" onkeydown="if(event.key==='Enter') submitChatInput()" />
          <button class="chat-send-btn" onclick="submitChatInput()" ${!state.chatInputValue.trim() ? 'disabled' : ''} aria-label="Send">${icons.send}</button>
        </div>
      </div>
    </div>
  `;
}

function render() {
  const root = document.getElementById('root');
  if (!root) return;
  try {
    const focused = document.activeElement;
    const focusedId = focused && focused.id;
    const selStart = focused && focused.selectionStart;
    const selEnd = focused && focused.selectionEnd;
    const streak = calculateStreak(state.entries);

    let tabContent = '';
    if (state.activeTab === 'wins') tabContent = renderWinsTab();
    else if (state.activeTab === 'trends') tabContent = renderTrendsTab();
    else if (state.activeTab === 'you') tabContent = renderYouTab();
    else tabContent = renderTodayTab();

    root.innerHTML = `
      <div class="app">
        <div class="header">
          <div class="logo">${icons.apple}<h1 class="logo-text">Plate</h1></div>
          <div class="badge">
            ${streak >= 2 ? `<span class="streak">🔥 ${streak}</span>` : ''}
            <button class="settings-btn" onclick="set({showSettings:true})" aria-label="Settings">${icons.cog}</button>
          </div>
        </div>
        ${tabContent}
      </div>
      ${renderTabBar()}
      ${renderSettingsModal()}
      ${renderChatModal()}
      ${renderWhyModal()}
      ${renderWellbeingModal()}
      ${renderBadgesModal()}
    ${renderBadgeToast()}
    ${renderOnboarding()}
    ${renderUrgeModal()}
    ${renderCustomFoodsModal()}
    ${renderMeasurementsModal()}
    ${renderPulseModal()}
    ${renderMilestoneCelebration()}
    ${renderPlantStageUp()}
    ${renderDailyCheckinModal()}
    `;

    if (focusedId) {
      const el = document.getElementById(focusedId);
      if (el) {
        el.focus();
        if (selStart != null) { try { el.setSelectionRange(selStart, selEnd); } catch {} }
      }
    }
  } catch (err) {
    // Don't leave the user with a blank screen — show the error so we can debug
    root.innerHTML = `
      <div style="padding: 24px; font-family: -apple-system, sans-serif; max-width: 100%; word-wrap: break-word;">
        <h2 style="font-family: 'Fraunces', serif; color: #c4683a; margin-bottom: 12px;">Something broke</h2>
        <p style="color: #6b6a5c; line-height: 1.5; margin-bottom: 16px;">The app hit an error while rendering. Your data is safe in storage. Please send a screenshot of the error below.</p>
        <pre style="background: #f6f1e7; padding: 12px; border-radius: 8px; font-size: 11px; overflow: auto; max-height: 300px; white-space: pre-wrap;">${String(err && err.message || err)}\n\n${String(err && err.stack || '')}</pre>
        <button onclick="location.reload()" style="margin-top: 16px; padding: 12px 24px; background: #2d3a2e; color: white; border: none; border-radius: 999px; font-size: 14px;">Reload app</button>
        <button onclick="if(confirm('Reset all data? This cannot be undone.')) { localStorage.clear(); location.reload(); }" style="margin-top: 8px; margin-left: 8px; padding: 12px 24px; background: transparent; color: #c4683a; border: 1px solid #c4683a; border-radius: 999px; font-size: 14px;">Reset all data</button>
      </div>
    `;
    console.error('Render error:', err);
  }
}

// ============================================================
// Init
// ============================================================
function init() {
  state.entries = loadEntries();
  state.userWeight = loadWeight();
  state.dailyGoal = loadGoal();
  state.chatMessages = loadChat();
  state.whyText = loadWhy();
  state.pauseUntil = loadPause();
  state.wellbeingHistory = loadWellbeing();
  state.dailyCheckins = loadDailyCheckins();
  state.earnedBadges = loadBadges();
  state.onboardingComplete = loadOnboarded();
  state.urges = loadUrges();
  state.customFoods = loadCustomFoods();
  state.measurements = loadMeasurements();
  state.pulseReadings = loadPulseReadings();
  const profile = loadProfile();
  if (profile) {
    state.userWeight = profile.weight;
    state.userHeight = profile.height;
    state.userAge = profile.age;
    state.userSex = profile.sex;
    state.userActivityLevel = profile.activityLevel;
    state.userGoal = profile.goal;
  }
  rebuildKeysIndex(); // include any custom foods
  // For existing users: if no last-stage record, sync to current stage so we don't retro-fire
  if (state.entries.length > 0) {
    try {
      const stored = localStorage.getItem(STORAGE_PLANT_LAST_STAGE);
      if (stored == null) {
        savePlantLastStage(getPlantState().stage);
      }
    } catch {}
  }
  if (!state.onboardingComplete && state.entries.length === 0) {
    startOnboarding();
  }
  setupSpeech();
  setupChatSpeech();
  render();
  checkAndAwardBadges();
  setInterval(() => {
    // Tick urge timer
    if (state.urgeDraft && state.urgeDraft.step === 'doing') {
      render();
    }
    if (getPendingSatisfactionRatings().length > 0 && !state.showSatisfactionFollowup) render();
  }, 1000);
}

let toastQueue = [];
let toastTimer = null;
function showBadgeToast(badge) {
  toastQueue.push(badge);
  if (!toastTimer) processToastQueue();
}
function processToastQueue() {
  if (toastQueue.length === 0) { state.newBadgeToast = null; render(); toastTimer = null; return; }
  state.newBadgeToast = toastQueue.shift();
  render();
  toastTimer = setTimeout(() => { state.newBadgeToast = null; processToastQueue(); }, 4000);
}

init();
</script>
</body>
</html>
