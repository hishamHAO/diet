function getMealTag(timestamp) {
  const h = new Date(timestamp).getHours();
  if (h >= 5 && h < 11) return 'breakfast';
  if (h >= 11 && h < 15) return 'lunch';
  if (h >= 17 && h < 22) return 'dinner';
  return 'snack';
}

const MEAL_ORDER = ['breakfast', 'lunch', 'dinner', 'snack'];

function calculateStreak(entries) {
  if (entries.length === 0) return 0;
  const dates = new Set(entries.map(e => entryDate(e.timestamp)));
  const today = todayISO();
  let d = new Date();
  if (!dates.has(today)) d.setDate(d.getDate() - 1);
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (dates.has(key)) { streak++; d.setDate(d.getDate() - 1); } else break;
  }
  return streak;
}

function getRecentItems(entries, n = 6) {
  const seen = new Set();
  const recents = [];
  for (const e of entries) {
    const key = e.type === 'activity' ? 'a:' + e.name : 'f:' + e.name;
    if (seen.has(key)) continue;
    seen.add(key);
    recents.push(e);
    if (recents.length >= n) break;
  }
  return recents;
}

function readdEntry(originalId) {
  const orig = state.entries.find(e => e.id === originalId);
  if (!orig) return;
  const newEntry = { ...orig, id: Date.now().toString(), timestamp: Date.now() };
  delete newEntry.baseCal; delete newEntry.baseC; delete newEntry.baseP; delete newEntry.baseF;
  delete newEntry.breakdown; delete newEntry.unmatched; delete newEntry.spoken;
  const newEntries = [newEntry, ...state.entries];
  saveEntries(newEntries);
  set({ entries: newEntries });
}

function getLast7Days() {
  const result = [];
  const d = new Date();
  for (let i = 6; i >= 0; i--) {
    const day = new Date(d);
    day.setDate(d.getDate() - i);
    const key = `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
    const dayEntries = state.entries.filter(e => entryDate(e.timestamp) === key);
    const food = dayEntries.filter(e => e.type !== 'activity').reduce((a, e) => a + (e.calories || 0), 0);
    const burned = dayEntries.filter(e => e.type === 'activity').reduce((a, e) => a + (e.calories || 0), 0);
    result.push({
      key, date: day,
      dayShort: day.toLocaleDateString([], { weekday: 'short' })[0],
      dayName: day.toLocaleDateString([], { weekday: 'short' }),
      food, burned, net: food - burned,
      hasData: dayEntries.length > 0,
    });
  }
  return result;
}

function exportCSV() {
  const rows = [['Date', 'Time', 'Type', 'Name', 'Detail', 'Calories', 'Carbs (g)', 'Protein (g)', 'Fat (g)']];
  const sorted = [...state.entries].sort((a, b) => a.timestamp - b.timestamp);
  for (const e of sorted) {
    const d = new Date(e.timestamp);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    const isActivity = e.type === 'activity';
    rows.push([
      dateStr, timeStr,
      isActivity ? 'Exercise' : 'Food',
      e.name,
      isActivity ? `${e.duration} min · ${e.intensity || ''}` : (e.multiplier && e.multiplier !== 1 ? `×${e.multiplier}` : ''),
      isActivity ? -Math.round(e.calories) : Math.round(e.calories || 0),
      e.carbs || 0, e.protein || 0, e.fat || 0,
    ]);
  }
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
  const filename = `plate-export-${todayISO()}.csv`;
  saveTextFile(csv, filename, 'text/csv;charset=utf-8');
}

// ============================================================
// RESEARCH EXPORT — clean multi-table schema for analysis
// Produces 4 linked CSVs: meals, urges, daily, events.
// Designed for direct loading into R or Python (pandas).
// ============================================================
function exportResearchData() {
  const todayKey = entryDate(Date.now());
  const csvEscape = (v) => {
    if (v == null) return '';
    const s = String(v);
    if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
    return s;
  };
  const toCSV = (header, rows) => {
    const lines = [header.join(',')];
    for (const row of rows) {
      lines.push(header.map(h => csvEscape(row[h])).join(','));
    }
    return lines.join('\n');
  };

  // === meals.csv: one row per food/activity entry ===
  const mealsHeader = ['entry_id', 'timestamp_iso', 'date', 'hour', 'day_of_week', 'type', 'name', 'calories', 'carbs_g', 'protein_g', 'fat_g', 'multiplier', 'eating_reason', 'mood', 'hunger_at_meal', 'anticipated_satisfaction', 'actual_satisfaction', 'source', 'is_custom_food'];
  const mealRows = state.entries.map(e => {
    const d = new Date(e.timestamp);
    return {
      entry_id: e.id,
      timestamp_iso: d.toISOString(),
      date: entryDate(e.timestamp),
      hour: d.getHours(),
      day_of_week: d.getDay(),
      type: e.type === 'activity' ? 'activity' : 'food',
      name: e.name,
      calories: e.type === 'activity' ? -Math.round(e.calories || 0) : Math.round(e.calories || 0),
      carbs_g: e.carbs || 0,
      protein_g: e.protein || 0,
      fat_g: e.fat || 0,
      multiplier: e.multiplier || 1,
      eating_reason: e.eatingReason || '',
      mood: e.mood || '',
      hunger_at_meal: e.hungerAtMeal || '',
      anticipated_satisfaction: e.anticipatedSatisfaction || '',
      actual_satisfaction: e.actualSatisfaction || '',
      source: e.foodSource || '',
      is_custom_food: e.isCustomFood ? 1 : 0,
    };
  });
  const mealsCSV = toCSV(mealsHeader, mealRows);

  // === urges.csv: one row per urge event ===
  const urgesHeader = ['urge_id', 'timestamp_iso', 'date', 'hour', 'day_of_week', 'initial_intensity', 'final_intensity', 'intensity_drop', 'trigger', 'interrupt_type', 'duration_sec', 'pulse_before', 'pulse_after', 'pulse_change', 'ate_anyway'];
  const urgeRows = (state.urges || []).map(u => {
    const d = new Date(u.timestamp);
    const drop = (u.initialIntensity != null && u.finalIntensity != null) ? u.initialIntensity - u.finalIntensity : null;
    const pulseChange = (u.pulseBefore != null && u.pulseAfter != null) ? u.pulseAfter - u.pulseBefore : null;
    return {
      urge_id: u.id,
      timestamp_iso: d.toISOString(),
      date: entryDate(u.timestamp),
      hour: d.getHours(),
      day_of_week: d.getDay(),
      initial_intensity: u.initialIntensity,
      final_intensity: u.finalIntensity != null ? u.finalIntensity : '',
      intensity_drop: drop != null ? drop : '',
      trigger: u.trigger || '',
      interrupt_type: u.interruptType || '',
      duration_sec: u.durationSec || '',
      pulse_before: u.pulseBefore || '',
      pulse_after: u.pulseAfter || '',
      pulse_change: pulseChange != null ? pulseChange : '',
      ate_anyway: u.ateAnyway === true ? 1 : u.ateAnyway === false ? 0 : '',
    };
  });
  const urgesCSV = toCSV(urgesHeader, urgeRows);

  // === daily.csv: one row per day with daily check-in + daily totals ===
  // Aggregate entries by date
  const byDay = {};
  for (const e of state.entries) {
    const d = entryDate(e.timestamp);
    if (!byDay[d]) byDay[d] = { food_kcal: 0, activity_kcal: 0, food_count: 0, eating_reasons: {}, moods: {}, satisfaction_sum: 0, satisfaction_count: 0, meal_times: [] };
    if (e.type === 'activity') byDay[d].activity_kcal += e.calories || 0;
    else {
      byDay[d].food_kcal += e.calories || 0;
      byDay[d].food_count++;
      byDay[d].meal_times.push(new Date(e.timestamp).getHours() + new Date(e.timestamp).getMinutes()/60);
      if (e.eatingReason) byDay[d].eating_reasons[e.eatingReason] = (byDay[d].eating_reasons[e.eatingReason] || 0) + 1;
      if (e.mood) byDay[d].moods[e.mood] = (byDay[d].moods[e.mood] || 0) + 1;
      if (e.actualSatisfaction != null) { byDay[d].satisfaction_sum += e.actualSatisfaction; byDay[d].satisfaction_count++; }
    }
  }
  // Group urges by day
  const urgesByDay = {};
  for (const u of (state.urges || [])) {
    const d = entryDate(u.timestamp);
    if (!urgesByDay[d]) urgesByDay[d] = { count: 0, beaten: 0 };
    urgesByDay[d].count++;
    if (u.ateAnyway === false) urgesByDay[d].beaten++;
  }
  const checkinsByDay = {};
  for (const c of state.dailyCheckins) checkinsByDay[c.date] = c;
  // Build daily rows
  const allDates = Array.from(new Set([
    ...Object.keys(byDay),
    ...Object.keys(checkinsByDay),
    ...Object.keys(urgesByDay),
  ])).sort();
  const dailyHeader = ['date', 'day_of_week', 'food_kcal', 'activity_kcal', 'net_kcal', 'goal_kcal', 'over_goal', 'food_entries', 'avg_satisfaction', 'first_meal_hour', 'last_meal_hour', 'meal_count', 'top_reason', 'top_mood', 'sleep_hours', 'sleep_quality', 'stress', 'hunger', 'craving', 'weight_kg', 'urge_count', 'urges_beaten'];
  const dailyRows = allDates.map(date => {
    const day = byDay[date] || { food_kcal: 0, activity_kcal: 0, food_count: 0, eating_reasons: {}, moods: {}, satisfaction_sum: 0, satisfaction_count: 0, meal_times: [] };
    const checkin = checkinsByDay[date] || {};
    const urges = urgesByDay[date] || { count: 0, beaten: 0 };
    const net = Math.round(day.food_kcal - day.activity_kcal);
    const topReason = Object.keys(day.eating_reasons).sort((a, b) => day.eating_reasons[b] - day.eating_reasons[a])[0] || '';
    const topMood = Object.keys(day.moods).sort((a, b) => day.moods[b] - day.moods[a])[0] || '';
    const mealTimes = day.meal_times;
    return {
      date,
      day_of_week: new Date(date + 'T12:00:00').getDay(),
      food_kcal: Math.round(day.food_kcal),
      activity_kcal: Math.round(day.activity_kcal),
      net_kcal: net,
      goal_kcal: state.dailyGoal,
      over_goal: net > state.dailyGoal ? 1 : 0,
      food_entries: day.food_count,
      avg_satisfaction: day.satisfaction_count > 0 ? (day.satisfaction_sum / day.satisfaction_count).toFixed(2) : '',
      first_meal_hour: mealTimes.length > 0 ? Math.min(...mealTimes).toFixed(2) : '',
      last_meal_hour: mealTimes.length > 0 ? Math.max(...mealTimes).toFixed(2) : '',
      meal_count: mealTimes.length,
      top_reason: topReason,
      top_mood: topMood,
      sleep_hours: checkin.sleepHours != null ? checkin.sleepHours : '',
      sleep_quality: checkin.sleepQuality != null ? checkin.sleepQuality : '',
      stress: checkin.stress != null ? checkin.stress : '',
      hunger: checkin.hunger != null ? checkin.hunger : '',
      craving: checkin.craving != null ? checkin.craving : '',
      weight_kg: checkin.weight != null ? checkin.weight : '',
      urge_count: urges.count,
      urges_beaten: urges.beaten,
    };
  });
  const dailyCSV = toCSV(dailyHeader, dailyRows);

  // === events.csv: defined "overeating events" — primary dependent variable ===
  // Definition: any day where net_kcal > 110% of goal
  const eventsHeader = ['date', 'day_of_week', 'net_kcal', 'goal_kcal', 'excess_kcal', 'excess_pct', 'top_reason', 'top_mood', 'sleep_hours_prev', 'sleep_quality_prev', 'stress_prev', 'hunger_prev', 'craving_prev', 'event_type'];
  const eventRows = [];
  for (const dailyRow of dailyRows) {
    if (dailyRow.over_goal !== 1) continue;
    const excess = dailyRow.net_kcal - dailyRow.goal_kcal;
    const excessPct = ((excess / dailyRow.goal_kcal) * 100).toFixed(1);
    if (excess < dailyRow.goal_kcal * 0.1) continue; // require ≥10% over goal
    // Get previous day's check-in (the "exposure" before the event)
    const prevDate = new Date(dailyRow.date + 'T12:00:00');
    prevDate.setDate(prevDate.getDate() - 1);
    const prevDateStr = entryDate(prevDate.getTime());
    const prevCheckin = checkinsByDay[prevDateStr] || {};
    eventRows.push({
      date: dailyRow.date,
      day_of_week: dailyRow.day_of_week,
      net_kcal: dailyRow.net_kcal,
      goal_kcal: dailyRow.goal_kcal,
      excess_kcal: excess,
      excess_pct: excessPct,
      top_reason: dailyRow.top_reason,
      top_mood: dailyRow.top_mood,
      sleep_hours_prev: prevCheckin.sleepHours != null ? prevCheckin.sleepHours : '',
      sleep_quality_prev: prevCheckin.sleepQuality != null ? prevCheckin.sleepQuality : '',
      stress_prev: prevCheckin.stress != null ? prevCheckin.stress : '',
      hunger_prev: prevCheckin.hunger != null ? prevCheckin.hunger : '',
      craving_prev: prevCheckin.craving != null ? prevCheckin.craving : '',
      event_type: excess > dailyRow.goal_kcal * 0.25 ? 'binge' : 'overshoot',
    });
  }
  const eventsCSV = toCSV(eventsHeader, eventRows);

  // === README explaining the schema ===
  const readme = `# Plate Research Export
Generated: ${new Date().toISOString()}

## Files
1. **meals.csv** — every food and activity entry (long format)
2. **urges.csv** — every urge event with intensities and outcomes
3. **daily.csv** — one row per day: totals + daily check-in + urge summary
4. **events.csv** — defined overeating events (days >110% of goal), with previous day's check-in as exposure data

## Schema notes
- All timestamps in ISO 8601 (UTC)
- day_of_week: 0=Sunday, 1=Monday, ..., 6=Saturday
- mood values: great, ok, stressed, down
- eating_reason values: hungry, bored, stressed, celebrating, social, habit, craving, tired
- interrupt_type values: wave, cold, breathe, move, water
- sleep_quality: 1=Poor, 2=Fair, 3=Good, 4=Great
- stress/hunger/craving: 1=low, 5=high
- hunger_at_meal: 1=full, 2=mild, 3=moderate, 4=strong, 5=extreme (Likert at meal log time)
- ate_anyway: 1=yes, 0=no (urge beaten)
- over_goal: 1 if net_kcal > goal_kcal
- event_type: 'overshoot' (10-25% over) or 'binge' (>25% over)

## Suggested analyses
- Logistic regression: over_goal ~ sleep + stress + craving + day_of_week + previous_day_hunger
- Random forest classification of binge events
- **Rebound risk validation**: Use rolling 14-day hunger_at_meal mean as predictor of subsequent binge events. The hypothesis: rising hunger trajectory predicts rebound within 7-14 days.
- Survival analysis: time-to-binge by hunger trend slope
- Behavioural entropy (variance of meal_times, calories, reasons over rolling windows)
- Survival analysis: time-to-next-overeating-event by intervention type

## Row counts
- meals: ${mealRows.length}
- urges: ${urgeRows.length}
- daily: ${dailyRows.length}
- events: ${eventRows.length}
`;

  // Combine all into a single text bundle (since we can't easily zip on a single-file app)
  // We'll concatenate with file markers, plus offer separate downloads if user wants
  const bundle = [
    '=== README.md ===',
    readme,
    '',
    '=== meals.csv ===',
    mealsCSV,
    '',
    '=== urges.csv ===',
    urgesCSV,
    '',
    '=== daily.csv ===',
    dailyCSV,
    '',
    '=== events.csv ===',
    eventsCSV,
  ].join('\n');

  const filename = `plate-research-${todayISO()}.txt`;
  saveTextFile(bundle, filename, 'text/plain;charset=utf-8');
}

// Universal text-file save with iOS-compatible chain:
// 1. Web Share API with file (best on iOS 15+ — gives native share sheet with "Save to Files")
// 2. Web Share API with text only (older iOS fallback)
// 3. New tab with blob URL (iOS Safari — user uses Safari's Share menu from there)
// 4. <a download> link (desktop + Android)
async function saveTextFile(content, filename, mimeType) {
  mimeType = mimeType || 'text/plain';
  const blob = new Blob([content], { type: mimeType });
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;

  // Path 1: Web Share API with file — best UX on iOS 15+
  if (navigator.canShare && navigator.share && typeof File !== 'undefined') {
    try {
      const file = new File([blob], filename, { type: mimeType });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: 'Plate export',
        });
        return;
      }
    } catch (err) {
      if (err && err.name === 'AbortError') return; // user cancelled
      // Otherwise fall through
    }
  }

  // Path 2: Share text only (older iOS without file sharing)
  if (isIOS && navigator.share) {
    try {
      await navigator.share({ title: filename, text: content });
      return;
    } catch (err) {
      if (err && err.name === 'AbortError') return;
      // Fall through
    }
  }

  // Path 3: iOS — open blob in new tab, user can Share → Save to Files from Safari
  if (isIOS) {
    const url = URL.createObjectURL(blob);
    const win = window.open(url, '_blank');
    if (!win) {
      alert(`Couldn't open the export. In Safari, please ensure pop-ups are allowed for this site, then try again.\n\nFilename: ${filename}`);
    } else {
      // Add a small instruction toast since iOS users won't know to tap Share
      setTimeout(() => alert(`The file opened in a new tab. To save it: tap the Share icon, then "Save to Files".`), 400);
    }
    setTimeout(() => URL.revokeObjectURL(url), 60000);
    return;
  }

  // Path 4: Desktop + Android — <a download>
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function attachPhoto(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxDim = 240;
      const scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      if (state.pending) set({ pending: { ...state.pending, photo: dataUrl } });
      else if (state.manualDraft) set({ manualDraft: { ...state.manualDraft, photo: dataUrl } });
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// STEPPER — tappable number picker (replaces text inputs)
// ============================================================
function renderStepper(opts) {
  // opts: { id, label, value, min, max, step, unit, onChange (string js expression) }
  const v = opts.value == null || opts.value === '' ? opts.default || opts.min : Number(opts.value);
  const min = opts.min ?? 0;
  const max = opts.max ?? 9999;
  const step = opts.step ?? 1;
  const newVal = (delta) => Math.max(min, Math.min(max, Math.round((v + delta) / step) * step));
  const decBig = opts.bigStep ? `<button class="stepper-btn" onclick="${opts.onChange.replace('VALUE', newVal(-opts.bigStep))}" style="font-size:13px; width:36px">−${opts.bigStep}</button>` : '';
  const incBig = opts.bigStep ? `<button class="stepper-btn" onclick="${opts.onChange.replace('VALUE', newVal(opts.bigStep))}" style="font-size:13px; width:36px">+${opts.bigStep}</button>` : '';
  return `
    ${opts.label ? `<div class="stepper-label">${escapeHtml(opts.label)}</div>` : ''}
    <div class="stepper">
      ${decBig}
      <button class="stepper-btn" onclick="${opts.onChange.replace('VALUE', newVal(-step))}" ${v <= min ? 'disabled' : ''}>−</button>
      <span class="stepper-val">${formatStepperVal(v, step)}${opts.unit ? `<span class="unit">${opts.unit}</span>` : ''}</span>
      <button class="stepper-btn" onclick="${opts.onChange.replace('VALUE', newVal(step))}" ${v >= max ? 'disabled' : ''}>+</button>
      ${incBig}
    </div>
  `;
}
function formatStepperVal(v, step) {
  if (step < 1) return v.toFixed(1);
  return String(Math.round(v));
}

function getDaysSinceStart() {
  if (state.entries.length === 0) return 0;
  const oldest = Math.min(...state.entries.map(e => e.timestamp));
  return Math.floor((Date.now() - oldest) / 86400000) + 1;
}

function getBestStreakEver() {
  const dates = [...new Set(state.entries.map(e => entryDate(e.timestamp)))].sort();
  if (dates.length === 0) return 0;
  let best = 1, current = 1;
  for (let i = 1; i < dates.length; i++) {
    const d1 = new Date(dates[i-1] + 'T00:00:00');
    const d2 = new Date(dates[i] + 'T00:00:00');
    const diff = Math.round((d2 - d1) / 86400000);
    if (diff === 1) { current++; best = Math.max(best, current); }
    else { current = 1; }
  }
  return Math.max(best, calculateStreak(state.entries));
}

function getTotalKcalSaved() {
  // Versus user's maintenance (TDEE). Sum of (TDEE - day_intake) for days under maintenance.
  const profile = loadProfile();
  if (!profile) return null;
  const tdee = calculateTDEE(profile.weight, profile.height, profile.age, profile.sex, profile.activityLevel);
  const byDay = {};
  for (const e of state.entries.filter(x => x.type !== 'activity')) {
    const k = entryDate(e.timestamp);
    byDay[k] = (byDay[k] || 0) + (e.calories || 0);
  }
  let saved = 0;
  for (const day of Object.keys(byDay)) {
    const diff = tdee - byDay[day];
    if (diff > 0) saved += diff;
  }
  return Math.round(saved);
}

function getTotalExerciseMinutes() {
  return state.entries.filter(e => e.type === 'activity').reduce((a, e) => a + (e.duration || 0), 0);
}

function getWorkoutCount(daysBack) {
  const cutoff = Date.now() - daysBack * 86400000;
  return state.entries.filter(e => e.type === 'activity' && e.timestamp > cutoff).length;
}

function getFoodVariety() {
  const names = new Set(state.entries.filter(e => e.type !== 'activity').map(e => e.name));
  return names.size;
}

function getDaysAtGoalCount() {
  const goal = state.dailyGoal;
  const byDay = {};
  for (const e of state.entries.filter(x => x.type !== 'activity')) {
    const k = entryDate(e.timestamp);
    byDay[k] = (byDay[k] || 0) + (e.calories || 0);
  }
  return Object.values(byDay).filter(v => v > 0 && v <= goal).length;
}

function getWaistLost() {
  const ms = state.measurements.filter(m => m.waist).sort((a, b) => a.timestamp - b.timestamp);
  if (ms.length < 2) return null;
  return { from: ms[0].waist, to: ms[ms.length-1].waist, lost: ms[0].waist - ms[ms.length-1].waist };
}

function getSmoothedWeight() {
  // 7-day rolling average of latest entries
  const ms = state.measurements.filter(m => m.weight).sort((a, b) => b.timestamp - a.timestamp);
  if (ms.length === 0) return null;
  const recent = ms.filter(m => m.timestamp > Date.now() - 7 * 86400000);
  if (recent.length >= 2) {
    const avg = recent.reduce((a, m) => a + m.weight, 0) / recent.length;
    return { current: avg.toFixed(1), count: recent.length, isAverage: true };
  }
  return { current: ms[0].weight.toFixed(1), count: 1, isAverage: false };
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 5) return 'late one tonight';
  if (h < 12) return 'good morning';
  if (h < 17) return 'good afternoon';
  if (h < 21) return 'good evening';
  return 'good evening';
}

// ============================================================
// PLANT COMPANION — grows with your data
// ============================================================
function getPlantState() {
  const days = getDaysSinceStart();
  const streak = calculateStreak(state.entries);
  const totalEntries = state.entries.length;
  const urgesBeaten = (state.urges || []).filter(u => u.ateAnyway === false).length;
  const daysAtGoal = getDaysAtGoalCount();
  const totalMeasurements = (state.measurements || []).length;
  const totalWorkouts = state.entries.filter(e => e.type === 'activity').length;

  // Stage 0-7:
  //   0 = no data
  //   1 = seed (first entry)
  //   2 = sprout (3+ days)
  //   3 = seedling with first leaf (7 days)
  //   4 = small plant with leaves (14 days, 3+ days at goal)
  //   5 = plant with bud (21 days)
  //   6 = blooming (30 days OR 5+ urges beaten)
  //   7 = fruiting (60 days OR 10+ urges beaten OR first waist measurement reduction)
  let stage = 0;
  if (totalEntries >= 1) stage = 1;
  if (days >= 3) stage = 2;
  if (days >= 7 && totalEntries >= 5) stage = 3;
  if (days >= 14 && daysAtGoal >= 3) stage = 4;
  if (days >= 21 && totalEntries >= 20) stage = 5;
  if (days >= 30 || urgesBeaten >= 5) stage = 6;
  if (days >= 60 || urgesBeaten >= 10 || totalMeasurements >= 4) stage = 7;

  // Health = 0-1. Reduces if no entries in 2+ days, recovers when active
  const daysSinceLastEntry = getDaysSinceLastEntry();
  let health = 1;
  if (daysSinceLastEntry == null) health = 1;
  else if (daysSinceLastEntry >= 5) health = 0.4;
  else if (daysSinceLastEntry >= 3) health = 0.65;
  else if (daysSinceLastEntry >= 2) health = 0.8;

  // Pause mode keeps the plant healthy
  if (isPaused()) health = 1;

  return { stage, health, days, streak, totalEntries, urgesBeaten, daysAtGoal, totalMeasurements, totalWorkouts };
}

// Track which stage was last seen so we can detect stage-ups
const STORAGE_PLANT_LAST_STAGE = 'plate-plant-last-stage';
const STORAGE_PLANT_LAST_WATERED = 'plate-plant-last-watered';
function loadPlantLastStage() { try { const v = localStorage.getItem(STORAGE_PLANT_LAST_STAGE); return v ? parseInt(v) : 0; } catch { return 0; } }
function savePlantLastStage(s) { try { localStorage.setItem(STORAGE_PLANT_LAST_STAGE, String(s)); } catch {} }
function loadPlantLastWatered() { try { const v = localStorage.getItem(STORAGE_PLANT_LAST_WATERED); return v ? parseInt(v) : 0; } catch { return 0; } }
function savePlantLastWatered(ts) { try { localStorage.setItem(STORAGE_PLANT_LAST_WATERED, String(ts)); } catch {} }

function checkPlantStageUp() {
  const current = getPlantState();
  const last = loadPlantLastStage();
  if (current.stage > last) {
    savePlantLastStage(current.stage);
    state.plantStageUp = { from: last, to: current.stage, health: current.health };
    render();
    return true;
  }
  return false;
}

function dismissPlantStageUp() {
  state.plantStageUp = null;
  render();
}

function waterPlant() {
  savePlantLastWatered(Date.now());
  state.justWatered = true;
  render();
  setTimeout(() => { state.justWatered = false; render(); }, 1800);
}

function getTimeOfDay() {
  const h = new Date().getHours();
  if (h >= 5 && h < 8) return 'dawn';
  if (h >= 8 && h < 17) return 'day';
  if (h >= 17 && h < 20) return 'dusk';
  return 'night';
}
