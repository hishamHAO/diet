function renderWaveAnimation(elapsed, total, intensity) {
  // The wave: rises in first third, peaks in middle, falls in last third
  // We model it as a single bell curve, with surfer riding the peak
  const t = Math.min(1, elapsed / total);
  const wavePhase = elapsed * 0.1; // for oscillation

  // Bell curve: peak intensity at t=0.5, ease in and out
  // Maps t [0,1] to amplitude [0,1] then back
  const bellAmp = Math.exp(-Math.pow((t - 0.5) * 3.5, 2));

  // Y position of the surfer on the wave (lower = higher on screen)
  // Wave amplitude scales with the bell curve
  const waveBaseY = 160; // baseline
  const waveAmpMax = 90 + (intensity * 10); // taller wave for stronger urges
  const waveAmp = waveAmpMax * bellAmp;

  // Phase text by t
  let phaseText = '';
  if (t < 0.15) phaseText = 'the wave is rising';
  else if (t < 0.4) phaseText = 'it\'s building — just watch';
  else if (t < 0.55) phaseText = 'this is the peak';
  else if (t < 0.8) phaseText = 'it\'s passing';
  else phaseText = 'almost calm';

  // Generate a smooth wave path
  // We sample x from 0 to 400 (svg width)
  const pathPoints = [];
  for (let x = 0; x <= 400; x += 5) {
    // Wave shape: combination of sine for traveling wave + the bell curve for amplitude
    const localPhase = x / 60 + wavePhase;
    const y = waveBaseY - waveAmp * Math.exp(-Math.pow((x - 200) / 110, 2)) * (0.7 + 0.3 * Math.sin(localPhase));
    pathPoints.push([x, y]);
  }
  // Close to form filled shape
  const wavePath = `M 0 260 L 0 ${pathPoints[0][1]} ` +
    pathPoints.map(([x, y]) => `L ${x} ${y}`).join(' ') +
    ` L 400 260 Z`;

  // Background wave (slightly smaller, faded)
  const bgPathPoints = [];
  for (let x = 0; x <= 400; x += 5) {
    const localPhase = x / 70 + wavePhase * 0.6 + 1.5;
    const y = waveBaseY + 10 - (waveAmp * 0.7) * Math.exp(-Math.pow((x - 200) / 130, 2)) * (0.7 + 0.3 * Math.sin(localPhase));
    bgPathPoints.push([x, y]);
  }
  const bgWavePath = `M 0 260 L 0 ${bgPathPoints[0][1]} ` +
    bgPathPoints.map(([x, y]) => `L ${x} ${y}`).join(' ') +
    ` L 400 260 Z`;

  // Surfer position — rides the peak of the main wave
  // X moves left to right across the wave
  const surferX = 60 + (t * 280);
  // Get the wave's Y at surferX (interpolated)
  const surferLocalPhase = surferX / 60 + wavePhase;
  const surferY = waveBaseY - waveAmp * Math.exp(-Math.pow((surferX - 200) / 110, 2)) * (0.7 + 0.3 * Math.sin(surferLocalPhase));
  const surferTilt = bellAmp > 0.7 ? 10 : bellAmp > 0.4 ? 5 : 0;

  const remaining = Math.max(0, Math.ceil(total - elapsed));

  return `
    <div class="wave-area">
      <div class="wave-instruction">${escapeHtml(phaseText)}</div>
      <svg class="wave-svg" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <!-- Background sky / horizon glow -->
        <defs>
          <linearGradient id="wavesky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d8e7ec"/>
            <stop offset="100%" stop-color="#b8d4dc"/>
          </linearGradient>
        </defs>
        <!-- Sun on horizon -->
        <circle cx="320" cy="80" r="20" fill="#f6dc8a" opacity="0.4"/>
        <circle cx="320" cy="80" r="14" fill="#f6dc8a" opacity="0.7"/>
        <!-- Background wave -->
        <path d="${bgWavePath}" class="wave-fill-2"/>
        <!-- Main wave -->
        <path d="${wavePath}" class="wave-fill"/>
        <!-- Foam crest along main wave -->
        ${pathPoints.filter((_, i) => i % 6 === 0).map(([x, y]) => `<circle cx="${x}" cy="${y - 1}" r="1.3" fill="rgba(255,255,255,0.7)"/>`).join('')}
      </svg>
      <!-- Surfer figure -->
      <div class="wave-surfer" style="left: ${(surferX / 400) * 100}%; top: ${(surferY / 260) * 100}%; transform: translate(-50%, -100%) rotate(${surferTilt}deg);">
        <svg width="32" height="40" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
          <!-- Surfboard -->
          <ellipse cx="16" cy="34" rx="14" ry="3" fill="#e8c46a"/>
          <ellipse cx="16" cy="33" rx="13" ry="2" fill="#f4d986"/>
          <!-- Person -->
          <circle cx="16" cy="8" r="4" fill="#5a4030"/>
          <path d="M 16 12 L 16 26 L 12 30 M 16 26 L 20 30" stroke="#5a4030" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M 12 18 L 8 22 M 20 18 L 24 22" stroke="#5a4030" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="wave-timer-pill">${remaining}s</div>
      <div class="wave-intensity-label">urge ${intensity}/5 · watch it pass</div>
    </div>
  `;
}

function checkAndAwardBadges() {
  const earned = new Set(state.earnedBadges);
  const newly = [];
  for (const b of BADGE_DEFINITIONS) {
    if (!earned.has(b.id) && b.check(state)) {
      earned.add(b.id);
      newly.push(b);
    }
  }
  if (newly.length > 0) {
    const updated = Array.from(earned);
    saveBadges(updated);
    state.earnedBadges = updated;
    // Fire toast for the first one
    if (typeof showBadgeToast === 'function') showBadgeToast(newly[0]);
  }
  // Always check for milestone celebrations after badge check
  checkMilestones();
  // Check for plant stage-up
  checkPlantStageUp();
  // Snapshot Plate Score for trend tracking
  try { savePlateScoreSnapshot(); } catch {}
  return newly;
}

const FALLBACK_REPLIES = [
  "Got it. Want stats on where you are, encouragement, or to talk through something specific?",
  "OK — try one of the chips below, or be specific: are you struggling, doing well, hungry, or just venting?",
  "Hmm, not sure what to grab onto there. Tap a chip below or rephrase — even one word like 'tired' or 'slipped' helps.",
];

const WELCOME_MESSAGE = "Hi 👋 I'm your coach. I'm here for the moments tracking gets hard — when you want to quit, when you've slipped, when you just want a nudge. Tap a chip below or tell me what's on your mind.";

function getCoachContext() {
  const last7 = getLast7Days();
  const daysWithData = last7.filter(d => d.hasData);
  const streak = calculateStreak(state.entries);
  const weeklyAvg = daysWithData.length ? Math.round(daysWithData.reduce((a, d) => a + d.food, 0) / daysWithData.length) : 0;
  const weeklyNet = daysWithData.length ? Math.round(daysWithData.reduce((a, d) => a + d.net, 0) / daysWithData.length) : 0;
  const daysAtGoal = last7.filter(d => d.hasData && d.net > 0 && d.net <= state.dailyGoal).length;
  const exerciseCount = state.entries.filter(e => e.type === 'activity' && e.timestamp > Date.now() - 7 * 86400000).length;
  const totalEntries = state.entries.length;
  const bestDayObj = [...last7].filter(d => d.hasData && d.net > 0 && d.net <= state.dailyGoal).sort((a, b) => b.net - a.net)[0];
  const bestDay = bestDayObj ? `${bestDayObj.dayName} was your best (${bestDayObj.net} kcal)` : 'no perfect day yet this week';
  const whyLine = state.whyText ? `You wrote: "${state.whyText}" — still true?` : '';

  // BEHAVIOR COACH — user's most effective strategy
  const cascade = getCascadePatterns();
  const bestStrategy = cascade?.bestInterrupt ? `Your data shows ${{cold:'cold water', breathe:'slow breathing', move:'movement', water:'cold drink'}[cascade.bestInterrupt.type]} works ${cascade.bestInterrupt.successRate}% of the time for you (${cascade.bestInterrupt.attempts} tries).` : '';
  const recoveryScore = getRecoveryScore();
  const recoveryLine = recoveryScore ? `Recovery score: ${recoveryScore.score}/100. ${recoveryScore.avgRecoveryDays != null ? `You bounce back from slips in ${recoveryScore.avgRecoveryDays} days on average.` : ''}` : '';
  const whyPattern = getWhyPatterns();
  const whyPatternLine = whyPattern ? `${whyPattern.pct}% of your over-goal days are driven by ${whyPattern.dominant}.` : '';
  const futureYou = getFutureYou(12);
  const trajectoryLine = futureYou ? `At your current pace: ${futureYou.totalChange >= 0 ? '+' : ''}${futureYou.totalChange.toFixed(1)} kg by ${futureYou.targetDate}.` : '';

  let verdict = "Steady. Keep showing up.";
  if (totalEntries === 0) verdict = "Nothing logged yet. The first entry is the hardest.";
  else if (streak === 0) verdict = "You've slipped — that's OK. Today is a good restart.";
  else if (streak >= 14) verdict = "Two full weeks. That's not a phase, it's a habit.";
  else if (streak >= 7) verdict = "A full week running. Don't break it now.";
  else if (weeklyAvg > state.dailyGoal * 1.15) verdict = "Running hot this week — maybe ease back a touch.";
  else if (weeklyAvg < state.dailyGoal * 0.85 && streak >= 3) verdict = "Going well. Don't make it harder than it needs to be.";

  const streakLine = streak > 0 ? `${streak}-day streak.` : "You're at the start.";
  const weeklyLine = weeklyAvg > 0 ? `Avg ${weeklyAvg} kcal/day this week.` : "";
  const entriesLine = totalEntries > 0 ? `${totalEntries} entries logged — that's not nothing.` : "Tomorrow is fresh.";
  const daysAtGoalLine = daysWithData.length > 0 ? `${daysAtGoal}/7 days at goal.` : "";

  return { streak, weeklyAvg, weeklyNet, daysAtGoal, exerciseCount, totalEntries, goal: state.dailyGoal, bestDay, verdict, streakLine, weeklyLine, entriesLine, daysAtGoalLine, whyLine, bestStrategy, recoveryLine, whyPatternLine, trajectoryLine };
}

function generateCoachReply(userMessage) {
  const ctx = getCoachContext();
  const txt = userMessage.toLowerCase().trim();

  // 1. Try to match an intent directly
  let intent = null;
  for (const i of INTENTS) {
    if (i.patterns.test(txt)) { intent = i; break; }
  }

  // 2. If no intent matched, check if the previous coach message was a "tell me more"
  //    style follow-up. If so, look back further to find the active intent context.
  if (!intent) {
    const coachMsgs = state.chatMessages.filter(m => m.role === 'coach');
    const lastCoach = coachMsgs[coachMsgs.length - 1];
    const lastWasOpenEnded = lastCoach && /tell me (more|a bit|what)|what'?s (going on|the actual|happening)|what (would|do you)|talk to me|i'?m listening|listening\./i.test(lastCoach.text);

    if (lastWasOpenEnded) {
      // Look back through user messages to find the original intent
      const userMsgs = state.chatMessages.filter(m => m.role === 'user').slice(-4); // last 4 turns
      for (let i = userMsgs.length - 1; i >= 0; i--) {
        const prev = userMsgs[i].text.toLowerCase().trim();
        for (const candidateIntent of INTENTS) {
          if (candidateIntent.patterns.test(prev)) {
            intent = candidateIntent;
            break;
          }
        }
        if (intent) break;
      }
    }
  }

  // 3. If user's message contains specific content words even without intent match,
  //    try harder — common slip phrasings
  if (!intent) {
    if (/hungry|hungery|hangry|starv|peckish|craving/i.test(txt)) intent = INTENTS.find(i => i.name === 'hungry');
    else if (/saw food|saw some food|saw the food|in front of me|smelled|smell of|couldn'?t resist|couldnt resist|gave in|caved|too tempting|temptation/i.test(txt)) intent = INTENTS.find(i => i.name === 'slipped');
    else if (/feel(ing)? (bad|low|sad|down|awful|terrible|guilty|crap|shit|rubbish|rough|miserable|gross|heavy)|not (doing|going) (well|great|good)|having a (bad|rough|tough) (day|time)/i.test(txt)) intent = INTENTS.find(i => i.name === 'feel_bad');
    else if (/^(some |a bit )?(encouragement|motivation|push|boost|pep talk|support|nudge)/i.test(txt)) intent = INTENTS.find(i => i.name === 'motivate');
  }

  const replies = intent ? intent.replies : FALLBACK_REPLIES;

  // Avoid repeating very recent replies — track last 5 coach messages
  const recentTexts = state.chatMessages.slice(-10).filter(m => m.role === 'coach').map(m => m.text);
  const fresh = replies.filter(template => {
    // Compare against rendered text (first 30 chars), since templates differ from rendered
    const rendered = template.replace(/\{(\w+)\}/g, '').replace(/\s+/g, ' ').slice(0, 30);
    return !recentTexts.some(prev => prev.slice(0, 30) === rendered || prev.slice(0, 30).startsWith(rendered.slice(0, 20)));
  });
  const pool = fresh.length > 0 ? fresh : replies;
  const template = pool[Math.floor(Math.random() * pool.length)];
  let result = template.replace(/\{(\w+)\}/g, (_, key) => (ctx[key] !== undefined && ctx[key] !== '') ? String(ctx[key]) : '');
  return result.replace(/\s+/g, ' ').replace(/\s+([.,!?])/g, '$1').trim();
}

function openChat() {
  if (state.chatMessages.length === 0) {
    const welcome = { role: 'coach', text: WELCOME_MESSAGE, ts: Date.now() };
    state.chatMessages = [welcome];
    saveChat(state.chatMessages);
  }
  // Proactive plateau warning — only fires once per 7 days
  const lastPlateauKey = 'plate-plateau-shown';
  const lastShown = parseInt(localStorage.getItem(lastPlateauKey) || '0');
  if (checkPlateauWarning() && (Date.now() - lastShown) > 7 * 86400000) {
    const plateauMsg = {
      role: 'coach',
      text: "Quick heads-up — your weight has been steady for a few measurements now. This usually hits between weeks 3-5 and it's biology, not failure. Glycogen rebalances, water shifts. The scale lies during this window. Real change is still happening. The next 2 weeks are when most people quit. Don't be most people.",
      ts: Date.now(),
    };
    state.chatMessages = [...state.chatMessages, plateauMsg];
    saveChat(state.chatMessages);
    try { localStorage.setItem(lastPlateauKey, String(Date.now())); } catch {}

  set({ showChat: true });

}

  if (chatRecognition && state.chatListening) { try { chatRecognition.stop(); } catch {} }
  set({ showChat: false, chatListening: false });
}
function sendChatMessage(text) {
  text = (text || '').trim();

  const userMsg = { role: 'user', text, ts: Date.now() };

  set({ chatMessages: withUser, chatInputValue: '' });

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function entryDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function formatDateLabel(iso) {
  const today = todayISO();
  const y = new Date(); y.setDate(y.getDate() - 1);
  const yISO = `${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,'0')}-${String(y.getDate()).padStart(2,'0')}`;
  if (iso === today) return 'Today';
  if (iso === yISO) return 'Yesterday';
  return new Date(iso + 'T00:00:00').toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
}
function shiftDate(delta) {
  const d = new Date(state.selectedDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// When the user is viewing a previous day and adds an entry, the entry should
// land on that day. If they're on today, the current time is used.
function getEntryTimestamp() {
  if (state.selectedDate === todayISO()) return Date.now();
  // Past date: anchor entry to noon of that date so the local-day calculation is unambiguous
  const d = new Date(state.selectedDate + 'T12:00:00');
  return d.getTime();
}

// ============================================================
// Speech recognition
// ============================================================
let recognition = null;
let finalText = '';

function setupSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { state.supported = false; return; }
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    let final = '', interim = '';
    for (let i = 0; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t; else interim += t;
    }
    if (final.trim()) finalText = final.trim();
    set({ liveTranscript: (final || interim).trim() });
  };
  recognition.onend = () => {
    const txt = finalText.trim();
    finalText = '';
    set({ isListening: false });
    if (txt) processFood(txt);
  };
  recognition.onerror = (e) => {
    let msg = `Mic error: ${e.error}`;
    if (e.error === 'no-speech') msg = "Didn't catch that — try again.";
    else if (e.error === 'not-allowed') msg = 'Microphone blocked. In Safari: tap "AA" in address bar → Website Settings → Microphone → Allow.';
    set({ isListening: false, error: msg });
  };
}

function startListening() {
  if (!recognition || state.isListening) return;
  finalText = '';
  set({ error: '', liveTranscript: '' });
  try { recognition.start(); set({ isListening: true }); }
  catch { set({ error: 'Could not start mic. Try again.' }); }
}
function stopListening() { if (recognition && state.isListening) { try { recognition.stop(); } catch {} } }

// ============================================================
// Process food (local matching, no API)
// ============================================================
function processFood(text) {
  const { matches, unmatched } = matchFoods(text);

  if (matches.length === 0) {
    set({
      manualDraft: { name: text.trim().replace(/\b\w/g, c => c.toUpperCase()), cal: '', c: '', p: '', f: '' },
      mode: 'manual',
      liveTranscript: '',
      error: '',
    });
    return;
  }

  // SINGLE MATCH → standard pending card with portion chips
  if (matches.length === 1) {
    const m = matches[0];
    const food = m.food;
    const baseCal = m.food.cal;
    const baseC = m.food.c;
    const baseP = m.food.p;
    const baseF = m.food.f;
    const initialMult = baseCal > 0 ? m.cal / baseCal : 1;

    set({
      pending: {
        id: Date.now().toString(),
        timestamp: getEntryTimestamp(),
        spoken: text,
        name: food.display,
        multiplier: initialMult,
        isSingle: true,
        food,
        calories: Math.round(baseCal * initialMult),
        carbs: Math.round(baseC * initialMult * 10) / 10,
        protein: Math.round(baseP * initialMult * 10) / 10,
        fat: Math.round(baseF * initialMult * 10) / 10,
        baseCal, baseC, baseP, baseF,
        breakdown: [{
          name: food.display,
          baseCal,
          cal: Math.round(baseCal * initialMult),
          unit: food.unit,
        }],
        unmatched,
      },
      liveTranscript: '',
      error: '',
    });
    return;
  }

  // MULTI MATCH → multi-confirm card, each item independently adjustable
  const items = matches.map((m, i) => ({
    tempId: 'mi_' + i,
    food: m.food,
    name: m.food.display,
    multiplier: m.food.cal > 0 ? m.cal / m.food.cal : 1,
    baseCal: m.food.cal,
    baseC: m.food.c,
    baseP: m.food.p,
    baseF: m.food.f,
    quantity: m.quantity,
    sizeWord: m.sizeWord,
    included: true,
  }));

  set({
    showMultiConfirm: {
      id: Date.now().toString(),
      timestamp: getEntryTimestamp(),
      spoken: text,
      items,
      unmatched,
      mood: null,
    },
    liveTranscript: '',
    error: '',
  });
}

function multiConfirmSetMult(tempId, mult) {
  if (!state.showMultiConfirm) return;
  const updated = { ...state.showMultiConfirm };
  updated.items = updated.items.map(it => it.tempId === tempId ? { ...it, multiplier: Math.max(0.05, mult) } : it);
  set({ showMultiConfirm: updated });
}

function multiConfirmToggle(tempId) {
  if (!state.showMultiConfirm) return;
  const updated = { ...state.showMultiConfirm };
  updated.items = updated.items.map(it => it.tempId === tempId ? { ...it, included: !it.included } : it);
  set({ showMultiConfirm: updated });
}

function multiConfirmSetMood(mood) {
  if (!state.showMultiConfirm) return;
  set({ showMultiConfirm: { ...state.showMultiConfirm, mood } });
}

function multiConfirmSetEatingReason(reason) {
  if (!state.showMultiConfirm) return;
  set({ showMultiConfirm: { ...state.showMultiConfirm, eatingReason: reason } });
}
function multiConfirmSetHunger(level) {
  if (!state.showMultiConfirm) return;

}

function multiConfirmCancel() { set({ showMultiConfirm: null }); }

function multiConfirmSave() {
  const mc = state.showMultiConfirm;
  if (!mc) return;
  const baseTs = mc.timestamp;
  const newEntries = [...state.entries];
  let saved = 0;
  mc.items.forEach((it, i) => {
    if (!it.included) return;
    const entry = {
      id: (baseTs + i).toString(),
      timestamp: baseTs + i, // tiny offset to preserve order
      name: it.name,
      calories: Math.round(it.baseCal * it.multiplier),
      carbs: Math.round(it.baseC * it.multiplier * 10) / 10,
      protein: Math.round(it.baseP * it.multiplier * 10) / 10,
      fat: Math.round(it.baseF * it.multiplier * 10) / 10,
      multiplier: it.multiplier,
      spoken: mc.spoken,
    };
    if (mc.mood) entry.mood = mc.mood;
    if (mc.eatingReason) entry.eatingReason = mc.eatingReason;
    if (mc.hungerAtMeal) entry.hungerAtMeal = mc.hungerAtMeal;
    newEntries.unshift(entry);
    saved++;
  });
  // Comeback badge check
  const daysSince = getDaysSinceLastEntry();
  if (daysSince != null && daysSince >= 2) {
    const badges = new Set(state.earnedBadges);
    badges.add('did_comeback');
    state.earnedBadges = Array.from(badges);
    saveBadges(state.earnedBadges);
  }
  saveEntries(newEntries);
  set({ entries: newEntries, showMultiConfirm: null, mode: 'voice' });
  checkAndAwardBadges();
}

function confirmEntry() {
  if (!state.pending) return;
  const p = state.pending;
  const entry = {
    id: p.id, timestamp: p.timestamp,
    name: p.name,
    calories: p.calories,
    carbs: p.carbs, protein: p.protein, fat: p.fat,
    multiplier: p.multiplier,
    spoken: p.spoken,
  };
  if (p.unmatched && p.unmatched.length) entry.unmatched = p.unmatched;
  if (p.mood) entry.mood = p.mood;
  if (p.eatingReason) entry.eatingReason = p.eatingReason;
  if (p.hungerAtMeal) entry.hungerAtMeal = p.hungerAtMeal;
  if (p.anticipatedSatisfaction) entry.anticipatedSatisfaction = p.anticipatedSatisfaction;

  // Detect comeback: was paused or had a 2+ day gap
  const daysSince = getDaysSinceLastEntry();
  if (daysSince != null && daysSince >= 2) {
    const badges = new Set(state.earnedBadges);
    badges.add('did_comeback');
    state.earnedBadges = Array.from(badges);
    saveBadges(state.earnedBadges);
  }

  const newEntries = [entry, ...state.entries];
  saveEntries(newEntries);
  set({ entries: newEntries, pending: null, mode: 'voice' });
  checkAndAwardBadges();
}
function setPendingMood(mood) {

}
function setPendingEatingReason(reason) {
  if (!state.pending) return;

}
function setPendingHunger(level) {

}
function setPendingAnticipated(score) {
  if (!state.pending) return;

}
function cancelEntry() { set({ pending: null }); }
function setPendingMultiplier(newMult) {
  if (!state.pending) return;
  newMult = Math.max(0.05, newMult);
  const p = state.pending;
  set({
    pending: {
      ...p,
      multiplier: newMult,
      calories: Math.round(p.baseCal * newMult),
      carbs: Math.round(p.baseC * newMult * 10) / 10,
      protein: Math.round(p.baseP * newMult * 10) / 10,
      fat: Math.round(p.baseF * newMult * 10) / 10,
      breakdown: p.breakdown.map(b => ({ ...b, cal: Math.round(b.baseCal * newMult) })),
    }
  });
}
function adjustPending(delta) {
  if (!state.pending) return;
  setPendingMultiplier((state.pending.multiplier || 1) + delta);
}
function deleteEntry(id) {
  const ne = state.entries.filter(e => e.id !== id);
  saveEntries(ne);
  set({ entries: ne });

function submitText() {
  const v = state.textInputValue.trim();
  if (!v) return;
  state.textInputValue = '';
  processFood(v);
}
function saveManual() {
  const d = state.manualDraft;
  if (!d) return;
  const name = d.name.trim() || 'Unnamed';
  const cal = parseFloat(d.cal) || 0;
  if (cal <= 0) { set({ error: 'Please enter calories.' }); return; }
  const entry = {
    id: Date.now().toString(),
    timestamp: getEntryTimestamp(),
    spoken: name,
    name,
    calories: Math.round(cal),
    carbs: Math.round((parseFloat(d.c) || 0) * 10) / 10,
    protein: Math.round((parseFloat(d.p) || 0) * 10) / 10,
    fat: Math.round((parseFloat(d.f) || 0) * 10) / 10,
    breakdown: [],
    unmatched: [],
  };
  if (d.mood) entry.mood = d.mood;
  if (d.eatingReason) entry.eatingReason = d.eatingReason;
  if (d.hungerAtMeal) entry.hungerAtMeal = d.hungerAtMeal;
  if (d.anticipatedSatisfaction) entry.anticipatedSatisfaction = d.anticipatedSatisfaction;
  const newEntries = [entry, ...state.entries];
  saveEntries(newEntries);
  set({ entries: newEntries, manualDraft: null, mode: 'voice', error: '' });
  checkAndAwardBadges();
}
function setManualMood(mood) {
  if (!state.manualDraft) return;
  set({ manualDraft: { ...state.manualDraft, mood } });
}
function setManualEatingReason(reason) {
  if (!state.manualDraft) return;
  set({ manualDraft: { ...state.manualDraft, eatingReason: reason } });
}
function setManualHunger(level) {
  if (!state.manualDraft) return;
  set({ manualDraft: { ...state.manualDraft, hungerAtMeal: level } });
}
function setManualAnticipated(score) {
  if (!state.manualDraft) return;
  set({ manualDraft: { ...state.manualDraft, anticipatedSatisfaction: score } });
}
function startManual() {
  set({ manualDraft: { name: '', cal: 200, c: 0, p: 0, f: 0 }, mode: 'manual', error: '' });
}
function startActivity() {
  set({ activityDraft: { activity: 'Rowing', duration: 30, intensity: 'moderate' }, mode: 'activity', error: '' });
}
function setActivityField(field, value) {
  if (!state.activityDraft) return;
  const d = { ...state.activityDraft, [field]: value };
  // If switching activity and current intensity isn't available, snap to default
  if (field === 'activity') {
    const a = ACTIVITIES.find(x => x.display === value);
    if (a && !a.mets[d.intensity]) {
      d.intensity = a.mets.moderate ? 'moderate' : (a.mets.light ? 'light' : Object.keys(a.mets)[0]);
    }
  }
  set({ activityDraft: d });
}
function saveActivity() {
  const d = state.activityDraft;
  if (!d) return;
  const cal = computeActivityCalories(d.activity, d.duration, d.intensity, state.userWeight);
  if (cal <= 0) { set({ error: 'Could not estimate calories.' }); return; }
  const entry = {
    id: Date.now().toString(),
    timestamp: getEntryTimestamp(),
    type: 'activity',
    name: d.activity,
    activity: d.activity,
    duration: d.duration,
    intensity: d.intensity,
    icon: getActivityIcon(d.activity),
    calories: cal,
    carbs: 0, protein: 0, fat: 0,
  };
  const newEntries = [entry, ...state.entries];
  saveEntries(newEntries);
  set({ entries: newEntries, activityDraft: null, mode: 'voice', error: '' });
}
function setUserWeight(w) {
  const v = Math.max(20, Math.min(300, parseFloat(w) || 70));
  saveWeight(v);
  set({ userWeight: v });
}
function setUserGoal(g) {
  const v = Math.max(500, Math.min(10000, parseFloat(g) || 2000));
  saveGoal(v);
  set({ dailyGoal: v });
}
function clearAllData() {
  if (!confirm('Delete ALL entries? This cannot be undone.')) return;
  saveEntries([]);
  set({ entries: [], showSettings: false });
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTotals() {
  const day = state.entries.filter(e => entryDate(e.timestamp) === state.selectedDate);
  const foodEntries = day.filter(e => e.type !== 'activity');
  const actEntries = day.filter(e => e.type === 'activity');
  const t = foodEntries.reduce((a, e) => ({
    calories: a.calories + (e.calories || 0),
    carbs: a.carbs + (e.carbs || 0),
    protein: a.protein + (e.protein || 0),
    fat: a.fat + (e.fat || 0),
  }), { calories: 0, carbs: 0, protein: 0, fat: 0 });
  const burned = actEntries.reduce((a, e) => a + (e.calories || 0), 0);
  const net = t.calories - burned;
  const fmt = v => v < 10 ? v.toFixed(1) : Math.round(v).toString();
  const goal = state.dailyGoal;
  const pct = Math.min(100, Math.round((net / goal) * 100));
  const over = net > goal;
  return `
    <div class="card totals">
      <div class="totals-label">${burned > 0 ? 'net calories' : 'calories'}</div>
      <div class="totals-big"><span class="num">${Math.round(net)}</span><span class="unit">kcal</span></div>
      ${burned > 0 ? `
        <div class="net-breakdown">
          <span class="item"><span class="arrow food-arrow">↓</span>${Math.round(t.calories)} eaten</span>
          <span class="item"><span class="arrow burn-arrow">↑</span>${Math.round(burned)} burned</span>
        </div>
      ` : ''}
      <div class="progress">
        <div class="progress-bar"><div class="progress-fill ${over ? 'over' : ''}" style="width: ${Math.min(100, (net/goal)*100)}%"></div></div>
        <div class="progress-meta">
          <span>${pct}% of goal</span>
          <span>${Math.max(0, goal - Math.round(net))} kcal ${over ? 'over' : 'left'}</span>
        </div>
      </div>
      <div class="macros">
        <div><div class="macro-label">carbs</div><div class="macro-value"><span class="n" style="color:#c4683a">${fmt(t.carbs)}</span><span class="u">g</span></div></div>
        <div><div class="macro-label">protein</div><div class="macro-value"><span class="n" style="color:#5a7a3a">${fmt(t.protein)}</span><span class="u">g</span></div></div>
        <div><div class="macro-label">fat</div><div class="macro-value"><span class="n" style="color:#b8924a">${fmt(t.fat)}</span><span class="u">g</span></div></div>
      </div>
    </div>
  `;
}

          </div>
          <div class="picker-label">duration</div>
          <div class="picker-row">
            ${[10, 15, 20, 30, 45, 60, 90].map(min => `
              <button class="chip ${min === d.duration ? 'active' : ''}" onclick="setActivityField('duration', ${min})"><span>${min} min</span></button>

          </div>
          ${availableIntensities.length > 1 ? `
            <div class="picker-label">intensity</div>
            <div class="picker-row">
              ${availableIntensities.map(i => `
                <button class="chip ${i === d.intensity ? 'active' : ''}" onclick="setActivityField('intensity', '${i}')"><span>${escapeHtml(i)}</span></button>

          <button class="primary-btn" onclick="saveActivity()" ${estCal <= 0 ? 'disabled' : ''}>${icons.checkSm}<span>Save activity</span></button>
        </div>
        ${state.error ? `<div class="error">${icons.alert}<span class="error-text">${escapeHtml(state.error)}</span></div>` : ''}
      </div>
    `;
  }

  if (state.mode === 'text') {
    return `
      <div class="input-section">
        ${pastDayBanner}
        <div class="text-card">
          <div class="text-card-head">
            <div class="lbl">type your food</div>

    </div>

}

function renderEntries() {
  const day = state.entries.filter(e => entryDate(e.timestamp) === state.selectedDate);
  const isToday = state.selectedDate === todayISO();
  const header = `<div class="list-header">${day.length === 0 ? 'no entries' : `${day.length} ${day.length === 1 ? 'entry' : 'entries'}`}</div>`;
  if (day.length === 0) return header + `<div class="empty"><p>${isToday ? 'A blank page. Tap the mic when you eat something.' : 'Nothing logged this day.'}</p></div>`;

  // Group by meal tag
  const groups = { breakfast: [], lunch: [], dinner: [], snack: [], activity: [] };
  for (const e of day) {
    if (e.type === 'activity') groups.activity.push(e);
    else groups[getMealTag(e.timestamp)].push(e);
  }
  const labels = { breakfast: ['🌅', 'Breakfast'], lunch: ['🥗', 'Lunch'], dinner: ['🍽', 'Dinner'], snack: ['🍪', 'Snacks'], activity: ['🏃', 'Exercise'] };
  // Sort entries inside each group by timestamp ascending
  for (const k of Object.keys(groups)) groups[k].sort((a, b) => a.timestamp - b.timestamp);

  const renderEntry = (e) => {
    if (e.type === 'activity') {
      return `
        <div class="entry activity">
          <div class="entry-icon">${e.icon || '🏃'}</div>
          <div class="entry-main">
            <div class="entry-name">${escapeHtml(e.name)}</div>
            <div class="entry-sub"><span>${formatTime(e.timestamp)}</span><span>·</span><span>${e.duration} min · ${escapeHtml(e.intensity || 'moderate')}</span></div>
          </div>
          <div class="entry-cal burned"><div class="n">−${e.calories}</div><div class="u">kcal</div></div>
          <button class="icon-btn" onclick="if(confirm('Delete this entry?')) deleteEntry('${e.id}')" aria-label="Delete">${icons.trash}</button>
        </div>
      `;
    }
    return `
      <div class="entry">
        <div class="entry-main">
          <div class="entry-name">${e.mood ? `<span class="entry-mood">${MOODS.find(m => m.value === e.mood)?.emoji || ''}</span>` : ''}${escapeHtml(e.name)}</div>
          <div class="entry-sub">
            <span>${formatTime(e.timestamp)}</span><span>·</span>
            <span>${e.carbs}c · ${e.protein}p · ${e.fat}f</span>
            ${e.actualSatisfaction ? `<span>·</span><span>actually ${e.actualSatisfaction}/5</span>` : (e.anticipatedSatisfaction ? `<span>·</span><span style="cursor:pointer; color:#c4a06a" onclick="set({showSatisfactionFollowup:'${e.id}'})">rate it</span>` : '')}
          </div>
        </div>
        <div class="entry-cal"><div class="n">${e.calories}</div><div class="u">kcal</div></div>
        <button class="icon-btn" onclick="if(confirm('Delete this entry?')) deleteEntry('${e.id}')" aria-label="Delete">${icons.trash}</button>
      </div>
    `;
  };

  let html = header;
  for (const key of ['breakfast', 'lunch', 'dinner', 'snack', 'activity']) {
    const items = groups[key];
    if (items.length === 0) continue;
    const totalCal = items.reduce((a, e) => a + (e.calories || 0), 0);
    const sign = key === 'activity' ? '−' : '';
    html += `
      <div class="meal-section">
        <div class="meal-header">
          <span class="icon">${labels[key][0]}</span>
          <span class="title">${labels[key][1]}</span>
          <span class="count">${sign}${totalCal} kcal · ${items.length} ${items.length === 1 ? 'entry' : 'entries'}</span>
        </div>
        <div class="entries-list">${items.map(renderEntry).join('')}</div>
      </div>
    `;
  }
  return html;
}

function renderWhyCard() {
  if (state.selectedDate !== todayISO()) return '';

    return `

  return `

function renderFutureYouCard() {
  const fy = getFutureYou(12);
  if (!fy) return '';
  const profile = loadProfile();
  if (!profile) return '';
  const isLosing = profile.goal === 'lose';
  const isGaining = profile.goal === 'gain';
  const change = fy.totalChange;
  const onTrack = (isLosing && change < -0.5) || (isGaining && change > 0.5) || (!isLosing && !isGaining && Math.abs(change) < 1);
  const offTrack = (isLosing && change > 0.5) || (isGaining && change < -0.5);
  const cardClass = offTrack ? 'future-you-card warn' : 'future-you-card';
  const arrowDir = change > 0 ? 'up' : 'down';
  const sign = change > 0 ? '+' : '−';
  return `
    <div class="${cardClass}">
      <div class="inner">
        <div class="label">Future You — 12 weeks from now</div>
        <div class="arrow">
          <span class="num ${arrowDir}">${sign}${Math.abs(change).toFixed(1)}</span>
          <span class="unit">kg</span>
        </div>
        <div class="by-when">by ${fy.targetDate}</div>
        <div class="explain">${
          offTrack
            ? `Your current pattern is ${sign === '+' ? 'going up' : 'going down'} ${Math.abs(fy.weeklyChange).toFixed(2)} kg/week. You wanted to ${isLosing ? 'lose' : 'gain'}. Time to adjust — small changes compound.`
            : onTrack
            ? `Steady at ${Math.abs(fy.weeklyChange).toFixed(2)} kg/week. Daily averages ${fy.netDaily} kcal net vs ${fy.tdee} maintenance. Keep the line going.`
            : `Daily averages ${fy.netDaily} kcal net vs ${fy.tdee} maintenance. The arrow points where you're heading at current rate.`
        }${fy.waistChange != null ? ` Waist trend: ${fy.waistChange >= 0 ? '+' : ''}${fy.waistChange.toFixed(1)} cm projected.` : ''}</div>
      </div>
    </div>
  `;
}

  return `

      </div>

          ${flowerCount > 0 ? `<span style="color:#c4683a">●</span> ${flowerCount} flower${flowerCount === 1 ? '' : 's'} from urges beaten` : ''}
          ${flowerCount > 0 && fruitCount > 0 ? ' · ' : ''}

    `;
  }

  const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const reasonLabels = { stressed: 'stress', bored: 'boredom', celebrating: 'celebration', social: 'social pressure', habit: 'habit', craving: 'cravings', tired: 'tiredness' };
  const moodLabels = { stressed: 'stressed', down: 'down', great: 'great', ok: 'ok' };
  const interruptLabels = { wave: 'urge surfing', cold: 'cold water', breathe: 'slow breathing', move: 'movement', water: 'cold drink' };

  // SECTION 1: Trigger fingerprint
  let triggerSection = '';
  if (sig.fingerprint) {
    const f = sig.fingerprint;
    const timeStr = f.timeWindow ? `${f.timeWindow.start}:00${f.timeWindow.end > f.timeWindow.start + 1 ? `–${f.timeWindow.end}:00` : ''}` : null;
    const dayStr = f.topDays.length > 0 ? f.topDays.join(' and ') : null;
    const parts = [];
    if (dayStr) parts.push(`<strong>${dayStr}</strong>`);
    if (timeStr) parts.push(`around <strong>${timeStr}</strong>`);
    if (f.topReason && f.topReasonPct >= 25) parts.push(`when feeling ${reasonLabels[f.topReason] || f.topReason} (${f.topReasonPct}%)`);
    else if (f.topMood && f.topMood !== 'ok') parts.push(`when ${moodLabels[f.topMood] || f.topMood}`);

    const sentence = parts.length > 0
      ? `Your highest-risk window: ${parts.join(', ')}.`
      : `Your overshoot days don't have a clear pattern yet — that's actually a good sign.`;
    triggerSection = `
      <div class="sig-section">
        <div class="label">trigger fingerprint <span class="sig-confidence ${f.confidence}">${f.confidence} confidence</span></div>
        <div class="insight">${sentence}</div>
        <div style="font-size:11px; color:rgba(246,241,231,0.55); margin-top:6px">
          Built from ${f.eventCount} over-goal day${f.eventCount === 1 ? '' : 's'}.
        </div>
      </div>
    `;
  }

  // SECTION 2: Identity
  let identitySection = '';
  if (sig.identity) {
    const id = sig.identity;
    const dominant = Math.max(id.structuredPct, id.emotionalPct, id.socialPct);
    let archetype;
    if (id.emotionalPct >= 40) archetype = 'Emotional eater';
    else if (id.socialPct >= 30) archetype = 'Social eater';
    else if (id.structuredPct >= 60) archetype = 'Structured eater';
    else archetype = 'Mixed eater';
    identitySection = `
      <div class="sig-section">
        <div class="label">your eating identity</div>
        <div class="insight" style="font-family:'Fraunces',serif; font-style:italic; font-size:18px"><strong>${archetype}</strong></div>
        <div class="sig-bars">
          ${id.structuredPct > 5 ? `<div class="sig-bar structured" style="flex:${id.structuredPct}">${id.structuredPct}%</div>` : ''}
          ${id.emotionalPct > 5 ? `<div class="sig-bar emotional" style="flex:${id.emotionalPct}">${id.emotionalPct}%</div>` : ''}
          ${id.socialPct > 5 ? `<div class="sig-bar social" style="flex:${id.socialPct}">${id.socialPct}%</div>` : ''}
        </div>
        <div style="font-size:11px; color:rgba(246,241,231,0.65); line-height:1.5">
          <span style="color:#a8c485">●</span> Structured (${id.structuredPct}%)
          <span style="color:#d97b50; margin-left:8px">●</span> Emotional (${id.emotionalPct}%)
          <span style="color:#e8c46a; margin-left:8px">●</span> Social (${id.socialPct}%)
        </div>
      </div>
    `;
  }

  // SECTION 3: Best interrupt for YOU
  let interruptSection = '';
  if (sig.interrupts && sig.interrupts.reliable) {
    const i = sig.interrupts;
    const bestLabel = interruptLabels[i.best] || i.best;
    const bestStats = i.stats[i.best];
    interruptSection = `
      <div class="sig-section">
        <div class="label">your most reliable interrupt</div>
        <div class="insight"><strong>${escapeHtml(bestLabel)}</strong> works for you <strong>${bestStats.successRate}%</strong> of the time. <em>(${bestStats.beaten} of ${bestStats.attempts} attempts beaten.)</em></div>
        ${i.ranked.length > 1 ? `<div style="font-size:11px; color:rgba(246,241,231,0.55); margin-top:6px">
          Next best: ${interruptLabels[i.ranked[1]] || i.ranked[1]} (${i.stats[i.ranked[1]].successRate}%)
        </div>` : ''}
      </div>
    `;
  }

  // SECTION 4: Satisfaction signature
  let satSection = '';
  if (sig.satSig) {
    const ss = sig.satSig;
    if (ss.overhyped && ss.overhyped.length > 0) {
      const top = ss.overhyped[0];
      satSection = `
        <div class="sig-section">
          <div class="label">food signature</div>
          <div class="insight"><strong>${escapeHtml(top.name)}</strong> consistently disappoints — you expect ${top.avgGap.toFixed(1)} stars more than you get. <em>Worth knowing before the next craving.</em></div>
          ${ss.reliable.length > 0 ? `<div class="insight" style="margin-top:8px; font-size:14px">
            Your best value: <strong>${escapeHtml(ss.reliable[0].name)}</strong> — ${ss.reliable[0].avgSat}/5 stars at ${ss.reliable[0].avgCal} kcal.
          </div>` : ''}
        </div>
      `;
    } else if (ss.reliable.length > 0) {
      const top = ss.reliable[0];
      satSection = `
        <div class="sig-section">
          <div class="label">food signature</div>
          <div class="insight">Your most reliable food: <strong>${escapeHtml(top.name)}</strong> — ${top.avgSat}/5 stars at ${top.avgCal} kcal. <em>Keep this one in rotation.</em></div>
        </div>
      `;
    }
  }

  // SECTION 5: Trajectory
  let trajectorySection = '';
  if (sig.future) {
    const f = sig.future;
    const sign = f.totalChange > 0 ? '+' : '−';
    const profile = loadProfile();
    const goal = profile?.goal || 'maintain';
    const onTrack = (goal === 'lose' && f.totalChange < -0.5) || (goal === 'gain' && f.totalChange > 0.5) || (goal === 'maintain' && Math.abs(f.totalChange) < 1);
    trajectorySection = `
      <div class="sig-section">
        <div class="label">12-week trajectory</div>
        <div class="insight">At your current pace: <strong>${sign}${Math.abs(f.totalChange).toFixed(1)} kg</strong> by ${escapeHtml(f.targetDate)}. ${onTrack ? '<em>On track.</em>' : '<em>Off the line you wanted. Course-correctable.</em>'}</div>
      </div>
    `;
  }

  // SECTION 6: Resilience
  let resilienceSection = '';
  if (sig.recovery && sig.recovery.score < 100) {
    const r = sig.recovery;
    resilienceSection = `
      <div class="sig-section">
        <div class="label">your resilience</div>
        <div class="insight">Recovery score: <strong>${r.score}/100</strong>. ${r.avgRecoveryDays != null ? `You bounce back from slips in <strong>${r.avgRecoveryDays} days</strong> on average.` : '<em>No bounce-back data yet.</em>'}</div>
      </div>
    `;
  }

  return `
    <div class="sig-report">
      <div class="inner">
        <div class="heading-label">your signature</div>
        <div class="heading">What ${sig.dataPoints.entries} entries say about you</div>
        <div class="data-points">Mined from ${sig.dataPoints.entries} food logs · ${sig.dataPoints.urges} urges · ${sig.dataPoints.measurements} measurements · ${sig.dataPoints.daysTracked} days</div>
        ${triggerSection}
        ${identitySection}
        ${interruptSection}
        ${satSection}
        ${trajectorySection}
        ${resilienceSection}
      </div>
    </div>
  `;
}

// Danger banner (appears on Today when current risk is elevated)
function renderDangerBanner() {
  const d = getCurrentDangerScore();
  if (!d || d.score < 35) return '';
  // Don't show it more than once per 4 hours
  const lastShownKey = 'plate-danger-banner-last-shown';
  try {
    const last = parseInt(localStorage.getItem(lastShownKey) || '0');
    if (Date.now() - last < 4 * 3600000 && state.dangerBannerDismissed) return '';
  } catch {}
  const topFactors = d.factors.sort((a, b) => b.points - a.points).slice(0, 2);
  let title;
  if (d.level === 'high') title = "This is one of your high-risk windows.";
  else if (d.level === 'medium') title = "You're entering a window where you've slipped before.";
  else title = "Small risk signal — just noticing.";

  return `
    <div class="danger-banner ${d.level}">
      <div class="icon">${d.level === 'high' ? '⚠️' : d.level === 'medium' ? '⚡' : '👁️'}</div>
      <div class="content">
        <div class="title">${escapeHtml(title)}</div>
        <div class="reasons">${topFactors.map(f => `<span>· ${escapeHtml(f.name)}</span>`).join('')}</div>
        <div class="actions">
          <button class="primary" onclick="startUrge()">Use the urge tool</button>
          <button onclick="dismissDangerBanner()">Not today</button>
        </div>
      </div>
    </div>
  `;
}

function dismissDangerBanner() {
  state.dangerBannerDismissed = true;
  try { localStorage.setItem('plate-danger-banner-last-shown', String(Date.now())); } catch {}
  render();
}

// The flagship metric for the hunger-rebound thesis.
function renderSustainabilityCard() {
  const s = getSustainabilityScore();
  if (!s.ready) {
    // Count what we have toward sustainability
    const hungerMeals = state.entries.filter(e => e.type !== 'activity' && e.hungerAtMeal != null).length;
    const checkins = (state.dailyCheckins || []).length;
    const ratedMeals = state.entries.filter(e => e.actualSatisfaction != null).length;
    return `
      <div class="sustain-card empty">
        <div class="sustain-label">
          <span class="sustain-tag">FLAGSHIP</span>
          Sustainability
        </div>
        <div class="ps-baseline-state">
          <div class="ps-baseline-title">Collecting baseline</div>
          <div class="ps-baseline-msg">${escapeHtml(s.message)}</div>
          <div class="ps-baseline-section">
            <div class="ps-baseline-section-lbl">Have:</div>
            <div class="ps-baseline-have"><span class="dot">${hungerMeals >= 3 ? '●' : '○'}</span> Hunger at meal ratings — <span class="src">${hungerMeals} log${hungerMeals===1?'':'s'} (need 3+)</span></div>
            <div class="ps-baseline-have"><span class="dot">${checkins >= 3 ? '●' : '○'}</span> Daily check-ins — <span class="src">${checkins} (need 3+ for cravings/sleep)</span></div>
            <div class="ps-baseline-have"><span class="dot">${ratedMeals >= 3 ? '●' : '○'}</span> Meal satisfaction ratings — <span class="src">${ratedMeals} (need 3+)</span></div>
          </div>
        </div>
      </div>
    `;
  }
  const arrowFor = (t) => {
    if (!t) return '';
    if (t.pctChange >= 15) return `<span class="trend-arrow up">↑</span>`;
    if (t.pctChange <= -15) return `<span class="trend-arrow down">↓</span>`;
    return `<span class="trend-arrow flat">→</span>`;
  };
  const pctFor = (t) => {
    if (!t) return '';
    if (Math.abs(t.pctChange) < 3) return 'stable';
    return `${t.pctChange > 0 ? '+' : ''}${t.pctChange}%`;
  };
  return `
    <div class="sustain-card ${s.color}">
      <div class="sustain-label">
        <span class="sustain-tag">FLAGSHIP</span>
        Sustainability
      </div>
      <div class="sustain-top">

          <div class="sustain-score-max">/ 100</div>
        </div>
        <div class="sustain-band-wrap">
          <div class="sustain-band">${escapeHtml(s.band)}</div>
          <div class="sustain-rebound">rebound risk: ${s.reboundRisk}%</div>
        </div>
      </div>
      <div class="sustain-message">${escapeHtml(s.message)}</div>
      <div class="sustain-metrics">
        <div class="sustain-metric">
          <div class="sm-name">hunger</div>
          <div class="sm-val">${s.hunger.avg}<span class="sm-unit">/5</span></div>
          <div class="sm-trend">${arrowFor(s.hungerTrend)} ${pctFor(s.hungerTrend)}</div>
          <div class="sm-source">from ${s.hunger.sample} sample${s.hunger.sample===1?'':'s'}</div>
        </div>
        <div class="sustain-metric">
          <div class="sm-name">cravings</div>
          <div class="sm-val">${s.craving ? s.craving.avg : '—'}${s.craving ? '<span class="sm-unit">/5</span>' : ''}</div>
          <div class="sm-trend">${arrowFor(s.cravingTrend)} ${pctFor(s.cravingTrend)}</div>
          <div class="sm-source">${s.craving ? `from ${s.craving.sample} check-in${s.craving.sample===1?'':'s'}` : 'no data yet'}</div>
        </div>
        <div class="sustain-metric">
          <div class="sm-name">satisfaction</div>
          <div class="sm-val">${s.sat ? s.sat.avg : '—'}${s.sat ? '<span class="sm-unit">/5</span>' : ''}</div>
          <div class="sm-trend">${arrowFor(s.satTrend)} ${pctFor(s.satTrend)}</div>
          <div class="sm-source">${s.sat ? `from ${s.sat.sample} rated meal${s.sat.sample===1?'':'s'}` : 'no data yet'}</div>
        </div>
      </div>
      ${s.warnings.length > 0 ? `
        <div class="sustain-warnings">
          <div class="sw-header">⚠ Warning signs</div>

      ` : ''}
      <div class="sustain-footer">

      </div>
    </div>
  `;
}

// ============================================================
// HUNGER CARD on Today — surfaces the hunger intensity signal
// (separate from Plate Score's "hunger-driven eating" which is a different question)
// ============================================================
function renderHungerCard() {
  // Today's hunger samples: from meal-time logs + today's daily check-in
  const todayStr = todayISO();
  const todayMeals = state.entries.filter(e =>
    e.type !== 'activity' &&
    e.hungerAtMeal != null &&
    entryDate(e.timestamp) === todayStr
  );
  const todayCheckin = (state.dailyCheckins || []).find(c => c.date === todayStr);
  const todayCheckinHunger = todayCheckin && todayCheckin.hunger != null ? todayCheckin.hunger : null;
  // 7-day window
  const stats7 = getHungerStats(7);
  const trend = getMetricTrend(getHungerStats);
  // Need at least SOMETHING to render
  if (todayMeals.length === 0 && todayCheckinHunger == null && !stats7) {
    return `
      <div class="hunger-card empty">
        <div class="hc-label">Hunger today</div>
        <div class="hc-empty">Log hunger at meals (and in daily check-in) to start seeing your pattern.</div>
      </div>
    `;
  }
  // Today's average
  let todayAvg = null;
  const todaySamples = [...todayMeals.map(m => m.hungerAtMeal)];
  if (todayCheckinHunger != null) todaySamples.push(todayCheckinHunger);
  if (todaySamples.length > 0) todayAvg = todaySamples.reduce((a,b) => a+b, 0) / todaySamples.length;

  // Peak (today)
  const todayPeak = todaySamples.length > 0 ? Math.max(...todaySamples) : null;

  // Evening hunger today (samples ≥17h)
  const eveningSamples = todayMeals
    .filter(m => new Date(m.timestamp).getHours() >= 17)
    .map(m => m.hungerAtMeal);
  const eveningAvg = eveningSamples.length > 0
    ? eveningSamples.reduce((a,b)=>a+b,0) / eveningSamples.length
    : null;

  // Trend label
  const trendStr = trend && Math.abs(trend.pctChange) >= 5
    ? (trend.pctChange > 0 ? `↑ +${trend.pctChange}%` : `↓ ${trend.pctChange}%`)
    : (trend ? 'stable' : 'need more data');
  const trendClass = trend && trend.pctChange >= 15 ? 'rising' : trend && trend.pctChange <= -15 ? 'falling' : 'stable';

  // Risk-color based on today's avg
  let stateClass = 'ok';
  if (todayAvg != null && todayAvg >= 4) stateClass = 'high';
  else if (todayAvg != null && todayAvg >= 3) stateClass = 'moderate';

  return `
    <div class="hunger-card ${stateClass}">
      <div class="hc-label">Hunger today</div>
      <div class="hc-grid">
        <div class="hc-stat">
          <div class="hc-stat-lbl">today avg</div>
          <div class="hc-stat-val">${todayAvg != null ? todayAvg.toFixed(1) : '—'}<span class="hc-unit">/5</span></div>
          <div class="hc-stat-sub">${todaySamples.length} sample${todaySamples.length === 1 ? '' : 's'}</div>
        </div>
        <div class="hc-stat">
          <div class="hc-stat-lbl">peak</div>
          <div class="hc-stat-val">${todayPeak != null ? todayPeak : '—'}${todayPeak != null ? '<span class="hc-unit">/5</span>' : ''}</div>
          <div class="hc-stat-sub">today's highest</div>
        </div>
        <div class="hc-stat">
          <div class="hc-stat-lbl">7-day trend</div>
          <div class="hc-stat-val hc-trend ${trendClass}">${trendStr}</div>
          <div class="hc-stat-sub">${stats7 ? `avg ${stats7.avg}/5` : '—'}</div>
        </div>
      </div>
      ${eveningAvg != null && eveningAvg >= 4 ? `
        <div class="hc-warning">
          ⚠ Evening hunger averaging <strong>${eveningAvg.toFixed(1)}/5</strong> today. This is the late-eating danger zone.
        </div>
      ` : ''}
      <div class="hc-footer">Hunger intensity at meals + daily check-in. Rising hunger over weeks predicts rebound risk.</div>
    </div>
  `;
}

function renderSustainabilityBanner() {
  const s = getSustainabilityScore();
  if (!s.ready) return '';
  // Only surface when score is genuinely concerning AND there's actionable trend signal
  if (s.sustainabilityScore >= 40) return '';
  const risingHunger = s.hungerTrend && s.hungerTrend.pctChange >= 15;
  const fallingSat = s.satTrend && s.satTrend.pctChange <= -15;
  if (!risingHunger && !fallingSat && s.warnings.length === 0) return '';
  // Build the headline
  let headline = '';
  if (risingHunger && fallingSat) {
    headline = `Hunger up ${s.hungerTrend.pctChange}% · satisfaction down ${Math.abs(s.satTrend.pctChange)}%.`;
  } else if (risingHunger) {
    headline = `Hunger has risen ${s.hungerTrend.pctChange}% in 7 days.`;
  } else if (fallingSat) {
    headline = `Satisfaction has fallen ${Math.abs(s.satTrend.pctChange)}% recently.`;
  } else if (s.warnings.length > 0) {
    headline = s.warnings[0].text;
  }
  return `
    <div class="sustain-banner" onclick="set({activeTab:'trends'}); render();">
      <div class="sb-icon">⚠</div>
      <div class="sb-content">
        <div class="sb-title">Rebound risk rising · ${s.reboundRisk}%</div>
        <div class="sb-text">${escapeHtml(headline)} This pattern often precedes rebound. Consider easing the deficit.</div>
      </div>
      <div class="sb-arrow">›</div>
    </div>
  `;
}

function renderEntropyCard() {
  const e = getBehaviouralEntropy(14);
  if (!e) return '';
  const fmt = (v) => v != null ? v.toFixed(2) : '—';
  const bar = (v) => v != null ? Math.round(v * 100) : 0;
  // Interpretation: low = regular, high = irregular
  let interpretation;
  if (e.composite < 0.35) interpretation = `<strong>Low irregularity.</strong> Your patterns are consistent week to week.`;
  else if (e.composite < 0.6) interpretation = `<strong>Moderate irregularity.</strong> Some variation in your patterns.`;
  else interpretation = `<strong>High irregularity.</strong> Eating times, amounts, or reasons vary a lot.`;
  let trendText = '';
  if (e.trend) {
    if (e.trend.direction === 'rising') trendText = `Trend: <strong style="color:#c4683a">rising irregularity</strong> over the last 7 days vs the 7 before.`;
    else if (e.trend.direction === 'falling') trendText = `Trend: <strong style="color:#5a7a3a">becoming more regular</strong> over the last 7 days.`;
    else trendText = `Trend: <strong>stable</strong> over the last 14 days.`;
  }
  return `

function renderForecastCard() {
  const f = get24HourForecast();
  if (!f) return '';
  if (!f.anyRisk) {
    return `
      <div class="forecast-card calm">
        <div class="fc-label">next 24 hours</div>
        <div class="fc-msg">No elevated risk windows predicted for the next 24 hours. Steady.</div>
      </div>
    `;
  }
  // Mini hourly bar chart
  const barsHtml = f.hourly.map(h => {
    const heightPct = Math.max(4, h.score);
    const colorClass = h.level === 'high' ? 'high' : h.level === 'medium' ? 'med' : h.level === 'low' ? 'low' : 'none';
    return `<div class="fc-bar ${colorClass}" style="height:${heightPct}%" title="${h.hour}:00 score ${h.score}"></div>`;
  }).join('');
  return `
    <div class="forecast-card">
      <div class="fc-label">next 24 hours · predicted risk</div>
      <div class="fc-window">
        Highest-risk window: <strong>${escapeHtml(f.window.label)}</strong>
      </div>
      <div class="fc-peak">peak ${f.window.peakScore}% at ${f.window.peakHour % 12 || 12}${f.window.peakHour < 12 ? 'am' : 'pm'} · ${f.window.durationHours}h window</div>
      <div class="fc-chart">${barsHtml}</div>
      <div class="fc-axis">
        <span>+1h</span><span>+6h</span><span>+12h</span><span>+18h</span><span>+24h</span>
      </div>
      <div class="fc-footer">Based on your trigger fingerprint. Use the urge tool if it hits.</div>
    </div>
  `;
}

function renderTrendsTab() {
  const streak = calculateStreak(state.entries);
  const insights = getInsights();
  const last7 = getLast7Days();
  const daysWithData = last7.filter(d => d.hasData);
  const weeklyAvg = daysWithData.length ? Math.round(daysWithData.reduce((a, d) => a + d.food, 0) / daysWithData.length) : 0;
  const weeklyNet = daysWithData.length ? Math.round(daysWithData.reduce((a, d) => a + d.net, 0) / daysWithData.length) : 0;
  const daysAtGoal = last7.filter(d => d.hasData && d.net > 0 && d.net <= state.dailyGoal).length;
  const maxVal = Math.max(state.dailyGoal, ...last7.map(d => d.food));
  const W = 320, H = 160, padTop = 10, padBot = 30;
  const chartH = H - padTop - padBot;
  const barW = 28, gap = (W - 7 * barW) / 8;
  const goalY = padTop + chartH - (state.dailyGoal / maxVal) * chartH;

  return `
    <div class="screen-title">Trends</div>
    <div class="screen-sub">What your data is showing you</div>

    ${renderSustainabilityCard()}
    ${renderPlateScoreCard()}
    ${renderEntropyCard()}
    ${renderForecastCard()}
    ${renderSEICard()}
    ${renderSignatureReport()}
    ${renderFutureYouCard()}
    ${renderRecoveryCard()}
    ${renderHealthspanCard()}
    ${renderWhyIntelligenceCard()}
    ${renderEmotionalMapCard()}
    ${renderSatPerCalCard()}
    ${renderCostOfUrgeCard()}

    ${daysWithData.length === 0 ? `
      <div class="empty"><p>Log a few entries to see trends here.</p></div>
    ` : `
      <div class="card" style="padding:18px 20px; margin-bottom: 14px;">
        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;">
          <div>
            <div class="totals-label" style="margin-bottom: 4px;">7-day average</div>
            <div style="font-family:'Fraunces', serif; font-size:34px; font-weight:500; line-height:1;">${weeklyAvg}<span style="font-size:12px; color:#8a8975; margin-left:6px">kcal</span></div>
          </div>
          <div style="text-align:right">
            <div class="totals-label" style="margin-bottom: 4px;">streak</div>
            <div style="font-family:'Fraunces', serif; font-size:34px; font-weight:500; line-height:1;">${streak}<span style="font-size:12px; color:#8a8975; margin-left:4px">days</span></div>
          </div>
        </div>
        <svg style="width:100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="${goalY}" x2="${W}" y2="${goalY}" stroke="#c4683a" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
          <text x="${W - 4}" y="${goalY - 4}" text-anchor="end" font-size="9" fill="#c4683a" font-family="Instrument Sans, sans-serif">goal ${state.dailyGoal}</text>
          ${last7.map((d, i) => {
            const x = gap + i * (barW + gap);
            const h = d.food > 0 ? (d.food / maxVal) * chartH : 0;
            const y = padTop + chartH - h;
            const over = d.net > state.dailyGoal;
            return `
              <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="4" fill="${over ? '#c4683a' : '#2d3a2e'}" opacity="${d.hasData ? 1 : 0.15}"/>
              <text x="${x + barW/2}" y="${padTop + chartH + 14}" text-anchor="middle" font-size="10" fill="#6b6a5c" font-family="Instrument Sans, sans-serif">${d.dayShort}</text>
              ${d.hasData ? `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="9" fill="#6b6a5c" font-family="Instrument Sans, sans-serif">${d.net}</text>` : ''}
            `;
          }).join('')}
        </svg>
        <div style="display:flex; justify-content:space-around; margin-top:10px; padding-top:14px; border-top:1px solid #ede5d3;">
          <div style="text-align:center"><div style="font-family:'Fraunces',serif; font-size:18px; font-weight:500">${daysAtGoal}/7</div><div style="font-size:10px; color:#8a8975; text-transform:uppercase; letter-spacing:0.12em; margin-top:2px">at goal</div></div>
          <div style="text-align:center"><div style="font-family:'Fraunces',serif; font-size:18px; font-weight:500">${weeklyNet}</div><div style="font-size:10px; color:#8a8975; text-transform:uppercase; letter-spacing:0.12em; margin-top:2px">net avg</div></div>
        </div>
      </div>
    `}
    ${insights.length > 0 ? `
      <div class="list-header" style="margin-top:18px">Insights</div>
      ${insights.map(i => `
        <div class="insight-card">
          <div class="icon">${i.icon}</div>
          <div class="title">${escapeHtml(i.title)}</div>
          <div class="body">${escapeHtml(i.body)}</div>
          ${i.actionType === 'set_goal' ? `<button class="action-btn" onclick="setUserGoal(${i.actionValue})">${escapeHtml(i.actionLabel)}</button>` : ''}
        </div>
      `).join('')}
    ` : ''}
  `;
}

  return `
    <svg width="60" height="100" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg" style="display:block; margin:0 auto;">

      <circle cx="30" cy="14" r="9" fill="${color}"/>
      <!-- Body -->
      <path d="M 30 23
               L ${30 - width/2 - 2} 35
               L ${30 - width/2} 60
               L ${30 - width/2 - 1} 95
               L ${30 + width/2 + 1} 95
               L ${30 + width/2} 60
               L ${30 + width/2 + 2} 35
               Z"
            fill="${color}" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
  `;
}

      <button class="secondary-btn" style="width:100%; flex:none" onclick="openDailyCheckin()">${getTodayCheckin() ? 'Update today' : 'Do todays check-in'}</button>

  return `

      <div class="icon">🗝</div>
      <div class="text">
        <strong>This is one of your pattern moments.</strong>
        Your data shows urges often hit around now. Be aware — that's half the battle. The Urge button is here if you need it.

        <div class="sub">Strong craving? Tap before you eat.</div>
      </div>

function renderMultiConfirm() {
  const mc = state.showMultiConfirm;
  if (!mc) return '';
  const total = mc.items.filter(it => it.included).reduce((a, it) => a + (it.baseCal * it.multiplier), 0);
  return `
    <div class="multi-card">
      <div class="multi-header">
        <div>
          <div class="multi-title">${mc.items.filter(it => it.included).length} items detected</div>
          <div class="multi-count">tap to exclude · ± to adjust</div>
        </div>
        <button class="icon-btn" onclick="multiConfirmCancel()">${icons.x}</button>
      </div>
      <div class="multi-items">
        ${mc.items.map(it => `
          <div class="multi-item ${it.included ? '' : 'excluded'}">
            <button class="check-btn" onclick="multiConfirmToggle('${it.tempId}')">${it.included ? '✓' : ''}</button>
            <div class="name">${escapeHtml(it.name)}</div>
            <div class="qty-mini">
              <button class="qty-mini-btn" onclick="multiConfirmSetMult('${it.tempId}', ${it.multiplier - 0.5})">−</button>
              <span class="qty-mini-val">×${it.multiplier.toFixed(1).replace(/\.0$/,'')}</span>
              <button class="qty-mini-btn" onclick="multiConfirmSetMult('${it.tempId}', ${it.multiplier + 0.5})">+</button>
            </div>
            <div class="cal">${Math.round(it.baseCal * it.multiplier)}</div>
          </div>
        `).join('')}
      </div>
      <div class="multi-total">
        <span class="lbl">total</span>
        <span><span class="val">${Math.round(total)}</span> <span class="u">kcal</span></span>
      </div>
      <div class="pending-section-label">why are you eating?</div>
      <div class="reason-grid">
        ${EATING_REASONS.map(r => `<button class="reason-chip ${mc.eatingReason === r.value ? 'active' : ''}" onclick="multiConfirmSetEatingReason('${r.value}')"><span class="emoji">${r.emoji}</span><span>${r.label}</span></button>`).join('')}
      </div>
      <div class="pending-section-label">how hungry right now?</div>
      <div class="hunger-row">
        ${HUNGER_LEVELS.map(h => `<button class="hunger-chip ${mc.hungerAtMeal === h.value ? 'active' : ''}" onclick="multiConfirmSetHunger(${h.value})"><span class="num">${h.value}</span><span class="lbl">${h.label}</span></button>`).join('')}
      </div>
      <div class="pending-section-label">how are you feeling?</div>
      <div class="mood-row">
        ${MOODS.map(m => `<button class="mood-btn ${mc.mood === m.value ? 'active' : ''}" onclick="multiConfirmSetMood('${m.value}')"><span class="emoji">${m.emoji}</span><span>${m.label}</span></button>`).join('')}
      </div>
      <div class="pending-heard">Heard: "${escapeHtml(mc.spoken)}"</div>
      <div class="pending-actions">
        <button class="secondary-btn" onclick="multiConfirmCancel()">${icons.xSm}<span>Discard</span></button>
        <button class="primary-btn" onclick="multiConfirmSave()">${icons.checkSm}<span>Save all</span></button>
      </div>
    </div>
  `;
}

                    <div class="name">${escapeHtml(f.display)}</div>
                    <div class="meta">${escapeHtml(f.unit)} · ${f.cal} kcal · ${f.c}c · ${f.p}p · ${f.f}f</div>
                  </div>

          <div style="font-size:12px; color:#a0a08e; text-align:center; padding:20px 0; font-style:italic">No custom foods yet. Add your usual brands above.</div>
        `}
        <div class="modal-actions">

function renderMeasurementsModal() {
  if (!state.showMeasurements) return '';
  // Pre-seed draft on first show
  if (state.measurementDraft == null) {
    const lastM = state.measurements[0];
    state.measurementDraft = {
      waist: lastM?.waist || 85,
      hips: lastM?.hips || 95,
      chest: lastM?.chest || 95,
      weight: lastM?.weight || state.userWeight,
      note: ''
    };
  }
  const draft = state.measurementDraft;
  const trend = getMeasurementTrend('waist');
  return `
    <div class="modal-overlay" onclick="if(event.target===this) set({showMeasurements:false, measurementDraft:null})">
      <div class="modal">
        <div class="modal-title">Body measurements</div>
        <div class="modal-desc">Waist is the most useful single number — better than weight for tracking real change. Tape at the navel. Don't suck in. Same time each week.</div>
        ${trend ? `
          <div class="modal-section">
            <div class="modal-section-title">your trend</div>
            <div style="font-size:13px; color:#6b6a5c; line-height:1.6">
              Waist: <strong>${trend.first}</strong> → <strong>${trend.current}</strong> cm over ${trend.days} days
              (${trend.change >= 0 ? '+' : ''}${trend.change.toFixed(1)} cm, ${trend.perWeek >= 0 ? '+' : ''}${trend.perWeek.toFixed(2)} cm/week)
            </div>
          </div>
        ` : ''}
        <div class="modal-section">
          <div class="modal-section-title">add new</div>
          ${renderStepper({ label: 'waist', value: parseFloat(draft.waist) || 85, min: 50, max: 200, step: 0.5, bigStep: 5, unit: 'cm', onChange: "state.measurementDraft = {...(state.measurementDraft||{}), waist: VALUE}; render()" })}
          ${renderStepper({ label: 'hips', value: parseFloat(draft.hips) || 95, min: 50, max: 200, step: 0.5, bigStep: 5, unit: 'cm', onChange: "state.measurementDraft = {...(state.measurementDraft||{}), hips: VALUE}; render()" })}
          ${renderStepper({ label: 'chest', value: parseFloat(draft.chest) || 95, min: 50, max: 200, step: 0.5, bigStep: 5, unit: 'cm', onChange: "state.measurementDraft = {...(state.measurementDraft||{}), chest: VALUE}; render()" })}
          ${renderStepper({ label: 'weight', value: parseFloat(draft.weight) || state.userWeight, min: 30, max: 250, step: 0.1, bigStep: 1, unit: 'kg', onChange: "state.measurementDraft = {...(state.measurementDraft||{}), weight: VALUE}; render()" })}
          <div style="font-size:11px; color:#a0a08e; margin-top:4px; padding-left:4px">All optional. Leave at default for any you don't measure.</div>
          <button class="primary-btn" style="margin-top:12px" onclick="(() => {

            else { set({error:'Add at least one number'}); }
          })()">Save measurement</button>
          ${state.error ? `<div class="error" style="margin-top:10px">${icons.alert}<span class="error-text">${escapeHtml(state.error)}</span></div>` : ''}
        </div>
        ${state.measurements.length > 0 ? `
          <div class="modal-section">
            <div class="modal-section-title">history (${state.measurements.length})</div>
            <div class="meas-history">
              ${state.measurements.slice(0, 20).map(m => {
                const d = new Date(m.timestamp);
                const dateStr = d.toLocaleDateString([], {month:'short', day:'numeric'});
                const parts = [];
                if (m.waist) parts.push('W ' + m.waist);
                if (m.hips) parts.push('H ' + m.hips);
                if (m.chest) parts.push('C ' + m.chest);
                if (m.weight) parts.push(m.weight + 'kg');

                  <span class="date">${dateStr}</span>
                  <span class="values">${parts.join(' · ')}</span>
                  <button class="icon-btn" onclick="deleteMeasurement('${m.id}')">${icons.trash}</button>
