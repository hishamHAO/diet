    background-attachment: fixed;
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
    overflow-y: auto;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  button:disabled { cursor: default; }
  input, textarea { font-family: inherit; font-size: 16px; }
  input:focus, textarea:focus { outline: none; }

  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-text { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .badge { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: #8a8975; display: flex; align-items: center; gap: 10px; }
  .settings-btn { padding: 6px; border-radius: 50%; color: #8a8975; transition: background 0.2s; }
  .settings-btn:hover { background: rgba(0,0,0,0.05); }

  .datebar {
    display: flex; align-items: center; justify-content: space-between;

  .datebar button { padding: 8px; border-radius: 50%; color: #2d3a2e; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }

  .datebar button:disabled { opacity: 0.3; }
  .date-label { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; font-style: italic; }

  .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 1px 2px rgba(45,58,46,0.04), 0 8px 24px rgba(45,58,46,0.06); position: relative; overflow: hidden; }

  .totals-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: #8a8975; margin-bottom: 8px; }

  .totals-big .unit { font-size: 14px; color: #8a8975; }
  .macros { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding-top: 16px; border-top: 1px solid #ede5d3; }
  .macro-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: #8a8975; margin-bottom: 4px; }
  .macro-value { display: flex; align-items: baseline; gap: 2px; }
  .macro-value .n { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; }
  .macro-value .u { font-size: 10px; color: #8a8975; }

  .input-section { margin: 24px 0; }
  .mic-wrap { display: flex; flex-direction: column; align-items: center; }
  .mic-btn {
    position: relative; width: 96px; height: 96px; border-radius: 50%;
    background: #2d3a2e; color: #f6f1e7;
    box-shadow: 0 8px 20px rgba(45,58,46,0.25);
    transition: transform 0.2s, background 0.2s;
    display: flex; align-items: center; justify-content: center;

  .mic-btn:active { transform: scale(0.95); }
  .mic-btn:disabled { opacity: 0.5; }
  .mic-btn.listening {
    background: #c4683a;
    box-shadow: 0 0 0 12px rgba(196,104,58,0.15), 0 0 0 24px rgba(196,104,58,0.08);
  }
  .mic-btn .ping {
    position: absolute; inset: 0; border-radius: 50%; background: #c4683a; opacity: 0.3;
    animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
  }

  .mic-status .muted { color: #6b6a5c; }
  .mic-status .warn { color: #c4683a; }

  .secondary-btn:active { transform: scale(0.97); }

  .entry-sub { display: flex; gap: 8px; margin-top: 2px; font-size: 12px; color: #8a8975; }
  .entry-cal { text-align: right; }

  .entry-cal .u { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #8a8975; }
  .icon-btn { padding: 8px; border-radius: 50%; color: #a0a08e; transition: background 0.2s; }

  .modal {

  .modal-desc { font-size: 14px; color: #6b6a5c; line-height: 1.5; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: #8a8975; margin-bottom: 8px; }
  .danger-btn {

  }

  .icon { display: inline-block; vertical-align: middle; }
</style>

// ============================================================
// Matching logic
// ============================================================
const NUMBER_WORDS = {
  'a': 1, 'an': 1, 'one': 1, 'two': 2, 'three': 3, 'four': 4, 'five': 5,
  'six': 6, 'seven': 7, 'eight': 8, 'nine': 9, 'ten': 10, 'half': 0.5,
  'couple': 2, 'few': 3,
};
const SIZE_WORDS = {
  'tiny': 0.5, 'mini': 0.5, 'small': 0.7, 'little': 0.7, 'smallish': 0.7,
  'medium': 1.0, 'regular': 1.0, 'normal': 1.0, 'average': 1.0,
  'large': 1.4, 'big': 1.4, 'biggish': 1.3, 'huge': 1.8, 'massive': 2.0, 'jumbo': 1.7,
};

function normalize(text) {
  return text.toLowerCase()
    .replace(/[.,!?;:'"()]/g, '')
    .replace(/-/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

const ALL_KEYS = [];
for (const food of FOODS) {
  for (const key of food.keys) {
    const norm = normalize(key);
    ALL_KEYS.push({ food, key: norm, keyWords: norm.split(' ') });
  }
}
ALL_KEYS.sort((a, b) => b.keyWords.length - a.keyWords.length || b.key.length - a.key.length);

function findModifiers(modWords) {
  let quantity = 1, size = 1.0, sizeWord = null, qtyWord = null;
  for (let i = modWords.length - 1; i >= 0; i--) {
    const w = modWords[i];
    if (qtyWord == null) {
      if (/^\d+(\.\d+)?$/.test(w)) { quantity = parseFloat(w); qtyWord = w; }
      else if (NUMBER_WORDS[w] != null) { quantity = NUMBER_WORDS[w]; qtyWord = w; }
    }
    if (sizeWord == null && SIZE_WORDS[w] != null) {
      size = SIZE_WORDS[w]; sizeWord = w;
    }
  }
  return { quantity, size, sizeWord, qtyWord };
}

function matchFoods(text) {
  const normalized = normalize(text);
  const words = normalized.split(/\s+/).filter(Boolean);
  if (words.length === 0) return { matches: [], unmatched: [] };

  const consumed = new Array(words.length).fill(false);
  const matches = [];

  for (let i = 0; i < words.length; i++) {
    if (consumed[i]) continue;
    let best = null;
    for (const { food, keyWords } of ALL_KEYS) {
      if (i + keyWords.length > words.length) continue;
      let ok = true;
      for (let j = 0; j < keyWords.length; j++) {
        if (consumed[i + j] || words[i + j] !== keyWords[j]) { ok = false; break; }
      }
      if (ok) { best = { food, keyWords, start: i, end: i + keyWords.length }; break; }
    }
    if (!best) continue;

    const modWords = [];
    for (let k = Math.max(0, best.start - 4); k < best.start; k++) {
      if (!consumed[k]) modWords.push(words[k]);
    }
    const { quantity, size, sizeWord, qtyWord } = findModifiers(modWords);
    const sizeMult = best.food.scalable !== false ? size : 1.0;
    const mult = quantity * sizeMult;

    matches.push({
      food: best.food,
      sizeWord: best.food.scalable !== false ? sizeWord : null,
      quantity,
      cal: best.food.cal * mult,
      c: best.food.c * mult,
      p: best.food.p * mult,
      f: best.food.f * mult,
    });

    for (let k = best.start; k < best.end; k++) consumed[k] = true;
    for (let k = Math.max(0, best.start - 4); k < best.start; k++) {
      const w = words[k];
      if (w === sizeWord || w === qtyWord || /^\d+(\.\d+)?$/.test(w)) consumed[k] = true;
    }
    i = best.end - 1;
  }

  const stopwords = new Set(['i','had','have','has','ate','eat','eating','just','today','then','and','with','plus','also','a','an','the','some','of','on','in','at','for','my','mine','breakfast','lunch','dinner','snack','meal','was','were','still','only','no','this','that','it','its','to','from','about','around','via','quick','fresh','tasty','nice','good','really','very','bit','piece','pieces','glass','cup','bowl','plate']);
  const unmatched = [];
  for (let i = 0; i < words.length; i++) {
    if (consumed[i]) continue;
    const w = words[i];
    if (stopwords.has(w)) continue;
    if (NUMBER_WORDS[w] != null) continue;
    if (SIZE_WORDS[w] != null) continue;
    if (w.length <= 1) continue;
    unmatched.push(w);
  }
  return { matches, unmatched };
}

const STORAGE_ENTRIES = 'plate-entries-v2';
function loadEntries() {
  try { const raw = localStorage.getItem(STORAGE_ENTRIES); return raw ? JSON.parse(raw) : []; }
  catch { return []; }
}
function saveEntries(es) { try { localStorage.setItem(STORAGE_ENTRIES, JSON.stringify(es)); } catch {} }

// ============================================================
// Date helpers
// ============================================================
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function entryDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
function formatDateLabel(iso) {
  const today = todayISO();
  const y = new Date(); y.setDate(y.getDate() - 1);
  const yISO = `${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,'0')}-${String(y.getDate()).padStart(2,'0')}`;
  if (iso === today) return 'Today';
  if (iso === yISO) return 'Yesterday';
  return new Date(iso + 'T00:00:00').toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
}
function shiftDate(delta) {
  const d = new Date(state.selectedDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ============================================================
// Speech recognition
// ============================================================
let recognition = null;
let finalText = '';

function setupSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { state.supported = false; return; }
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    let final = '', interim = '';
    for (let i = 0; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t; else interim += t;
    }
    if (final.trim()) finalText = final.trim();
    set({ liveTranscript: (final || interim).trim() });
  };
  recognition.onend = () => {
    const txt = finalText.trim();
    finalText = '';
    set({ isListening: false });
    if (txt) processFood(txt);
  };
  recognition.onerror = (e) => {
    let msg = `Mic error: ${e.error}`;
    if (e.error === 'no-speech') msg = "Didn't catch that — try again.";
    else if (e.error === 'not-allowed') msg = 'Microphone blocked. In Safari: tap "AA" in address bar → Website Settings → Microphone → Allow.';
    set({ isListening: false, error: msg });
  };
}

function startListening() {
  if (!recognition || state.isListening) return;
  finalText = '';
  set({ error: '', liveTranscript: '' });
  try { recognition.start(); set({ isListening: true }); }
  catch { set({ error: 'Could not start mic. Try again.' }); }
}
function stopListening() { if (recognition && state.isListening) { try { recognition.stop(); } catch {} } }

// ============================================================
// Process food (local matching, no API)
// ============================================================
function processFood(text) {
  const { matches, unmatched } = matchFoods(text);

  if (matches.length === 0) {
    set({
      manualDraft: { name: text.trim().replace(/\b\w/g, c => c.toUpperCase()), cal: '', c: '', p: '', f: '' },
      mode: 'manual',
      liveTranscript: '',
      error: '',
    });
    return;
  }

  const totalCal = matches.reduce((a, m) => a + m.cal, 0);
  const totalC = matches.reduce((a, m) => a + m.c, 0);
  const totalP = matches.reduce((a, m) => a + m.p, 0);
  const totalF = matches.reduce((a, m) => a + m.f, 0);

  const name = matches.map(m => {
    const sz = m.sizeWord ? m.sizeWord.charAt(0).toUpperCase() + m.sizeWord.slice(1) + ' ' : '';
    const qty = m.quantity !== 1 ? `${m.quantity === 0.5 ? 'Half ' : m.quantity + 'x '}` : '';
    return (qty + sz + m.food.display).trim();
  }).join(' + ');

  set({
    pending: {
      id: Date.now().toString(),
      timestamp: Date.now(),
      spoken: text,
      name,
      calories: Math.round(totalCal),
      carbs: Math.round(totalC * 10) / 10,
      protein: Math.round(totalP * 10) / 10,
      fat: Math.round(totalF * 10) / 10,
      breakdown: matches.map(m => ({
        name: (m.sizeWord ? m.sizeWord + ' ' : '') + (m.quantity !== 1 ? m.quantity + 'x ' : '') + m.food.display,
        cal: Math.round(m.cal),
        unit: m.food.unit,
      })),
      unmatched,
    },
    liveTranscript: '',
    error: '',
  });
}

function confirmEntry() {
  if (!state.pending) return;
  const newEntries = [state.pending, ...state.entries];
  saveEntries(newEntries);
  set({ entries: newEntries, pending: null, mode: 'voice' });
}
function cancelEntry() { set({ pending: null }); }
function deleteEntry(id) {
  const ne = state.entries.filter(e => e.id !== id);
  saveEntries(ne);
  set({ entries: ne });
}
function submitText() {
  const v = state.textInputValue.trim();
  if (!v) return;
  state.textInputValue = '';
  processFood(v);
}
function saveManual() {
  const d = state.manualDraft;
  if (!d) return;
  const name = d.name.trim() || 'Unnamed';
  const cal = parseFloat(d.cal) || 0;
  if (cal <= 0) { set({ error: 'Please enter calories.' }); return; }
  const entry = {
    id: Date.now().toString(),
    timestamp: Date.now(),
    spoken: name,
    name,
    calories: Math.round(cal),
    carbs: Math.round((parseFloat(d.c) || 0) * 10) / 10,
    protein: Math.round((parseFloat(d.p) || 0) * 10) / 10,
    fat: Math.round((parseFloat(d.f) || 0) * 10) / 10,
    breakdown: [],
    unmatched: [],
  };
  const newEntries = [entry, ...state.entries];
  saveEntries(newEntries);
  set({ entries: newEntries, manualDraft: null, mode: 'voice', error: '' });
}
function startManual() {
  set({ manualDraft: { name: '', cal: '', c: '', p: '', f: '' }, mode: 'manual', error: '' });
}
function clearAllData() {
  if (!confirm('Delete ALL entries? This cannot be undone.')) return;
  saveEntries([]);
  set({ entries: [], showSettings: false });
}

// ============================================================
// Icons
// ============================================================

// ============================================================
// Rendering
// ============================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTotals() {
  const day = state.entries.filter(e => entryDate(e.timestamp) === state.selectedDate);
  const t = day.reduce((a, e) => ({
    calories: a.calories + (e.calories || 0),
    carbs: a.carbs + (e.carbs || 0),
    protein: a.protein + (e.protein || 0),
    fat: a.fat + (e.fat || 0),
  }), { calories: 0, carbs: 0, protein: 0, fat: 0 });
  const fmt = v => v < 10 ? v.toFixed(1) : Math.round(v).toString();
  return `
    <div class="card totals">
      <div class="totals-label">calories</div>
      <div class="totals-big"><span class="num">${Math.round(t.calories)}</span><span class="unit">kcal</span></div>
      <div class="macros">
        <div><div class="macro-label">carbs</div><div class="macro-value"><span class="n" style="color:#c4683a">${fmt(t.carbs)}</span><span class="u">g</span></div></div>
        <div><div class="macro-label">protein</div><div class="macro-value"><span class="n" style="color:#5a7a3a">${fmt(t.protein)}</span><span class="u">g</span></div></div>
        <div><div class="macro-label">fat</div><div class="macro-value"><span class="n" style="color:#b8924a">${fmt(t.fat)}</span><span class="u">g</span></div></div>
      </div>
    </div>
  `;
}

function renderInput() {
  if (state.selectedDate !== todayISO()) return '';

  if (state.pending) {
    const p = state.pending;
    return `
      <div class="input-section">
        <div class="pending">
          <div class="pending-label">estimated</div>
          <div class="pending-name">${escapeHtml(p.name)}</div>
          <div class="pending-cal"><span class="n">${p.calories}</span><span class="u">kcal</span></div>
          <div class="pending-macros">
            <div class="pending-macro"><div class="lbl">carbs</div><div class="val">${p.carbs}g</div></div>
            <div class="pending-macro"><div class="lbl">protein</div><div class="val">${p.protein}g</div></div>
            <div class="pending-macro"><div class="lbl">fat</div><div class="val">${p.fat}g</div></div>
          </div>
          ${p.breakdown.length > 1 ? `<div class="breakdown">${p.breakdown.map(b => `<div class="breakdown-item"><span class="nm">${escapeHtml(b.name)} <span style="color:#a0a08e">· ${escapeHtml(b.unit)}</span></span><span>${b.cal} kcal</span></div>`).join('')}</div>` : ''}
          ${p.unmatched.length > 0 ? `<div class="pending-warn">Didn't recognise: ${p.unmatched.map(escapeHtml).join(', ')}. Save anyway, or discard and add manually.</div>` : ''}
          <div class="pending-heard">Heard: "${escapeHtml(p.spoken)}"</div>
          <div class="pending-actions">
            <button class="secondary-btn" onclick="cancelEntry()">${icons.xSm}<span>Discard</span></button>
            <button class="primary-btn" onclick="confirmEntry()">${icons.checkSm}<span>Save</span></button>
          </div>
        </div>
      </div>
    `;
  }

  if (state.mode === 'manual') {
    const d = state.manualDraft || { name: '', cal: '', c: '', p: '', f: '' };
    return `
      <div class="input-section">
        <div class="text-card">
          <div class="text-card-head">
            <div class="lbl">add manually</div>
            <button class="back-link" onclick="set({mode:'voice', manualDraft:null, error:''})">${icons.micSm}voice</button>
          </div>
          <div class="form-label" style="margin-top:4px">food name</div>
          <input id="m-name" class="form-input" type="text" placeholder="e.g. Yogurt parfait" value="${escapeHtml(d.name)}" oninput="state.manualDraft.name = this.value" />
          <div class="form-row" style="margin-top:10px">
            <div class="form-field"><div class="form-label">calories *</div><input id="m-cal" class="form-input" type="number" inputmode="numeric" placeholder="200" value="${escapeHtml(d.cal)}" oninput="state.manualDraft.cal = this.value" /></div>
            <div class="form-field"><div class="form-label">carbs (g)</div><input class="form-input" type="number" inputmode="decimal" placeholder="optional" value="${escapeHtml(d.c)}" oninput="state.manualDraft.c = this.value" /></div>
          </div>
          <div class="form-row" style="margin-top:8px">
            <div class="form-field"><div class="form-label">protein (g)</div><input class="form-input" type="number" inputmode="decimal" placeholder="optional" value="${escapeHtml(d.p)}" oninput="state.manualDraft.p = this.value" /></div>
            <div class="form-field"><div class="form-label">fat (g)</div><input class="form-input" type="number" inputmode="decimal" placeholder="optional" value="${escapeHtml(d.f)}" oninput="state.manualDraft.f = this.value" /></div>
          </div>
          <button class="primary-btn" onclick="saveManual()">${icons.checkSm}<span>Save entry</span></button>
        </div>
        ${state.error ? `<div class="error">${icons.alert}<span class="error-text">${escapeHtml(state.error)}</span></div>` : ''}
      </div>
    `;
  }

  if (state.mode === 'text') {
    return `
      <div class="input-section">
        <div class="text-card">
          <div class="text-card-head">
            <div class="lbl">type your food</div>
            <button class="back-link" onclick="set({mode:'voice', error:''})">${icons.micSm}voice</button>
          </div>
          <textarea id="food-input" class="text-input" placeholder="e.g. small apple and a coffee with milk" rows="2" oninput="state.textInputValue = this.value">${escapeHtml(state.textInputValue)}</textarea>
          <button class="primary-btn" onclick="submitText()" ${!state.textInputValue.trim() ? 'disabled' : ''}>${icons.send}<span>Estimate</span></button>
        </div>
        ${state.error ? `<div class="error">${icons.alert}<span class="error-text">${escapeHtml(state.error)}</span></div>` : ''}
      </div>
    `;
  }

  const status = !state.supported
    ? `<span class="warn">Voice input not supported here. Use type or manual.</span>`
    : state.isListening
      ? `<span class="live">${escapeHtml(state.liveTranscript) || 'Listening…'}</span>`
      : `<span class="muted">Tap and say what you ate</span>`;

  return `
    <div class="input-section">
      <div class="mic-wrap">
        <button class="mic-btn ${state.isListening ? 'listening' : ''}" onclick="${state.isListening ? 'stopListening()' : 'startListening()'}" ${!state.supported ? 'disabled' : ''}>
          ${state.isListening ? '<span class="ping"></span>' : ''}
          ${icons.mic}
        </button>
        <div class="mic-status">${status}</div>
        <div class="mode-row">
          <button class="mode-btn" onclick="set({mode:'text', error:''})" ${state.isListening ? 'disabled' : ''}>${icons.kbd}<span>type</span></button>
          <button class="mode-btn" onclick="startManual()" ${state.isListening ? 'disabled' : ''}>${icons.plus}<span>manual</span></button>
        </div>
      </div>
      ${state.error ? `<div class="error">${icons.alert}<span class="error-text">${escapeHtml(state.error)}</span></div>` : ''}
    </div>
  `;
}

function renderEntries() {
  const day = state.entries.filter(e => entryDate(e.timestamp) === state.selectedDate);
  const isToday = state.selectedDate === todayISO();
  const header = `<div class="list-header">${day.length === 0 ? 'no entries' : `${day.length} ${day.length === 1 ? 'entry' : 'entries'}`}</div>`;
  if (day.length === 0) return header + `<div class="empty"><p>${isToday ? 'A blank page. Tap the mic when you eat something.' : 'Nothing logged this day.'}</p></div>`;
  return header + `<div class="entries-list">${day.map(e => `
    <div class="entry">
      <div class="entry-main">
        <div class="entry-name">${escapeHtml(e.name)}</div>
        <div class="entry-sub"><span>${formatTime(e.timestamp)}</span><span>·</span><span>${e.carbs}c · ${e.protein}p · ${e.fat}f</span></div>
      </div>
      <div class="entry-cal"><div class="n">${e.calories}</div><div class="u">kcal</div></div>
      <button class="icon-btn" onclick="if(confirm('Delete this entry?')) deleteEntry('${e.id}')" aria-label="Delete">${icons.trash}</button>
    </div>
  `).join('')}</div>`;
}

function renderDateBar() {
  const isToday = state.selectedDate === todayISO();
  return `
    <div class="datebar">
      <button onclick="set({selectedDate: shiftDate(-1)})" aria-label="Previous day">${icons.chevL}</button>
      <div class="date-label">${formatDateLabel(state.selectedDate)}</div>
      <button onclick="set({selectedDate: shiftDate(1)})" ${isToday ? 'disabled' : ''} aria-label="Next day">${icons.chevR}</button>
    </div>
  `;
}

function renderSettingsModal() {
  if (!state.showSettings) return '';
  return `
    <div class="modal-overlay" onclick="if(event.target===this) set({showSettings:false})">
      <div class="modal">
        <div class="modal-title">Settings</div>
        <div class="modal-desc">Plate uses a built-in database of about 150 common foods. Estimates are rough — adjust manually if needed. All entries are saved on this device only.</div>
        <div class="modal-section">
          <div class="modal-section-title">data</div>
          <button class="danger-btn" onclick="clearAllData()">${icons.trash}<span>Delete all entries</span></button>
        </div>
        <div class="modal-actions">
          <button class="secondary-btn" onclick="set({showSettings:false})">Close</button>
        </div>
      </div>
    </div>
  `;
}

function render() {
  const root = document.getElementById('root');
  const focused = document.activeElement;
  const focusedId = focused && focused.id;
  const selStart = focused && focused.selectionStart;
  const selEnd = focused && focused.selectionEnd;

  root.innerHTML = `
    <div class="app">
      <div class="header">
        <div class="logo">${icons.apple}<h1 class="logo-text">Plate</h1></div>
        <div class="badge">
          <span>personal</span>
          <button class="settings-btn" onclick="set({showSettings:true})" aria-label="Settings">${icons.cog}</button>
        </div>
      </div>
      ${renderDateBar()}
      ${renderTotals()}
      ${renderInput()}
      ${renderEntries()}
    </div>
    ${renderSettingsModal()}
  `;

  if (focusedId) {
    const el = document.getElementById(focusedId);
    if (el) {
      el.focus();
      if (selStart != null) { try { el.setSelectionRange(selStart, selEnd); } catch {} }
    }
  }
}

// ============================================================
// Init
// ============================================================
function init() {
  state.entries = loadEntries();
  setupSpeech();
  render();
}
init();
</script>
